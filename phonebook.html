<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="theme-color" content="#0f4d82">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="دليل وادي الست">
<meta name="description" content="دليل بلدية وادي الست — أرقام وعائلات ومهن أهالي البلدة">
<title>دليل وادي الست</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<script src="pwa.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --blue:#1a6eb5;--blue2:#0f4d82;--blue3:#daeaf8;--blue-soft:#eef5fc;
  --green:#2d7a3e;--green2:#1e5429;--green3:#d4edda;
  --sun:#f5a623;--sun2:#d88e0a;--sun3:#fff4e0;--sun-soft:#fffaf0;
  --bg:#f4f6fb;--surface:#fff;--surface2:#eef0f6;
  --border:#dce0ea;--border2:#e8ecf3;
  --text:#191c24;--text2:#515668;--text3:#8d93a6;--text4:#b3b8c7;
  --warn:#c47800;--warn-bg:#fff4e0;
  --danger:#bf2424;--danger-bg:#fdeaea;
  --wa:#25D366;--wa2:#128C7E;
  --shadow-sm:0 1px 3px rgba(15,77,130,.06),0 1px 2px rgba(15,77,130,.04);
  --shadow:0 4px 16px rgba(15,77,130,.08),0 2px 6px rgba(15,77,130,.05);
  --shadow-lg:0 12px 40px rgba(15,77,130,.16),0 4px 12px rgba(15,77,130,.08);
  --shadow-xl:0 24px 70px rgba(15,77,130,.22);
  --r-sm:8px;--r:12px;--r-lg:16px;--r-xl:22px;--r-full:999px;
  --font:'Tajawal',sans-serif;
  --t1:cubic-bezier(.4,0,.2,1);--t2:cubic-bezier(.34,1.56,.64,1);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
  --bn-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;direction:rtl;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;}
input,textarea,select{font-family:inherit;color:inherit;font-size:inherit;}
img{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}

/* ═══════════ HEADER ═══════════ */
.hd{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,var(--blue2) 0%,var(--blue) 60%,var(--green2) 100%);color:#fff;box-shadow:var(--shadow);padding-top:var(--safe-top);}
.hd-inner{max-width:1280px;margin:0 auto;padding:11px 14px;display:flex;align-items:center;gap:11px;}
.hd-logo{height:42px;width:42px;border-radius:50%;background:#fff;padding:4px;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.18);}
.hd-logo img{width:100%;height:100%;object-fit:contain;}
.hd-title-wrap{flex:1;min-width:0;}
.hd-title{font-size:16px;font-weight:800;line-height:1.15;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.hd-yp{display:inline-flex;align-items:center;gap:4px;background:var(--sun);color:#3a2502;font-size:10px;font-weight:800;padding:2px 8px;border-radius:var(--r-full);box-shadow:0 2px 6px rgba(245,166,35,.4);}
.hd-yp::before{content:"📒";font-size:11px;}
.hd-sub{font-size:11px;opacity:.78;margin-top:2px;font-weight:400;display:none;}
.hd-actions{display:flex;align-items:center;gap:6px;}
.hd-iconbtn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s var(--t1);position:relative;}
.hd-iconbtn:hover,.hd-iconbtn:active{background:rgba(255,255,255,.24);}
.hd-iconbtn .dot{position:absolute;top:6px;left:6px;width:9px;height:9px;background:var(--sun);border-radius:50%;border:2px solid var(--blue2);display:none;}
.hd-iconbtn.has-pending .dot{display:block;animation:pulse 2s infinite;}
.hd-back{width:auto!important;border-radius:var(--r-full);padding:0 12px 0 14px;gap:6px;text-decoration:none;color:#fff;background:rgba(255,255,255,.18)!important;}
.hd-back:hover,.hd-back:active{background:rgba(255,255,255,.28)!important;}
.hd-back-i{font-size:16px;}
.hd-back-l{font-size:12.5px;font-weight:700;}
@media(max-width:679px){.hd-back{padding:0 10px;}.hd-back-l{font-size:11px;}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}

/* ═══════════ SEARCH BAR ═══════════ */
.sbar{background:#fff;border-bottom:1px solid var(--border);position:sticky;z-index:40;box-shadow:var(--shadow-sm);top:64px;}
.sbar-inner{max-width:1280px;margin:0 auto;padding:11px 14px;display:flex;flex-direction:column;gap:9px;}
.sb-row{display:flex;gap:8px;align-items:center;}
.sb-search{position:relative;flex:1;}
.sb-search input{width:100%;padding:13px 46px 13px 42px;border:1.5px solid var(--border);border-radius:var(--r-full);font-size:15px;background:var(--surface2);outline:none;transition:all .2s var(--t1);}
.sb-search input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(26,110,181,.12);}
.sb-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text3);pointer-events:none;}
.sb-clear{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;display:none;align-items:center;justify-content:center;color:var(--text3);font-size:15px;background:transparent;}
.sb-clear:hover,.sb-clear:active{background:var(--surface2);color:var(--text);}
.sb-clear.show{display:flex;}
.sb-filter-btn{flex-shrink:0;width:46px;height:46px;border-radius:var(--r-full);background:var(--surface2);color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .15s;border:1.5px solid var(--border);}
.sb-filter-btn:hover,.sb-filter-btn:active{background:var(--blue3);color:var(--blue2);border-color:var(--blue);}
.sb-filter-btn.has-active{background:var(--blue);color:#fff;border-color:var(--blue2);}
.sb-filter-btn .ct{position:absolute;top:-3px;left:-3px;background:var(--sun);color:#3a2502;font-size:10px;font-weight:800;padding:1px 5px;border-radius:var(--r-full);min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}

/* ═══════════ STATS — horizontal scroll ═══════════ */
.stats{display:none;max-width:1280px;margin:11px auto 0;padding:0 14px;grid-template-columns:repeat(2,1fr);gap:8px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);}
.stat-i{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.stat-1 .stat-i{background:var(--blue3);color:var(--blue2);}
.stat-2 .stat-i{background:var(--green3);color:var(--green2);}
.stat-3 .stat-i{background:var(--sun3);color:var(--sun2);}
.stat-4 .stat-i{background:#ede8f8;color:#6535a8;}
.stat-v{font-size:18px;font-weight:800;line-height:1;}
.stat-l{font-size:11px;color:var(--text3);font-weight:600;margin-top:2px;}

/* ═══════════ CONTAINER ═══════════ */
.ct{max-width:1280px;margin:0 auto;padding:14px 14px calc(var(--bn-h) + var(--safe-bot) + 28px);}

/* ═══════════ RESULT INFO ═══════════ */
.ri{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px;}
.ri-text{font-size:13px;color:var(--text2);font-weight:600;}
.ri-text strong{color:var(--blue2);font-weight:800;}
.ri-clear{font-size:12px;color:var(--blue);cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:var(--r-full);background:var(--blue3);}
.ri-clear:hover,.ri-clear:active{background:var(--blue);color:#fff;}

/* ═══════════ GRID ═══════════ */
.grid{display:grid;grid-template-columns:1fr;gap:10px;}

/* ═══════════ CARD ═══════════ */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:13px;display:flex;flex-direction:column;gap:11px;transition:all .2s var(--t1);position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--green));opacity:0;transition:opacity .2s;}
.card:active{transform:scale(.99);}
.card:hover::before,.card:active::before{opacity:1;}
.card.has-img::before{background:linear-gradient(90deg,var(--sun),var(--sun2));opacity:.5;}
.card.user-added::before{background:linear-gradient(90deg,var(--green),var(--blue));opacity:1;}
.card-row{display:flex;gap:11px;align-items:flex-start;cursor:pointer;}
.av{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
.av-1{background:linear-gradient(135deg,#1a6eb5,#0f4d82);}
.av-2{background:linear-gradient(135deg,#2d7a3e,#1e5429);}
.av-3{background:linear-gradient(135deg,#f5a623,#d88e0a);}
.av-4{background:linear-gradient(135deg,#6535a8,#4a2178);}
.av-5{background:linear-gradient(135deg,#0891b2,#0e7490);}
.av-6{background:linear-gradient(135deg,#dc2626,#991b1b);}
.av-7{background:linear-gradient(135deg,#059669,#047857);}
.av-8{background:linear-gradient(135deg,#7c3aed,#5b21b6);}
.card-info{flex:1;min-width:0;}
.card-name{font-size:16px;font-weight:700;line-height:1.3;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.card-fam{font-size:12px;color:var(--text3);font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.card-fam-pill{background:var(--surface2);color:var(--text2);padding:2px 9px;border-radius:var(--r-full);font-size:10.5px;font-weight:700;}
.card-occ{font-size:12.5px;color:var(--sun2);font-weight:600;margin-top:4px;display:flex;align-items:center;gap:4px;}
.card-occ::before{content:"💼";font-size:11px;}
.card-phone{font-size:16px;color:var(--blue2);font-weight:700;direction:ltr;text-align:right;display:flex;align-items:center;gap:6px;font-feature-settings:"tnum";letter-spacing:.02em;padding:9px 12px;background:var(--blue-soft);border-radius:var(--r);}
.card-phone::before{content:"📞";font-size:14px;flex-shrink:0;}
.card-phone-hidden{font-size:13px;color:var(--text3);font-weight:600;font-style:italic;padding:9px 12px;background:var(--surface2);border-radius:var(--r);display:flex;align-items:center;gap:6px;}
.card-phone-hidden::before{content:"🔒";font-size:13px;}
.card-addr{font-size:12px;color:var(--text3);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;padding:0 4px;}
.card-addr::before{content:"📍 ";font-size:11px;}
.card-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:auto;padding-top:9px;border-top:1px dashed var(--border);}
.qa{padding:11px 4px;border-radius:11px;font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s var(--t1);position:relative;text-decoration:none;border:1.5px solid transparent;min-height:50px;justify-content:center;}
.qa:active{transform:scale(.96);}
.qa-i{font-size:18px;line-height:1;}
.qa-l{font-size:10.5px;font-weight:700;}
.qa-tel{background:var(--blue3);color:var(--blue2);}
.qa-tel:hover,.qa-tel:active{background:var(--blue);color:#fff;border-color:var(--blue2);}
.qa-wa{background:#dcf5e6;color:var(--wa2);}
.qa-wa:hover,.qa-wa:active{background:var(--wa);color:#fff;border-color:var(--wa2);}
.qa-map{background:var(--green3);color:var(--green2);}
.qa-map:hover,.qa-map:active{background:var(--green);color:#fff;border-color:var(--green2);}
.qa-edit{background:var(--sun3);color:var(--sun2);}
.qa-edit:hover,.qa-edit:active{background:var(--sun);color:#3a2502;border-color:var(--sun2);}
.qa.dis{opacity:.32;pointer-events:none;}
.card-badge{position:absolute;top:9px;left:9px;padding:3px 9px;border-radius:var(--r-full);font-size:10px;font-weight:800;display:flex;align-items:center;gap:3px;z-index:2;}
.cb-new{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(45,122,62,.4);}
.cb-pending{background:var(--warn);color:#fff;}
.cb-edit-pending{background:var(--sun);color:#3a2502;box-shadow:0 2px 6px rgba(245,166,35,.4);}
.cb-hidden{background:#6b7280;color:#fff;box-shadow:0 2px 6px rgba(107,114,128,.4);}
.card.is-hidden{opacity:.62;background:repeating-linear-gradient(45deg,#fff,#fff 8px,#f5f5f5 8px,#f5f5f5 16px);}
.card.is-hidden::before{background:linear-gradient(90deg,#6b7280,#374151);opacity:1;}

/* ═══════════ PAGINATION ═══════════ */
.pg{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:18px;flex-wrap:wrap;}
.pg-btn{min-width:42px;height:42px;border-radius:11px;background:#fff;border:1px solid var(--border);font-size:14px;font-weight:700;color:var(--text2);transition:all .15s var(--t1);padding:0 13px;}
.pg-btn:hover:not(:disabled),.pg-btn:active:not(:disabled){background:var(--blue3);color:var(--blue2);border-color:var(--blue);}
.pg-btn.on{background:var(--blue);color:#fff;border-color:var(--blue2);}
.pg-btn:disabled{opacity:.4;cursor:not-allowed;}
.pg-info{font-size:12px;color:var(--text3);margin:0 6px;}

/* ═══════════ EMPTY STATE ═══════════ */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty-icon{font-size:56px;margin-bottom:10px;opacity:.5;}
.empty-t{font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px;}
.empty-s{font-size:13px;}

/* ═══════════ BOTTOM NAV (mobile primary navigation) ═══════════ */
.bn{position:fixed;bottom:0;right:0;left:0;background:#fff;border-top:1px solid var(--border);box-shadow:0 -4px 16px rgba(15,77,130,.06);z-index:45;padding-bottom:var(--safe-bot);display:flex;height:calc(var(--bn-h) + var(--safe-bot));}
.bn-itm{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:700;color:var(--text3);transition:color .15s;position:relative;padding:6px 0;}
.bn-itm:active{transform:scale(.96);}
.bn-itm-i{font-size:22px;line-height:1;transition:transform .2s var(--t2);}
.bn-itm.on{color:var(--blue);}
.bn-itm.on .bn-itm-i{transform:scale(1.15);}
.bn-itm.on::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:36px;height:3px;background:var(--blue);border-radius:0 0 4px 4px;}
.bn-itm.add{color:var(--green);}
.bn-itm.add.on{color:var(--green2);}
.bn-itm.add.on::before{background:var(--green);}
.bn-itm.adm{color:var(--sun2);}
.bn-itm.adm.on::before{background:var(--sun);}
.bn-itm-badge{position:absolute;top:5px;left:50%;margin-left:6px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:1px 5px;border-radius:var(--r-full);min-width:16px;height:16px;display:none;align-items:center;justify-content:center;border:2px solid #fff;}
.bn-itm.has-pending .bn-itm-badge{display:flex;}

/* ═══════════ MODAL ═══════════ */
.modal-bg{position:fixed;inset:0;background:rgba(15,28,55,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:0;animation:fadeIn .2s var(--t1);}
.modal-bg.show{display:flex;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal{background:#fff;width:100%;max-width:560px;max-height:94vh;border-radius:var(--r-xl) var(--r-xl) 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s var(--t2);box-shadow:var(--shadow-xl);}
.modal-handle{width:42px;height:4px;background:var(--text4);border-radius:var(--r-full);margin:8px auto 0;flex-shrink:0;}
.modal-hd{padding:10px 16px 14px;display:flex;align-items:center;gap:11px;flex-shrink:0;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;}
.modal-hd.sun{background:linear-gradient(135deg,var(--sun2),var(--sun));color:#3a2502;}
.modal-hd.green{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;}
.modal-hd.purple{background:linear-gradient(135deg,#4a2178,#6535a8);color:#fff;}
.modal-hd-content{flex:1;min-width:0;}
.modal-t{font-size:17px;font-weight:800;line-height:1.2;}
.modal-s{font-size:11.5px;opacity:.78;margin-top:2px;font-weight:400;}
.modal-x{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;flex-shrink:0;}
.modal-x:active{background:rgba(255,255,255,.28);}
.modal-hd.sun .modal-x{background:rgba(58,37,2,.13);color:#3a2502;}
.modal-bd{padding:16px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}

/* ═══════════ DETAIL MODAL ═══════════ */
.dt-hero{display:flex;align-items:center;gap:13px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.dt-av{width:78px;height:78px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:var(--shadow);overflow:hidden;position:relative;}
.dt-av img{width:100%;height:100%;object-fit:cover;}
.dt-name{font-size:19px;font-weight:800;line-height:1.2;margin-bottom:4px;}
.dt-meta{font-size:12.5px;color:var(--text3);}
.dt-occ{display:inline-flex;align-items:center;gap:4px;background:var(--sun3);color:var(--sun2);padding:3px 10px;border-radius:var(--r-full);font-size:12px;font-weight:700;margin-top:6px;}
.dt-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:14px 0;}
.dt-action{padding:13px 4px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;gap:5px;font-size:12px;font-weight:700;text-decoration:none;transition:all .15s var(--t1);min-height:62px;justify-content:center;}
.dt-action:active{transform:scale(.96);}
.dt-action-i{font-size:22px;}
.dt-action.tel{background:var(--blue3);color:var(--blue2);}
.dt-action.tel:active{background:var(--blue);color:#fff;}
.dt-action.wa{background:#dcf5e6;color:var(--wa2);}
.dt-action.wa:active{background:var(--wa);color:#fff;}
.dt-action.map{background:var(--green3);color:var(--green2);}
.dt-action.map:active{background:var(--green);color:#fff;}
.dt-action.edit{background:var(--sun3);color:var(--sun2);}
.dt-action.edit:active{background:var(--sun);color:#3a2502;}
.dt-action.dis{opacity:.35;pointer-events:none;background:var(--surface2);color:var(--text3);}
.dt-section-title{font-size:12px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;padding:0 4px;display:flex;align-items:center;gap:6px;}
.dt-section-title::before{content:"";flex:1;height:1px;background:var(--border);}
.dt-section-title::after{content:"";flex:1;height:1px;background:var(--border);}
.dt-fields{display:flex;flex-direction:column;gap:9px;}
.dt-field{padding:10px 12px;background:var(--surface2);border-radius:var(--r);display:flex;gap:11px;align-items:center;}
.dt-field-i{width:34px;height:34px;border-radius:9px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;border:1px solid var(--border);}
.dt-field-text{flex:1;min-width:0;}
.dt-field-l{font-size:11px;color:var(--text3);font-weight:600;}
.dt-field-v{font-size:14px;color:var(--text);font-weight:600;direction:ltr;text-align:right;word-break:break-word;}
.dt-field-v.rtl{direction:rtl;}
.dt-field-btn{padding:6px 10px;border-radius:9px;background:#fff;border:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:700;flex-shrink:0;}
.dt-field-btn:active{background:var(--blue);color:#fff;border-color:var(--blue2);}
.dt-map{margin-top:11px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.dt-map iframe{width:100%;height:180px;border:0;display:block;}
.dt-foot{padding:13px 0 0;margin-top:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.dt-foot-row{display:flex;gap:8px;flex-wrap:wrap;}
.dt-foot-row .btn{flex:1;min-width:120px;}

/* admin section in detail */
.adm-tools{background:linear-gradient(135deg,#f3edff,#ede8f8);border:1px solid #d4c4f0;border-radius:var(--r);padding:13px;margin-top:14px;}
.adm-tools-t{font-size:12px;font-weight:800;color:#4a2178;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.adm-tools-t::before{content:"🛡️";}
.adm-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#fff;border-radius:var(--r);margin-bottom:7px;border:1px solid var(--border);}
.adm-toggle-l{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;}
.adm-toggle-l-s{font-size:11px;color:var(--text3);font-weight:500;margin-top:2px;}
.adm-toggle .sw{position:relative;width:44px;height:26px;background:var(--text4);border-radius:var(--r-full);cursor:pointer;flex-shrink:0;transition:background .2s;}
.adm-toggle .sw::after{content:"";position:absolute;top:3px;right:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:right .2s var(--t2);box-shadow:0 1px 3px rgba(0,0,0,.2);}
.adm-toggle.on .sw{background:var(--green);}
.adm-toggle.on .sw::after{right:21px;}

/* admin radio group */
.adm-radio-group{margin:9px 0;background:#fff;border-radius:var(--r);padding:11px;border:1px solid var(--border);}
.adm-radio-t{font-size:12.5px;font-weight:700;color:var(--text2);margin-bottom:8px;}
.adm-radio-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.adm-radio{display:flex;align-items:center;gap:6px;padding:9px 10px;background:var(--surface2);border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--text2);border:1.5px solid transparent;transition:all .15s var(--t1);}
.adm-radio input{display:none;}
.adm-radio:hover{background:var(--blue3);}
.adm-radio.on{background:var(--blue);color:#fff;border-color:var(--blue2);}

/* ═══════════ BUTTONS ═══════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 18px;border-radius:var(--r);font-size:14px;font-weight:700;transition:all .15s var(--t1);text-decoration:none;border:1px solid transparent;cursor:pointer;min-height:46px;}
.btn:active{transform:scale(.97);}
.btn-prim{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;}
.btn-prim:active{box-shadow:0 4px 12px rgba(26,110,181,.35);}
.btn-sun{background:linear-gradient(135deg,var(--sun),var(--sun2));color:#3a2502;}
.btn-grn{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;}
.btn-purp{background:linear-gradient(135deg,#6535a8,#4a2178);color:#fff;}
.btn-out{background:#fff;border:1.5px solid var(--border);color:var(--text2);}
.btn-out:active{border-color:var(--blue);color:var(--blue);background:var(--blue3);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f2c0c0;}
.btn-danger:active{background:var(--danger);color:#fff;}
.btn-block{width:100%;}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-sm{padding:8px 12px;font-size:12.5px;min-height:36px;}

/* ═══════════ FORM ═══════════ */
.fm{display:flex;flex-direction:column;gap:14px;}
.fm-grp{display:flex;flex-direction:column;gap:5px;}
.fm-grp.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fm-l{font-size:12px;color:var(--text2);font-weight:700;display:flex;align-items:center;gap:4px;}
.fm-l .req{color:var(--danger);}
.fm-l .opt{color:var(--text4);font-weight:500;font-size:11px;}
.fm-i{padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:15px;background:#fafbfd;outline:none;transition:all .15s var(--t1);width:100%;font-family:var(--font);}
.fm-i:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,110,181,.1);}
.fm-i.ltr{direction:ltr;text-align:right;}
textarea.fm-i{resize:vertical;min-height:80px;}
.fm-help{font-size:11.5px;color:var(--text3);margin-top:1px;}
.fm-img-area{border:2px dashed var(--border);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer;transition:all .15s var(--t1);background:var(--surface2);}
.fm-img-area:active{border-color:var(--blue);background:var(--blue3);}
.fm-img-area.has{padding:9px;background:#fff;border-style:solid;}
.fm-img-prev{width:100px;height:100px;border-radius:var(--r);object-fit:cover;margin:0 auto;display:block;border:1px solid var(--border);}
.fm-img-icon{font-size:30px;margin-bottom:5px;color:var(--text3);}
.fm-img-t{font-size:13px;font-weight:700;color:var(--text2);}
.fm-img-s{font-size:11px;color:var(--text3);margin-top:2px;}
.fm-img-rm{margin-top:9px;font-size:12px;color:var(--danger);font-weight:700;cursor:pointer;}
.fm-loc{display:flex;gap:7px;align-items:stretch;}
.fm-loc input{flex:1;}
.fm-loc-btn{padding:0 14px;border-radius:var(--r);background:var(--green3);color:var(--green2);font-size:12px;font-weight:700;border:1px solid #b8dec3;display:flex;align-items:center;gap:5px;white-space:nowrap;min-height:46px;}
.fm-loc-btn:active{background:var(--green);color:#fff;}
.fm-loc-btn:disabled{opacity:.5;}
.fm-success{padding:14px;background:var(--green3);color:var(--green2);border-radius:var(--r);font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.fm-error{padding:11px 13px;background:var(--danger-bg);color:var(--danger);border-radius:var(--r);font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;}
.fm-info{padding:12px 13px;background:var(--blue3);color:var(--blue2);border-radius:var(--r);font-size:12.5px;line-height:1.55;}
.fm-warn{padding:12px 13px;background:var(--sun3);color:var(--sun2);border-radius:var(--r);font-size:12.5px;line-height:1.55;border:1px solid #f5d99e;}
.fm-section-t{font-size:12px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:8px 0 4px;display:flex;align-items:center;gap:6px;}
.fm-section-t::before{content:"";flex:0 0 16px;height:2px;background:var(--blue);border-radius:2px;}

/* ═══════════ FILTER DRAWER ═══════════ */
.drw-bg{position:fixed;inset:0;background:rgba(15,28,55,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:90;display:none;animation:fadeIn .2s;}
.drw-bg.show{display:block;}
.drw{position:fixed;bottom:0;right:0;left:0;background:#fff;z-index:91;border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s var(--t2);box-shadow:var(--shadow-xl);padding-bottom:var(--safe-bot);}
.drw.show{transform:translateY(0);}
.drw-hd{padding:10px 16px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);}
.drw-bd{padding:14px 16px;overflow-y:auto;flex:1;}
.drw-section{margin-bottom:18px;}
.drw-section-t{font-size:12px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.drw-letters{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.drw-letter{height:42px;border-radius:9px;background:var(--surface2);color:var(--text2);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.drw-letter:active,.drw-letter.on{background:var(--blue);color:#fff;}
.drw-fams{display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;}
.drw-fam{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r-full);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;border:1px solid transparent;}
.drw-fam:active,.drw-fam.on{background:var(--blue);color:#fff;border-color:var(--blue2);}
.drw-fam .ct{background:rgba(255,255,255,.5);padding:0 7px;border-radius:var(--r-full);font-size:11px;font-weight:800;}
.drw-fam.on .ct{background:rgba(0,0,0,.18);color:#fff;}
.drw-toggles{display:flex;flex-wrap:wrap;gap:7px;}
.drw-toggle{display:inline-flex;align-items:center;gap:5px;padding:9px 14px;border-radius:var(--r-full);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;border:1px solid transparent;}
.drw-toggle:active,.drw-toggle.on{background:var(--green);color:#fff;border-color:var(--green2);}
.drw-toggle.sun.on{background:var(--sun);color:#3a2502;border-color:var(--sun2);}
.drw-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
.drw-foot .btn{flex:1;}

/* ═══════════ TOAST ═══════════ */
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);left:50%;transform:translateX(-50%) translateY(-200%);background:var(--blue2);color:#fff;padding:13px 22px;border-radius:var(--r-full);font-size:14px;font-weight:700;box-shadow:var(--shadow-lg);z-index:1000;transition:transform .3s var(--t2);max-width:calc(100% - 28px);text-align:center;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:linear-gradient(135deg,var(--green),var(--green2));}
.toast.err{background:linear-gradient(135deg,var(--danger),#891818);}
.toast.warn{background:linear-gradient(135deg,var(--sun),var(--sun2));color:#3a2502;}

/* ═══════════ ADMIN PANEL ═══════════ */
.adm-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.adm-tabs::-webkit-scrollbar{display:none;}
.adm-tab{padding:12px 16px;font-size:13px;font-weight:700;color:var(--text3);position:relative;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px;}
.adm-tab.on{color:var(--blue2);}
.adm-tab.on::after{content:"";position:absolute;bottom:-1px;right:0;left:0;height:3px;background:var(--blue);border-radius:3px 3px 0 0;}
.adm-tab .ct{background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:var(--r-full);min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;}
.adm-list{display:flex;flex-direction:column;gap:9px;}
.adm-itm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:9px;}
.adm-itm-hd{display:flex;align-items:flex-start;gap:10px;}
.adm-itm-info{flex:1;min-width:0;}
.adm-itm-t{font-size:14.5px;font-weight:700;}
.adm-itm-s{font-size:12px;color:var(--text3);margin-top:2px;}
.adm-itm-time{font-size:10.5px;color:var(--text3);direction:ltr;text-align:left;}
.adm-itm-body{background:#fff;padding:10px 12px;border-radius:var(--r);font-size:13px;line-height:1.6;}
.adm-itm-body strong{color:var(--blue2);}
.adm-itm-actions{display:flex;gap:7px;}
.adm-diff{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.adm-diff-side{padding:9px 11px;border-radius:9px;font-size:12.5px;}
.adm-diff-old{background:var(--danger-bg);color:#7d1a1a;}
.adm-diff-new{background:var(--green3);color:var(--green2);}
.adm-diff-l{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;opacity:.7;}
.adm-diff-v{font-weight:600;word-break:break-word;}
.adm-empty{text-align:center;padding:30px 16px;color:var(--text3);}
.adm-empty-i{font-size:42px;margin-bottom:8px;opacity:.5;}

/* ═══════════ LOADING ═══════════ */
.spin{width:18px;height:18px;border:2.5px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* WhatsApp brand button (share modal) */
.share-btn-wa{background:linear-gradient(135deg,#25D366 0%,#128C7E 100%)!important;color:#fff!important;border:none!important;box-shadow:0 3px 10px rgba(37,211,102,.35);}
.share-btn-wa:active{box-shadow:0 5px 14px rgba(37,211,102,.5);}
.share-btn-wa .share-btn-i{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;}
.share-btn-wa .share-btn-i svg{display:block;}

/* Help button in header — distinct sun/yellow pill so it stands out */
.hd-help{width:auto!important;border-radius:var(--r-full);padding:0 14px 0 12px;gap:6px;background:var(--sun)!important;color:#3a2502!important;border:1.5px solid var(--sun2);box-shadow:0 2px 8px rgba(245,166,35,.4);}
.hd-help:hover,.hd-help:active{background:var(--sun2)!important;color:#fff!important;}
.hd-help-i{font-size:16px;line-height:1;}
.hd-help-l{font-size:12.5px;font-weight:800;white-space:nowrap;}
.hd-help-new{position:absolute;top:-6px;left:-6px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:var(--r-full);box-shadow:0 2px 6px rgba(191,36,36,.4);animation:newPulse 2s ease-in-out infinite;letter-spacing:.5px;}
.hd-help-new.hidden{display:none;}
@keyframes newPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.hd-help{position:relative;}
@media(max-width:679px){
  .hd-help{padding:0 11px;}
  .hd-help-l{font-size:11.5px;}
}
/* Very small screens: hide the long label, keep the icon */
@media(max-width:430px){
  .hd-help-l{display:none;}
}

/* Help modal styling */
.help-step{display:flex;gap:13px;padding:14px;background:var(--surface2);border-radius:var(--r);margin-bottom:10px;border:1px solid var(--border);}
.help-step-i{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#fff;border:1px solid var(--border);}
.help-step.blue .help-step-i{background:var(--blue3);}
.help-step.green .help-step-i{background:var(--green3);}
.help-step.sun .help-step-i{background:var(--sun3);}
.help-step.purple .help-step-i{background:#ede8f8;}
.help-step.danger .help-step-i{background:var(--danger-bg);}
.help-step-text{flex:1;}
.help-step-t{font-size:14.5px;font-weight:800;color:var(--text);margin-bottom:5px;}
.help-step.blue .help-step-t{color:var(--blue2);}
.help-step.green .help-step-t{color:var(--green2);}
.help-step.sun .help-step-t{color:var(--sun2);}
.help-step.purple .help-step-t{color:#4a2178;}
.help-step.danger .help-step-t{color:var(--danger);}
.help-step-d{font-size:12.5px;color:var(--text2);line-height:1.7;}
.help-step-d strong{color:var(--text);font-weight:700;}
.help-divider{display:flex;align-items:center;gap:8px;margin:18px 0 10px;font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;}
.help-divider::before,.help-divider::after{content:"";flex:1;height:1px;background:var(--border);}
@media(min-width:680px){
  .hd-inner{padding:14px 20px;gap:14px;}
  .hd-logo{height:50px;width:50px;}
  .hd-title{font-size:19px;}
  .hd-yp{font-size:11px;padding:3px 10px;}
  .hd-sub{display:block;}
  .hd-iconbtn{width:44px;height:44px;font-size:18px;}
  .sbar{top:78px;}
  .sbar-inner{padding:14px 20px;}
  .stats{display:grid;padding:0 20px;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
  .stat{padding:14px 16px;}
  .stat-v{font-size:22px;}
  .stat-l{font-size:12px;}
  .ct{padding:18px 20px 30px;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:13px;}
  .bn{display:none;}
  .modal-bg{align-items:center;padding:30px;}
  .modal{border-radius:var(--r-xl);max-height:88vh;}
  .modal-handle{display:none;}
  .drw-bg,.drw{display:none!important;}
  .desktop-show{display:flex!important;}
  .mobile-only{display:none!important;}
}
@media(max-width:679px){
  .desktop-only{display:none!important;}
}

/* desktop letters bar inline */
.sb-letters-desktop{display:none;gap:3px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.sb-letters-desktop::-webkit-scrollbar{display:none;}
.sb-letter{flex-shrink:0;min-width:32px;height:32px;padding:0 8px;border-radius:8px;background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;transition:all .15s var(--t1);}
.sb-letter:hover{background:var(--blue3);color:var(--blue2);}
.sb-letter.on{background:var(--blue);color:#fff;}
@media(min-width:680px){.sb-letters-desktop{display:flex;}}

/* desktop header inline filters */
.sb-row-desktop{display:none;gap:7px;flex-wrap:wrap;align-items:center;}
@media(min-width:680px){.sb-row-desktop{display:flex;}}

/* ═══════════ PRINT ═══════════ */
@media print{
  .hd,.sbar,.bn,.card-actions,.pg{display:none!important;}
  body{background:#fff;}
  .grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .card{break-inside:avoid;border:1px solid #ddd;box-shadow:none;}
}
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="hd">
  <div class="hd-inner">
    <div class="hd-logo">
      <img id="LOGO" alt="شعار بلدية وادي الست">
    </div>
    <div class="hd-title-wrap">
      <div class="hd-title">دليل وادي الست <span class="hd-yp">Yellow Pages</span></div>
      <div class="hd-sub">دليل البلدة — أرقام، عائلات، مهن، وخدمات</div>
    </div>
    <div class="hd-actions">
      <a class="hd-iconbtn hd-back" href="https://iantradingsal.github.io/wadi-el-sit-main-gate/" title="العودة لبوابة الخدمات الإلكترونية" aria-label="العودة">
        <span class="hd-back-i">🏛️</span>
        <span class="hd-back-l">البوابة الرئيسية</span>
      </a>
      <button class="hd-iconbtn hd-help" onclick="markWhatsNewSeen();openInfoModal('whatsnew');" title="دليل الاستخدام والمساعدة" aria-label="المساعدة">
        <span class="hd-help-i">❓</span>
        <span class="hd-help-l">دليل الاستخدام والمساعدة</span>
        <span class="hd-help-new" id="HD_HELP_NEW">جديد</span>
      </button>
      <button class="hd-iconbtn desktop-only" onclick="openAdd()" title="إضافة جهة اتصال" aria-label="إضافة">➕</button>
      <button class="hd-iconbtn desktop-only" id="HD_ADM" onclick="openAdmin()" title="لوحة الإدارة" aria-label="الإدارة">🛡️<span class="dot"></span></button>
      <button class="hd-iconbtn desktop-only" onclick="window.print()" title="طباعة" aria-label="طباعة">🖨️</button>
    </div>
  </div>
</header>

<!-- ═══════════ SEARCH BAR ═══════════ -->
<div class="sbar">
  <div class="sbar-inner">
    <div class="sb-row">
      <div class="sb-search">
        <span class="sb-icon">🔍</span>
        <input type="search" id="Q" placeholder="ابحث: اسم • عائلة • رقم • مهنة (عربي / English / Français)" autocomplete="off" inputmode="search" dir="auto">
        <button class="sb-clear" id="QC" onclick="clearSearch()" aria-label="مسح">✕</button>
      </div>
      <button class="sb-filter-btn" id="FB" onclick="openDrawer()" aria-label="فلاتر">
        🎚️
        <span class="ct" id="FB_CT" style="display:none">0</span>
      </button>
    </div>
    <div class="sb-letters-desktop" id="LTR_D"></div>
    <div class="sb-row-desktop" id="FLT_D"></div>
  </div>
</div>

<!-- ═══════════ STATS ═══════════ -->
<div class="stats" id="STS"></div>

<!-- ═══════════ CONTENT ═══════════ -->
<div class="ct">
  <div class="ri">
    <div class="ri-text" id="RIT">جاري التحميل…</div>

// Extract neighborhood/area from a free-text address (first chunk before separator)
function extractArea(addr){
  if(!addr) return '';
  let s = addr.toString().trim();
  // Common separators in Lebanese addresses
  const seps = ['—','–','-',',','،','/'];
  for(const sep of seps){
    const idx = s.indexOf(sep);
    if(idx > 0 && idx < 60){ s = s.slice(0, idx).trim(); break; }
  }
  // Strip leading "حي " / "حارة " for cleaner grouping
  return s.replace(/^(حي|حارة|منطقة|محلة)\s+/,'').trim();
}

function arToLat(s, mode){
  if(!s) return '';
  const m = LAT_MAPS[mode] || LAT_MAPS.en;
  let out = '';
  for(const ch of s.toString()){ out += m[ch] !== undefined ? m[ch] : ch; }
  return out.toLowerCase().replace(/\s+/g,' ').trim();
}
// Lossy phonetic — drops vowels but keeps h/w, unifies sh/ch/q/k, collapses doubles
function lossyAlpha(s){
  return (s||'').toString().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/sh/g,'s').replace(/ch/g,'s').replace(/ph/g,'f').replace(/kh/g,'k').replace(/gh/g,'g').replace(/th/g,'t').replace(/q/g,'k')
    .replace(/ou/g,'u').replace(/oo/g,'u').replace(/ee/g,'i').replace(/aw/g,'w')
    .replace(/[aeiouy]/g,'')
    .replace(/([a-z])\1+/g,'$1')
    .replace(/[^a-z\s]/g,'')
    .replace(/\s+/g,' ').trim();
}
// Convert Arabic-Indic (٠١٢٣٤٥٦٧٨٩) and Persian (۰۱۲۳۴۵۶۷۸۹) digits to Latin (0-9)
function toLatinDigits(s){
  if(!s) return '';
  return s.toString()
    .replace(/[\u0660-\u0669]/g, d => String.fromCharCode(d.charCodeAt(0) - 0x0660 + 48))  // Arabic-Indic
    .replace(/[\u06F0-\u06F9]/g, d => String.fromCharCode(d.charCodeAt(0) - 0x06F0 + 48)); // Extended Arabic-Indic (Persian)
}
// digitsOnly: now first converts any Arabic/Persian digits to Latin, then strips non-digits
function digitsOnly(s){ return toLatinDigits(s||'').replace(/\D/g,''); }

function aliasesFor(arText){
  const out = [];
  if(!arText) return '';
  for(const [ar, alts] of Object.entries(NAME_ALIASES)){
    if(arText.includes(ar)) out.push(...alts);
  }
  for(const [ar, alts] of Object.entries(OCC_ALIASES)){
    if(arText.includes(ar)) out.push(...alts);
  }
  return out.join(' ');
}

// Build a multi-form search blob for one contact
function buildSearchBlob(c){
  const arText = [c.name, c.first, c.family, c.father, c.mother, c.occupation, c.address, c.work_address, c.notes].filter(Boolean).join(' ');
  const arN  = normAr(arText);
  const en   = arToLat(arText,'en');
  const fr   = arToLat(arText,'fr');
  const alt  = arToLat(arText,'alt');
  const aliases = aliasesFor(arText);
  const allLat = (en+' '+fr+' '+alt+' '+aliases+' '+(c.email||'')).toLowerCase();
  const loss = lossyAlpha(allLat);
  const phones = [c.phone, c.work_phone, c.wa].filter(Boolean).map(digitsOnly).join(' ');
  return arN + ' | ' + allLat + ' | ' + loss + ' | ' + phones;
}

// Try query in 4 forms: lowercase, Arabic-normalized, digits-only, lossy
function matchesQuery(blob, q){
  if(!q) return true;
  const ql = q.toLowerCase().trim();
  if(!ql) return true;
  if(blob.includes(ql)) return true;
  const qa = normAr(q);
  if(qa && qa !== ql && blob.includes(qa)) return true;
  const qd = digitsOnly(q);
  if(qd && qd.length >= 3 && blob.includes(qd)) return true;
  const qLossy = lossyAlpha(q);
  if(qLossy){
    if(qLossy.length >= 3 && blob.includes(qLossy)) return true;
    // For 2-char lossy, require word boundary
    if(qLossy.length === 2){
      const re = new RegExp('(^|\\s)' + qLossy + '($|\\s)');
      if(re.test(blob)) return true;
    }
  }
  return false;
}
function firstLetter(name){ return normAr(name).charAt(0) || ''; }
function avatarColor(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return 'av-'+(Math.abs(h)%8+1); }
function initials(name){ const p=(name||'').trim().split(/\s+/); return p.length>=2?(p[0][0]||'')+(p[p.length-1][0]||''):(p[0]||'').slice(0,2); }
function toast(msg, type='ok'){ const t=document.getElementById('TST'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.className='toast',3200); }
function escHtml(s){ return (s==null?'':s).toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtPhone(p){ if(!p) return ''; let s=p.toString().replace(/\s+/g,''); if(s.startsWith('+961') && s.length===12) return '+961 '+s.slice(4,5)+' '+s.slice(5,8)+' '+s.slice(8,12); return s; }
function fmtTime(d){ if(!d) return ''; const dt=new Date(d); return dt.toLocaleString('ar-LB',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }

function getEnriched(c){
  const ex = EXTRAS[c.id] || {};
  return {
    ...c,
    occupation: ex.occupation || c.occupation || '',
    email: ex.email || c.email || '',
    image: ex.image || c.image || '',
    lat: ex.lat ?? c.lat ?? null,
    lng: ex.lng ?? c.lng ?? null,
    phone: ex.phone || c.phone,
    address: ex.address || c.address || '',
    work_phone: ex.work_phone || '',
    work_address: ex.work_address || '',
    work_lat: ex.work_lat ?? null,
    work_lng: ex.work_lng ?? null,
    phone_hidden: !!ex.phone_hidden,
    address_hidden: !!ex.address_hidden,
    entry_hidden: !!ex.entry_hidden,
    disable_call: !!ex.disable_call,
    disable_wa: !!ex.disable_wa,
    _src: 'registry'
  };
}

function getAllPublic(){
  const reg = REGISTRY.map(getEnriched);
  const added = ADDED.filter(a=>a.status==='approved').map(c=>({...c, _src:'user_added'}));
  // Show user's own pending entries (so they see them after submit)
  const myPend = MY_PENDING.filter(p => !ADDED.some(a => a.id === p.id)).map(c=>({...c, _src:'user_added', _myPending:true}));
  let all = [...reg, ...added, ...myPend];
  // Non-admin viewers: hide entries that are flagged entry_hidden (unless it's their own pending)
  if(!isAdmin){
    all = all.filter(c => !c.entry_hidden || c._myPending);
  }
  return all;
}

function hasPendingEditFor(c){
  // show "edit pending" badge if any pending_edit targets this contact
  if(c._src === 'registry'){
    return PENDING_EDITS.some(e => e.target_type === 'registry' && e.ref_id === c.id);
  }
  return PENDING_EDITS.some(e => e.target_type === 'user_added' && e.target_entry_id === c.id);
}

// FILTER / SORT
// ═══════════════════════════════════════════════════════════════════════════
function getFiltered(){
  const all = getAllPublic();
  return all.filter(c => {
    if(letterF && firstLetter(c.first || c.name) !== letterF) return false;
    if(famF && c.family !== famF) return false;
    if(occF && !c.occupation) return false;
    if(imgF && !c.image) return false;
    if(addedF && c._src !== 'user_added') return false;
    if(locF && extractArea(c.address) !== locF) return false;
    if(occNameF && (c.occupation||'').trim() !== occNameF) return false;
    if(qF){
      const blob = buildSearchBlob(c);
      if(!matchesQuery(blob, qF)) return false;
    }
    return true;
  }).sort((a,b)=> {
    if(a._myPending && !b._myPending) return -1;
    if(b._myPending && !a._myPending) return 1;
    if(a._src !== b._src && !qF && !famF && !letterF){
      return a._src === 'user_added' ? -1 : 1;
    }
    return (a.name||'').localeCompare(b.name||'','ar');
  });
}

function renderCard(c){
  const cls = avatarColor(c.family || c.name || '');
  const init = initials(c.name);
  const av = c.image
    ? `<div class="av"><img src="${escHtml(c.image)}" alt=""></div>`
    : `<div class="av ${cls}">${escHtml(init)}</div>`;
  const phoneOk = !!c.phone && !c.phone_hidden;
  const callOk  = phoneOk && !c.disable_call;
  const waOk    = phoneOk && c.cc === 'lb' && !c.disable_wa;
  const mapOk   = (c.lat && c.lng) && !c.address_hidden;
  const occHtml = c.occupation ? `<div class="card-occ">${escHtml(c.occupation)}</div>` : '';
  const addrHtml = (c.address && !c.address_hidden) ? `<div class="card-addr">${escHtml(c.address)}</div>` : '';

  let badgeHtml = '';
  if(c.entry_hidden) badgeHtml = '<span class="card-badge cb-hidden">🚫 مخفية</span>';
  else if(c._myPending) badgeHtml = '<span class="card-badge cb-pending">قيد المراجعة</span>';
  else if(c._src === 'user_added') badgeHtml = '<span class="card-badge cb-new">جديد</span>';
  else if(hasPendingEditFor(c)) badgeHtml = '<span class="card-badge cb-edit-pending">تعديل معلّق</span>';

  const phoneBlock = c.phone_hidden
    ? `<div class="card-phone-hidden">الرقم مخفي بطلب صاحبه</div>`
    : (c.phone ? `<div class="card-phone">${fmtPhone(c.phone)}</div>` : '');

  return `<div class="card ${c.image?'has-img':''} ${c._src==='user_added'?'user-added':''} ${c.entry_hidden?'is-hidden':''}">
    ${badgeHtml}
    <div class="card-row" onclick='openDetail(${JSON.stringify(c).replace(/'/g,"&apos;")})'>
      ${av}
      <div class="card-info">
        <div class="card-name">${escHtml(c.name)}</div>
        <div class="card-fam">${c.family ? `<span class="card-fam-pill">${escHtml(c.family)}</span>` : ''}</div>
        ${occHtml}
      </div>
    </div>
    ${phoneBlock}
    ${addrHtml}
    <div class="card-actions">
      <a class="qa qa-tel ${callOk?'':'dis'}" href="${callOk?`tel:${c.phone}`:'#'}" aria-label="اتصال"><span class="qa-i">📞</span><span class="qa-l">اتصال</span></a>
      <a class="qa qa-wa ${waOk?'':'dis'}" href="${waOk?`https://wa.me/${c.wa}`:'#'}" target="_blank" rel="noopener" aria-label="واتساب"><span class="qa-i">💬</span><span class="qa-l">واتساب</span></a>
      <a class="qa qa-map ${mapOk?'':'dis'}" href="${mapOk?`https://www.google.com/maps?q=${c.lat},${c.lng}`:'#'}" target="_blank" rel="noopener" aria-label="الموقع"><span class="qa-i">📍</span><span class="qa-l">الموقع</span></a>
      <button class="qa qa-edit" onclick='event.stopPropagation();openEdit(${JSON.stringify(c).replace(/'/g,"&apos;")})' aria-label="تعديل"><span class="qa-i">✏️</span><span class="qa-l">تعديل</span></button>
    </div>
  </div>`;
}

function renderGrid(){
  const filt = getFiltered();
  const total = filt.length;
  const totalAll = getAllPublic().length;
  const start = (pgN-1) * PER_PAGE;
  const end = Math.min(start + PER_PAGE, total);
  const slice = filt.slice(start, end);

  const filtersOn = qF || famF || letterF || occF || imgF || addedF;
  document.getElementById('RIC').style.display = filtersOn ? 'inline-flex' : 'none';
  if(total === 0){
    document.getElementById('RIT').innerHTML = '0 نتائج';
  } else {
    document.getElementById('RIT').innerHTML = filtersOn
      ? `عُثر على <strong>${total}</strong> من ${totalAll}`
      : `<strong>${start+1}-${end}</strong> من ${total}`;
  }

  const grd = document.getElementById('GRD');
  const emp = document.getElementById('EMP');
  if(total === 0){
    grd.innerHTML = ''; grd.style.display='none'; emp.style.display='block';
  } else {
    grd.style.display='grid'; emp.style.display='none';
    grd.innerHTML = slice.map(renderCard).join('');
  }
  renderPg(total);
}

function renderPg(total){
  const pages = Math.ceil(total / PER_PAGE);
  const pg = document.getElementById('PG');
  if(pages <= 1){ pg.innerHTML = ''; return; }
  let html = `<button class="pg-btn" ${pgN<=1?'disabled':''} onclick="goPage(${pgN-1})">‹</button>`;
  const range = [1];
  for(let i = Math.max(2, pgN-1); i <= Math.min(pages-1, pgN+1); i++) range.push(i);
  if(pages > 1) range.push(pages);
  let prev = 0;
  range.forEach(p => {
    if(p - prev > 1) html += `<span class="pg-info">…</span>`;
    html += `<button class="pg-btn ${p===pgN?'on':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="pg-btn" ${pgN>=pages?'disabled':''} onclick="goPage(${pgN+1})">›</button>`;
  pg.innerHTML = html;
}

// Build a beautifully formatted multi-line message with EVERY detail of a contact
// Optimized for WhatsApp: ONE prominent map link near top so WhatsApp shows preview;
// no self-referential wa.me link in body (WhatsApp gets confused otherwise).
function buildShareMessage(c){
  const lines = [];
  lines.push('📒 *دليل وادي الست*');
  lines.push('');
  lines.push(`👤 *${c.name || ''}*`);
  if(c.family) lines.push(`👨‍👩‍👧 آل ${c.family}`);
  if(c.father) lines.push(`الأب: ${c.father}`);
  if(c.mother) lines.push(`الأم: ${c.mother}`);
  lines.push('');

  // Phone (no wa.me link in body — recipients can long-press the number to open WhatsApp)
  if(c.phone && !c.phone_hidden){
    lines.push(`📞 ${fmtPhone(c.phone)}`);
  } else if(c.phone_hidden){
    lines.push(`🔒 الرقم مخفي بطلب صاحبه`);
  }
  if(c.email) lines.push(`✉️ ${c.email}`);
  if(c.address && !c.address_hidden) lines.push(`📍 ${c.address}`);

  // Work info (without map link here — keep map links to ONE for preview)
  const hasWork = c.occupation || c.work_phone || c.work_address;
  if(hasWork){
    lines.push('');
    lines.push('━ *معلومات العمل* ━');
    if(c.occupation) lines.push(`💼 ${c.occupation}`);
    if(c.work_phone) lines.push(`☎️ ${fmtPhone(c.work_phone)}`);
    if(c.work_address) lines.push(`🏢 ${c.work_address}`);
  }

  // Notes
  if(c.notes){
    lines.push('');
    lines.push(`📝 ${c.notes}`);
  }

  // Map link goes LAST and ALONE on its line — WhatsApp will use it for the rich preview
  // Prefer the personal location; fallback to work location
  let mapLat = null, mapLng = null, mapLabel = '';
  if(c.lat && c.lng && !c.address_hidden){ mapLat = c.lat; mapLng = c.lng; mapLabel = 'الموقع'; }
  else if(c.work_lat && c.work_lng){ mapLat = c.work_lat; mapLng = c.work_lng; mapLabel = 'موقع العمل'; }

  if(mapLat && mapLng){
    lines.push('');
    lines.push(`🗺️ ${mapLabel} على الخريطة:`);
    // Use Google Maps share-friendly URL format that previews nicely on WhatsApp
    lines.push(`https://maps.google.com/?q=${mapLat},${mapLng}`);
  }

  lines.push('');
  lines.push('— من دليل بلدية وادي الست');

  return lines.join('\n');
}

// Build a standards-compliant vCard 3.0 string
function buildVCard(c){
  const lines = ['BEGIN:VCARD','VERSION:3.0'];
  // Name fields
  // FN = formatted full name; N = structured (Family;Given;Middle;Prefix;Suffix)
  lines.push(`FN:${c.name || ''}`);
  lines.push(`N:${c.family || ''};${c.first || ''};${c.father || ''};;`);
  if(c.family) lines.push(`X-FAMILY:${c.family}`);
  if(c.father) lines.push(`X-FATHER:${c.father}`);
  if(c.mother) lines.push(`X-MOTHER:${c.mother}`);

  // Phones
  if(c.phone && !c.phone_hidden){
    lines.push(`TEL;TYPE=CELL,VOICE,pref:${c.phone}`);
    // WhatsApp-friendly secondary entry
    if(c.cc === 'lb' && !c.disable_wa && c.wa){
      lines.push(`X-WHATSAPP:+${c.wa}`);
    }
  }
  if(c.work_phone) lines.push(`TEL;TYPE=WORK,VOICE:${c.work_phone}`);

  // Email
  if(c.email) lines.push(`EMAIL;TYPE=INTERNET:${c.email}`);

  // Addresses (ADR: PO;Extended;Street;City;State;Zip;Country)
  if(c.address && !c.address_hidden){
    lines.push(`ADR;TYPE=HOME:;;${c.address.replace(/\n/g,', ')};وادي الست;الشوف;;لبنان`);
  }
  if(c.work_address){
    lines.push(`ADR;TYPE=WORK:;;${c.work_address.replace(/\n/g,', ')};;;;لبنان`);
  }

  // Geo (only one — use personal first, then work)
  if(c.lat && c.lng && !c.address_hidden){
    lines.push(`GEO:${c.lat};${c.lng}`);
    lines.push(`URL;TYPE=Map:https://maps.google.com/?q=${c.lat},${c.lng}`);
  } else if(c.work_lat && c.work_lng){
    lines.push(`GEO:${c.work_lat};${c.work_lng}`);
    lines.push(`URL;TYPE=Map:https://maps.google.com/?q=${c.work_lat},${c.work_lng}`);
  }

  // Title / occupation
  if(c.occupation){ lines.push(`TITLE:${c.occupation}`); lines.push(`ROLE:${c.occupation}`); }
  if(c.notes) lines.push(`NOTE:${c.notes.replace(/\n/g,'\\n')}`);

  // Photo (if present, embed as base64)
  if(c.image && c.image.startsWith('data:image/')){
    const m = c.image.match(/^data:image\/(\w+);base64,(.+)$/);
    if(m) lines.push(`PHOTO;ENCODING=b;TYPE=${m[1].toUpperCase()}:${m[2]}`);
  }

  // Source / categories
  lines.push('CATEGORIES:دليل وادي الست');
  lines.push(`REV:${new Date().toISOString()}`);
  lines.push('END:VCARD');
  return lines.join('\r\n');
}

function shareAsVCard(){
  // Reconstruct vCard from the same contact stored in dataset on the modal
  const c = window.__SHR_CONTACT;
  if(!c){ toast('⚠️ تعذّر إنشاء البطاقة','err'); return; }
  const vcf = buildVCard(c);
  const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const safeName = (c.name || 'contact').replace(/[^a-z\u0600-\u06FF0-9 _-]/gi, '').slice(0,40) || 'contact';

  // On mobile, navigator.share with files works on iOS 16+ and Android Chrome
  const file = new File([blob], `${safeName}.vcf`, { type: 'text/vcard' });
  if(navigator.canShare && navigator.canShare({ files: [file] })){
    navigator.share({
      title: c.name,
      text: `جهة اتصال: ${c.name} — من دليل وادي الست`,
      files: [file]
    }).then(()=> toast('✅ تمت المشاركة')).catch(err => {
      if(err.name !== 'AbortError') downloadVCardFallback(url, safeName);
    });
  } else {
    downloadVCardFallback(url, safeName);
  }
}
function downloadVCardFallback(url, safeName){
  const a = document.createElement('a');
  a.href = url;
  a.download = `${safeName}.vcf`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  toast('✅ تم تنزيل البطاقة — افتحها لإضافتها لجهات الاتصال');
}

function shareViaWhatsapp(){
  const text = _getShareText();
  // Use api.whatsapp.com on mobile (deeper integration, opens app directly)
  // and wa.me on desktop. Both auto-detect, but api.whatsapp.com handles long text better
  const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  const url = isMobile
    ? `whatsapp://send?text=${encodeURIComponent(text)}`
    : `https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`;
  // Try the deep link first; if browser blocks, fall back to wa.me
  try {
    const w = window.open(url, '_blank');
    // Fallback after a moment if deep link didn't trigger
    setTimeout(() => {
      if(!w || w.closed){
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      }
    }, 600);
  } catch(e){
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  }
}
function shareViaSystem(){
  const text = _getShareText();
  const name = _getShareName();
  if(navigator.share){
    navigator.share({ title: name, text }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=> toast('✅ تم نسخ النصّ، ألصِقه أينما تريد'));
  }
}
function shareCopy(){
  const text = _getShareText();
  navigator.clipboard.writeText(text).then(()=> toast('✅ تم نسخ كل التفاصيل'));
}
function shareViaEmail(){
  const text = _getShareText();
  const name = _getShareName();
  window.location.href = `mailto:?subject=${encodeURIComponent('جهة اتصال: '+name)}&body=${encodeURIComponent(text)}`;
}

// HIDE TOGGLE (admin only)
// ═══════════════════════════════════════════════════════════════════════════
async function toggleHide(srcType, contactId, field, btn){
  if(!isAdmin || !sb){ toast('⚠️ يجب تسجيل الدخول كأدمن أولاً','err'); return; }
  const willOn = !btn.classList.contains('on');
  btn.classList.toggle('on', willOn);
  try {
    if(srcType === 'registry'){
      const refId = parseInt(contactId);
      const existing = EXTRAS[refId] || {};
      const payload = { mun_id: MUN_ID, ref_id: refId, ...existing, [field]: willOn, status:'approved' };
      delete payload.id;
      // Strip columns that may not exist in older schemas
      delete payload.deleted_by_admin;
      delete payload.deleted_at;
      const { data, error } = await sb.from('phonebook_extras').upsert(payload, { onConflict: 'mun_id,ref_id' }).select().single();
      if(error) throw error;
      EXTRAS[refId] = { ...EXTRAS[refId], [field]: willOn };
    } else {
      const { error } = await sb.from('phonebook_entries').update({ [field]: willOn }).eq('id', contactId);
      if(error) throw error;
      ADDED = ADDED.map(a => a.id === contactId ? { ...a, [field]: willOn } : a);
    }
    toast(willOn ? '✅ تم الإخفاء — أصبحت غير مرئية للزوّار' : '✅ تمّت إعادة الإظهار', 'ok');
    closeModal();
    renderGrid(); renderStats();
  } catch(ex){
    btn.classList.toggle('on', !willOn);
    console.error('toggleHide error:', ex);
    const detail = ex?.message || ex?.hint || 'سبب غير معروف';
    toast(`⚠️ تعذّر الحفظ: ${detail.slice(0,80)}`, 'err');
  }
}

// Set 3 phone-related flags together based on radio choice
async function setPhoneMode(srcType, contactId, mode){
  if(!isAdmin || !sb){ toast('⚠️ يجب تسجيل الدخول كأدمن أولاً','err'); return; }
  const flags = { phone_hidden:false, disable_call:false, disable_wa:false };
  if(mode === 'hidden')   flags.phone_hidden = true;
  if(mode === 'call_only') flags.disable_wa  = true;
  if(mode === 'wa_only')   flags.disable_call = true;
  // mode === 'both' → all false (defaults)
  try {
    if(srcType === 'registry'){
      const refId = parseInt(contactId);
      const existing = EXTRAS[refId] || {};
      const payload = { mun_id: MUN_ID, ref_id: refId, ...existing, ...flags, status:'approved' };
      delete payload.id;
      delete payload.deleted_by_admin;
      delete payload.deleted_at;
      const { error } = await sb.from('phonebook_extras').upsert(payload, { onConflict: 'mun_id,ref_id' });
      if(error) throw error;
      EXTRAS[refId] = { ...EXTRAS[refId], ...flags };
    } else {
      const { error } = await sb.from('phonebook_entries').update(flags).eq('id', contactId);
      if(error) throw error;
      ADDED = ADDED.map(a => a.id === contactId ? { ...a, ...flags } : a);
    }
    toast('✅ تم تطبيق الإعدادات', 'ok');
    document.querySelectorAll(`input[name="pm_${contactId}"]`).forEach(r => {
      r.parentElement.classList.toggle('on', r.checked);
    });
    renderGrid(); renderStats();
  } catch(ex){
    console.error('setPhoneMode error:', ex);
    const detail = ex?.message || ex?.hint || 'سبب غير معروف';
    toast(`⚠️ تعذّر الحفظ: ${detail.slice(0,80)}`, 'err');
  }
}

async function submitEdit(e, c){
  e.preventDefault();
  const btn = document.getElementById('ED_SUB');
  const err = document.getElementById('ED_ERR'); err.innerHTML = '';

  const newVals = {
    first: document.getElementById('ED_FIRST').value.trim(),
    family: document.getElementById('ED_FAM').value.trim(),
    name: document.getElementById('ED_FULL').value.trim(),
    phone: document.getElementById('ED_PH').value.trim(),
    address: document.getElementById('ED_ADDR').value.trim(),
    email: document.getElementById('ED_EMAIL').value.trim(),
    occupation: document.getElementById('ED_OCC').value.trim(),
    work_phone: document.getElementById('ED_WPH').value.trim(),
    work_address: document.getElementById('ED_WADDR').value.trim(),
  };
  const ll = document.getElementById('ED_LL').value.trim();
  if(ll){ const p=ll.split(',').map(s=>parseFloat(s.trim())); if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])){ newVals.lat=p[0]; newVals.lng=p[1]; } }
  const wll = document.getElementById('ED_WLL').value.trim();
  if(wll){ const p=wll.split(',').map(s=>parseFloat(s.trim())); if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])){ newVals.work_lat=p[0]; newVals.work_lng=p[1]; } }
  const reason = document.getElementById('ED_REASON').value.trim();
  const byNm = document.getElementById('ED_BY_NM').value.trim();
  const byPh = document.getElementById('ED_BY_PH').value.trim();

  if(!byNm || !byPh){ err.innerHTML='<div class="fm-error">⚠️ يرجى تعبئة معلومات التحقق</div>'; return; }

  // Build proposed (only changed fields)
  const proposed = {};
  Object.keys(newVals).forEach(k => {
    const cur = c[k] ?? '';
    const nv = newVals[k] ?? '';
    if(String(cur).trim() !== String(nv).trim()) proposed[k] = nv;
  });
  if(Object.keys(proposed).length === 0){
    err.innerHTML = '<div class="fm-error">⚠️ لم تقم بأي تغيير</div>'; return;
  }

  // Snapshot original of changed fields only
  const original = {};
  Object.keys(proposed).forEach(k => { original[k] = c[k] ?? null; });

  const payload = {
    mun_id: MUN_ID,
    target_type: c._src === 'registry' ? 'registry' : 'user_added',
    ref_id: c._src === 'registry' ? c.id : null,
    target_entry_id: c._src === 'registry' ? null : c.id,
    original, proposed,
    submitter_name: byNm,
    submitter_phone: byPh,
    reason: reason || null,
    status: 'pending'
  };

  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> جاري الإرسال…';
  try {
    if(sb){
      const { error } = await sb.from('phonebook_pending_edits').insert(payload);
      if(error) throw error;
    }
    closeModal();
    toast('✅ شكراً! تم إرسال التعديل للمراجعة');
    // refresh pending edits list
    if(isAdmin) await loadAdminQueues();
  } catch(ex){
    console.error(ex);
    err.innerHTML = '<div class="fm-error">⚠️ تعذّر الإرسال. يرجى المحاولة لاحقاً</div>';
    btn.disabled = false; btn.innerHTML = '✏️ إرسال للمراجعة';
  }
}

async function submitCorrect(e, refId, addedId){
  e.preventDefault();
  const btn = document.getElementById('CR_SUB');
  const err = document.getElementById('CR_ERR'); err.innerHTML = '';
  const data = {
    mun_id: MUN_ID, ref_id: refId, added_id: addedId,
    field: document.getElementById('CR_FIELD').value,
    suggested_value: document.getElementById('CR_VAL').value.trim(),
    reporter_name: document.getElementById('CR_NAME').value.trim(),
    reporter_phone: document.getElementById('CR_PH').value.trim(),
    status: 'pending'
  };
  if(!data.field || !data.suggested_value || !data.reporter_name || !data.reporter_phone){
    err.innerHTML='<div class="fm-error">⚠️ يرجى تعبئة الحقول</div>'; return;
  }
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> جاري الإرسال…';
  try {
    if(sb){
      const { error } = await sb.from('phonebook_corrections').insert(data);
      if(error) throw error;
    }
    closeModal();
    toast('✅ تم إرسال طلب التصحيح');
    if(isAdmin) await loadAdminQueues();
  } catch(ex){
    err.innerHTML = `<div class="fm-error">⚠️ تعذّر الإرسال. <a href="javascript:void(0)" onclick="sendCorrectWa(${refId||'null'})" style="text-decoration:underline">عبر واتساب؟</a></div>`;
    btn.disabled = false; btn.innerHTML = '✏️ إرسال';
  }
}
function sendCorrectWa(refId){
  const field = document.getElementById('CR_FIELD')?.value || '';
  const val = document.getElementById('CR_VAL')?.value || '';
  const nm = document.getElementById('CR_NAME')?.value || '';
  const ph = document.getElementById('CR_PH')?.value || '';
  const text = `طلب تصحيح في دليل وادي الست:\n\nرقم المرجع: ${refId||'—'}\nالحقل: ${field}\nالقيمة الصحيحة: ${val}\n\nمن: ${nm}\nهاتف: ${ph}`;

}

function onImgPick(e, prefix){
  const file = e.target.files[0]; if(!file) return;
  if(file.size > 2*1024*1024){ toast('⚠️ الصورة كبيرة (الحد 2MB)','err'); e.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = ev => {
    const lbl = document.getElementById(prefix+'IMG_LBL');
    lbl.classList.add('has');
    lbl.innerHTML = `<img class="fm-img-prev" src="${ev.target.result}" alt="">
      <div class="fm-img-rm" onclick="event.preventDefault();event.stopPropagation();removeImg('${prefix}')">✕ إزالة الصورة</div>
      <input type="file" id="${prefix}IMG_INPUT" accept="image/*" hidden>`;
    lbl.dataset.img = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function removeImg(prefix){
  const lbl = document.getElementById(prefix+'IMG_LBL');
  lbl.classList.remove('has');
  delete lbl.dataset.img;
  lbl.innerHTML = `<div id="${prefix}IMG_PLH"><div class="fm-img-icon">📷</div><div class="fm-img-t">انقر لرفع صورة</div><div class="fm-img-s">JPG/PNG حتى 2MB</div></div>
    <input type="file" id="${prefix}IMG_INPUT" accept="image/*" hidden onchange="onImgPick(event,'${prefix}')">`;
}

function useMyLocation(targetId, ev){
  // 1. Find the button reliably (even if user tapped icon inside)
  let btn = null;
  try {
    if(ev && ev.currentTarget) btn = ev.currentTarget.closest ? ev.currentTarget.closest('button') : ev.currentTarget;
    else if(ev && ev.target) btn = ev.target.closest ? ev.target.closest('button') : ev.target;
  } catch(_){}
  if(!btn) btn = document.activeElement && document.activeElement.tagName === 'BUTTON' ? document.activeElement : null;

  const setBtn = (html, disabled) => { if(btn){ btn.innerHTML = html; btn.disabled = !!disabled; } };
  const restore = () => setBtn('📍 موقعي', false);

  // 2. Check if geolocation is supported
  if(!navigator.geolocation){
    toast('⚠️ متصفّحك لا يدعم تحديد الموقع — أدخل الإحداثيات يدوياً','err');
    return;
  }

  // 3. Check if running on insecure HTTP (geolocation requires HTTPS)
  if(location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1'){
    toast('⚠️ يجب فتح الموقع عبر HTTPS لاستخدام GPS','err');
    return;
  }

  // 4. Show loading
  setBtn('<span class="spin"></span>', true);
  let resolved = false;
  // Safety timeout in case the browser never replies
  const safety = setTimeout(() => {
    if(!resolved){
      resolved = true;
      restore();
      showLocationHelp('timeout');
    }
  }, 16000);

  navigator.geolocation.getCurrentPosition(
    pos => {
      if(resolved) return;
      resolved = true; clearTimeout(safety);
      const target = document.getElementById(targetId);
      if(target) target.value = pos.coords.latitude.toFixed(6) + ', ' + pos.coords.longitude.toFixed(6);
      restore();
      toast('✅ تم استخدام موقعك');
    },
    err => {
      if(resolved) return;
      resolved = true; clearTimeout(safety);
      restore();
      // Give specific guidance based on error code
      let reason = 'unknown';
      if(err && err.code === 1) reason = 'denied';     // PERMISSION_DENIED
      else if(err && err.code === 2) reason = 'unavailable'; // POSITION_UNAVAILABLE
      else if(err && err.code === 3) reason = 'timeout';
      console.warn('Geolocation error:', err);
      showLocationHelp(reason);
    },
    { enableHighAccuracy:true, timeout:14000, maximumAge:60000 }
  );
}

  // Validate
  const missing = [];
  if(!first) missing.push('الاسم الأول');
  if(!father) missing.push('اسم الأب');
  if(!fam) missing.push('العائلة');
  if(!phone) missing.push('رقم الهاتف');
  if(!byNm) missing.push('اسمك');
  if(!byPh) missing.push('هاتفك');
  if(missing.length){
    err.innerHTML=`<div class="fm-error">⚠️ الحقول المفقودة: ${missing.join('، ')}</div>`;
    return;
  }

  let lat=null, lng=null;
  if(ll){ const p=ll.split(',').map(s=>parseFloat(s.trim())); if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])){ lat=p[0]; lng=p[1]; } }
  let work_lat=null, work_lng=null;
  if(wll){ const p=wll.split(',').map(s=>parseFloat(s.trim())); if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])){ work_lat=p[0]; work_lng=p[1]; } }

  // Normalize Arabic-Indic / Persian digits to Latin so wa link works
  const phoneNorm = toLatinDigits(phone).replace(/\s+/g,'').trim();
  const wa = digitsOnly(phoneNorm);
  const cc = phoneNorm.startsWith('+961') ? 'lb' : 'other';
  // Also normalize work_phone digits
  const wphNorm = wph ? toLatinDigits(wph).replace(/\s+/g,'').trim() : '';

  // Full payload
  const fullEntry = {
    mun_id: MUN_ID, name: full, first, family: fam, father, mother,
    phone: phoneNorm, wa, cc, occupation, email, address, lat, lng,
    work_phone: wphNorm, work_address: waddr, work_lat, work_lng,
    notes, image: img,
    submitter_name: byNm, submitter_phone: byPh,
    status:'pending', source:'user_added'
  };

  btn.disabled = true; btn.innerHTML='<span class="spin"></span> جاري الإرسال…';

  // Try insert; if some columns don't exist on the DB schema, retry with a stripped-down version
  async function tryInsert(payload){
    const { data, error } = await sb.from('phonebook_entries').insert(payload).select().single();
    return { data, error };
  }

  try {
    let saved = fullEntry;
    if(sb){
      let { data, error } = await tryInsert(fullEntry);

      // Retry path: if the schema is older and rejects unknown columns
      if(error){
        const msg = (error.message || '').toLowerCase();
        if(msg.includes('column') || msg.includes('schema') || msg.includes('does not exist') || error.code === 'PGRST204' || error.code === '42703'){
          // Attempt 2: drop work_*, image, mother, source, submitter_* (older schema)
          const minimal = {
            mun_id: MUN_ID, name: full, first, family: fam, father,
            phone: phoneNorm, wa, cc, occupation, email, address, lat, lng,
            notes,
            status:'pending'
          };
          const r2 = await tryInsert(minimal);
          if(r2.error){
            // Attempt 3: bare minimum
            const bare = { mun_id: MUN_ID, name: full, first, family: fam, phone: phoneNorm, wa, cc, status:'pending' };
            const r3 = await tryInsert(bare);
            if(r3.error) throw r3.error;
            data = r3.data; error = null;
          } else {
            data = r2.data; error = null;
          }
        } else {
          throw error;
        }
      }
      saved = data || fullEntry;
    } else {
      saved.id = 'local_' + Date.now();
    }
    // Save to MY_PENDING locally so the user sees their submission
    MY_PENDING.unshift({ ...saved, _src:'user_added', _myPending:true });
    lsSet('my_pending', MY_PENDING);
    closeModal();
    setBNActive('home');
    toast('✅ شكراً! الإضافة قيد المراجعة');
    renderStats(); renderLettersBar(); renderFiltersBar(); renderGrid();
    if(isAdmin) await loadAdminQueues();
  } catch(ex){
    console.error('submitAdd error:', ex);
    const detail = ex?.message || ex?.hint || 'سبب غير معروف';
    err.innerHTML = `<div class="fm-error">⚠️ تعذّر الإرسال.<br><small style="opacity:.85">السبب: ${escHtml(detail)}</small><br><small style="opacity:.7;margin-top:4px;display:block">إذا تكرّر الخطأ، تواصل مع البلدية أو شغّل تحديثات SQL الأحدث.</small></div>`;
    btn.disabled = false; btn.innerHTML='➕ إرسال للمراجعة';
  }
}

async function submitLogin(e){
  e.preventDefault();
  const btn = document.getElementById('LG_SUB');
  const err = document.getElementById('LG_ERR'); err.innerHTML='';
  const email = document.getElementById('LG_EMAIL').value.trim();
  const pass = document.getElementById('LG_PASS').value;
  if(!sb){ err.innerHTML='<div class="fm-error">⚠️ Supabase غير متاح</div>'; return; }
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> جاري الدخول…';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if(error) throw error;
    currentUser = data.user;
    userRole = data.user?.user_metadata?.role || null;
    isAdmin = ADMIN_ROLES.includes(userRole);
    if(!isAdmin){
      await sb.auth.signOut();
      currentUser = null; userRole = null;
      err.innerHTML='<div class="fm-error">⚠️ هذا الحساب ليس له صلاحية إدارة الدليل</div>';
      btn.disabled=false; btn.innerHTML='🔓 تسجيل الدخول';

    }
    closeModal();
    toast('✅ مرحباً، '+(currentUser.user_metadata?.name || currentUser.email),'ok');
    await loadAdminQueues();
    openAdmin();
  } catch(ex){
    console.error(ex);

    btn.disabled=false; btn.innerHTML='🔓 تسجيل الدخول';

// ═══════════════════════════════════════════════════════════════════════════
// FIX WHATSAPP LINK — repairs broken wa field on an existing entry
// (e.g. when phone was saved with Arabic-Indic digits like ٠١٢٣)
// ═══════════════════════════════════════════════════════════════════════════
async function fixWhatsappLink(meta){
  if(!isAdmin || !sb){ toast('⚠️ ميزة للأدمن فقط','err'); return; }
  if(!meta.phone){ toast('⚠️ لا يوجد رقم لإصلاحه','err'); return; }

  // Normalize: convert any Arabic-Indic / Persian digits to Latin, strip spaces
  const phoneNorm = toLatinDigits(meta.phone).replace(/\s+/g,'').trim();
  const wa = digitsOnly(phoneNorm);
  const cc = phoneNorm.startsWith('+961') ? 'lb' : 'other';

  if(wa.length < 8){
    toast(`⚠️ الرقم بعد التنظيف قصير جداً (${wa.length} رقم) — عدّله يدوياً`, 'err');
    return;
  }

  try {
    if(meta._src === 'user_added'){
      const { error } = await sb.from('phonebook_entries').update({ phone: phoneNorm, wa, cc }).eq('id', meta.id);
      if(error) throw error;
      ADDED = ADDED.map(a => a.id === meta.id ? { ...a, phone: phoneNorm, wa, cc } : a);
    } else {
      // Registry: store override in phonebook_extras
      const refId = parseInt(meta.id);
      const existing = EXTRAS[refId] || {};
      const payload = { mun_id: MUN_ID, ref_id: refId, ...existing, phone: phoneNorm, wa, cc, status:'approved' };
      delete payload.id;
      delete payload.deleted_by_admin;
      delete payload.deleted_at;
      const { error } = await sb.from('phonebook_extras').upsert(payload, { onConflict: 'mun_id,ref_id' });
      if(error) throw error;
      EXTRAS[refId] = { ...EXTRAS[refId], phone: phoneNorm, wa, cc };
    }
    closeModal();
    renderGrid(); renderStats();
    toast(`✅ تم إصلاح الرابط — الرقم: ${phoneNorm}`, 'ok');
  } catch(ex){
    console.error('fixWhatsappLink error:', ex);
    const detail = ex?.message || ex?.hint || 'سبب غير معروف';
    toast(`⚠️ تعذّر الإصلاح: ${detail.slice(0,80)}`, 'err');
  }
}

async function executeDelete(meta){
  if(!isAdmin || !sb){ toast('⚠️ غير مصرّح','err'); return; }
  const conf = document.getElementById('DEL_CONF')?.value.trim();
  if(conf !== 'حذف'){ toast('⚠️ اكتب "حذف" للتأكيد','err'); return; }

  const btn = document.getElementById('DEL_BTN');
  const err = document.getElementById('DEL_ERR'); if(err) err.innerHTML = '';
  if(btn){ btn.disabled = true; btn.innerHTML = '<span class="spin"></span> جاري الحذف…'; }

  try {
    if(meta._src === 'user_added'){
      // Direct row in phonebook_entries
      const { error } = await sb.from('phonebook_entries').delete().eq('id', meta.id);
      if(error) throw error;
    } else if(meta._src === 'registry'){
      // Original registry row — we don't actually delete from JS registry (it's hardcoded).
      // Instead, set entry_hidden=true permanently in phonebook_extras as a "soft delete"
      // AND mark a special field so we know it was admin-deleted.
      const payload = {
        mun_id: MUN_ID,
        ref_id: meta.id,
        status: 'approved',
        entry_hidden: true,
        deleted_by_admin: true,
        deleted_at: new Date().toISOString()
      };
      const { error } = await sb.from('phonebook_extras').upsert(payload, { onConflict: 'mun_id,ref_id' });
      if(error){
        // If deleted_by_admin/deleted_at columns don't exist, retry without them
        const msg = (error.message || '').toLowerCase();
        if(msg.includes('column') || msg.includes('does not exist') || error.code === 'PGRST204' || error.code === '42703'){
          const minimal = { mun_id: MUN_ID, ref_id: meta.id, status:'approved', entry_hidden: true };
          const r2 = await sb.from('phonebook_extras').upsert(minimal, { onConflict: 'mun_id,ref_id' });
          if(r2.error) throw r2.error;
        } else {
          throw error;
        }
      }
    }

    closeModal();
    await loadFromServer();
    if(isAdmin) await loadAdminQueues();
    renderStats(); renderLettersBar(); renderFiltersBar(); renderGrid();
    toast('✅ تمّ حذف الجهة نهائياً');
  } catch(ex){
    console.error('delete error:', ex);
    const detail = ex?.message || ex?.hint || 'سبب غير معروف';
    if(err) err.innerHTML = `<div class="fm-error" style="margin-top:10px">⚠️ تعذّر الحذف.<br><small style="opacity:.85">السبب: ${escHtml(detail)}</small></div>`;
    if(btn){ btn.disabled = false; btn.innerHTML = '🗑️ حذف نهائي'; }
  }
}

async function admApproveEdit(id){
  const ed = PENDING_EDITS.find(e => e.id === id);
  if(!ed){ toast('⚠️ غير موجود','err'); return; }
  if(!confirm('تطبيق هذا التعديل على الجهة؟')) return;
  try {
    if(ed.target_type === 'registry'){
      // Upsert into phonebook_extras
      const refId = ed.ref_id;
      const existing = EXTRAS[refId] || {};
      const merged = { ...existing, ...ed.proposed };
      const payload = { mun_id: MUN_ID, ref_id: refId, status:'approved', ...merged };
      const { error } = await sb.from('phonebook_extras').upsert(payload, { onConflict: 'mun_id,ref_id' });
      if(error) throw error;
    } else {
      // Update phonebook_entries directly
      const { error } = await sb.from('phonebook_entries').update(ed.proposed).eq('id', ed.target_entry_id);
      if(error) throw error;
    }
    await sb.from('phonebook_pending_edits').update({ status:'approved', resolved_at: new Date().toISOString(), resolved_by: currentUser.id }).eq('id', id);
    await loadFromServer();
    await loadAdminQueues();
    renderAdminPanel();
    toast('✅ تم تطبيق التعديل');
  } catch(e){ console.error(e); toast('⚠️ خطأ','err'); }
}

async function admRejectEdit(id){
  if(!confirm('رفض هذا التعديل؟')) return;

function openAdminEdit(c){
