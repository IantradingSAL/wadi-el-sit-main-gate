async function submitAdminEdit(e, c){
  e.preventDefault();
  if(!isAdmin || !sb) return;
  const btn = document.getElementById('ED_SUB');
  const err = document.getElementById('ED_ERR'); err.innerHTML='';
  // Normalize Arabic-Indic / Persian digits in any phone field
  const phoneRaw = document.getElementById('ED_PH').value.trim();
  const phone = toLatinDigits(phoneRaw).replace(/\s+/g,'').trim();
  const wphRaw = document.getElementById('ED_WPH').value.trim();
  const work_phone = toLatinDigits(wphRaw).replace(/\s+/g,'').trim();
  const newVals = {
    first: document.getElementById('ED_FIRST').value.trim(),
    family: document.getElementById('ED_FAM').value.trim(),
    name: document.getElementById('ED_FULL').value.trim(),
    phone,
    wa: digitsOnly(phone),
    cc: phone.startsWith('+961') ? 'lb' : (phone ? 'other' : null),
    address: document.getElementById('ED_ADDR').value.trim(),
    email: document.getElementById('ED_EMAIL').value.trim(),
    occupation: document.getElementById('ED_OCC').value.trim(),
    work_phone,
    work_address: document.getElementById('ED_WADDR').value.trim(),
  };
  const ll = document.getElementById('ED_LL').value.trim();
  if(ll){ const p=ll.split(',').map(s=>parseFloat(s.trim())); if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])){ newVals.lat=p[0]; newVals.lng=p[1]; } }
  const wll = document.getElementById('ED_WLL').value.trim();
  if(wll){ const p=wll.split(',').map(s=>parseFloat(s.trim())); if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])){ newVals.work_lat=p[0]; newVals.work_lng=p[1]; } }

  // Build patch (only non-empty / changed)
  const patch = {};
  Object.keys(newVals).forEach(k => {
    if(newVals[k] !== '' && newVals[k] != null) patch[k] = newVals[k];
  });

  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> جاري الحفظ…';
  try {
    if(c._src === 'registry'){
      const refId = c.id;
      const existing = EXTRAS[refId] || {};
      const merged = { ...existing, ...patch };
      const payload = { mun_id: MUN_ID, ref_id: refId, status:'approved', ...merged };
      const { error } = await sb.from('phonebook_extras').upsert(payload, { onConflict: 'mun_id,ref_id' });
      if(error) throw error;
    } else {
      const { error } = await sb.from('phonebook_entries').update(patch).eq('id', c.id);
      if(error) throw error;
    }
    await loadFromServer();
    closeModal();
    toast('✅ تم الحفظ');
  } catch(ex){
    console.error(ex);
    err.innerHTML = '<div class="fm-error">⚠️ تعذّر الحفظ</div>';
    btn.disabled = false; btn.innerHTML = '🛡️ تطبيق مباشر';
  }
}

        <div class="dt-field-text"><div class="dt-field-l">للتواصل مع البلدية</div><div class="dt-field-v">${fmtPhone(MUN_PHONE)}</div></div>
        <a class="dt-field-btn" href="tel:${MUN_PHONE}">📞</a>
      </div>
      <div class="dt-field">
        <div class="dt-field-i">💬</div>
        <div class="dt-field-text"><div class="dt-field-l">واتساب البلدية</div><div class="dt-field-v">${fmtPhone(MUN_PHONE)}</div></div>
        <a class="dt-field-btn" href="https://wa.me/${muniWa}" target="_blank" rel="noopener">💬</a>
      </div>
      <div class="dt-field">
        <div class="dt-field-i">✉️</div>

        <a class="dt-field-btn" href="mailto:${MUN_EMAIL}">✉️</a>

    <div style="font-size:11px;text-align:center;color:var(--text3);margin-top:18px">
      إصدار 2.1 — ${new Date().getFullYear()} © بلدية وادي الست<br>
      مدعوم من IanTrading SAL
    </div>
  `;

  const body = _infoTab === 'whatsnew' ? whatsNewBody : (_infoTab === 'about' ? aboutBody : helpBody);

  const html = `<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-hd">
      <div class="modal-hd-content">
        <div class="modal-t">${_infoTab==='help'?'❓ دليل الاستخدام والمساعدة':_infoTab==='whatsnew'?'✨ ما الجديد':'ℹ️ حول الدليل'}</div>
        <div class="modal-s">${_infoTab==='help'?'كيف تضيف، تُعدّل، أو تُزيل معلوماتك':_infoTab==='whatsnew'?'الميزات المُضافة حديثاً':'دليل بلدية وادي الست'}</div>
      </div>
      <button class="modal-x" onclick="closeModal()" aria-label="إغلاق">✕</button>
    </div>
    <div class="modal-bd" style="padding:0">
      <div class="adm-tabs">
        <button class="adm-tab ${_infoTab==='help'?'on':''}" onclick="setInfoTab('help')">❓ مساعدة</button>

// ═══════════════════════════════════════════════════════════════════════════
// PUSH NOTIFICATION BUTTON — renders inside the help modal
// ═══════════════════════════════════════════════════════════════════════════
async function renderPushButton(){
  const area = document.getElementById('PUSH_BTN_AREA');
  const desc = document.getElementById('PUSH_STATUS_DESC');
  if(!area) return;

  if(!window.PWA || !window.PWA.canPush()){
    area.innerHTML = `<div class="fm-error" style="margin:0;padding:10px 12px;font-size:12.5px">⚠️ متصفّحك لا يدعم الإشعارات. جرّب Chrome على Android أو Safari iOS 16.4+.</div>`;
    return;
  }

  const status = await window.PWA.pushStatus();
  if(status === 'subscribed'){
    area.innerHTML = `
      <div style="background:var(--green3);color:var(--green2);padding:10px 13px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:8px">
        ✅ الإشعارات مُفعَّلة على هذا الجهاز
      </div>
      <button class="btn btn-out btn-sm" style="width:100%" onclick="disablePushNow()">🔕 إيقاف الإشعارات</button>
    `;
  } else if(status === 'denied'){
    area.innerHTML = `
      <div class="fm-error" style="margin:0 0 8px;padding:10px 12px;font-size:12.5px">
        ⚠️ رفضتَ الإذن سابقاً. لتفعيل الإشعارات، اذهب إلى إعدادات الموقع في المتصفّح وغيّر "Notifications" إلى "Allow".
      </div>
    `;
  } else {
    area.innerHTML = `
      <button class="btn btn-sm" style="width:100%;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-weight:800;font-size:14px" onclick="enablePushNow()">
        🔔 تفعيل الإشعارات الآن
      </button>
    `;
  }
}

async function enablePushNow(){
  const area = document.getElementById('PUSH_BTN_AREA');
  if(area) area.innerHTML = '<div style="text-align:center;padding:8px"><span class="spin"></span> جاري التفعيل...</div>';
  try {
    await window.PWA.enablePush(['general', 'news']);
    toast('✅ تمّ تفعيل الإشعارات!');
    renderPushButton();
  } catch(ex){
    console.error('enablePush error:', ex);
    if(area){
      area.innerHTML = `
        <div class="fm-error" style="margin:0 0 8px;padding:10px 12px;font-size:12.5px">⚠️ ${escHtml(ex.message || 'خطأ غير معروف')}</div>
        <button class="btn btn-out btn-sm" style="width:100%" onclick="renderPushButton()">حاول مرّة أخرى</button>
      `;
    }
  }
}

async function disablePushNow(){
  if(!confirm('هل أنت متأكّد من إيقاف الإشعارات؟ لن تستلم تنبيهات البلدية بعد ذلك.')) return;
  try {
    await window.PWA.disablePush();
    toast('✅ تمّ إيقاف الإشعارات');
    renderPushButton();
  } catch(ex){
    toast('⚠️ ' + (ex.message || 'خطأ'), 'err');
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// LOAD FROM SERVER
// ═══════════════════════════════════════════════════════════════════════════
async function loadFromServer(){
  if(!sb) return;
  try {
    // Approved user-added entries
    const { data: added, error: e1 } = await sb.from('phonebook_entries').select('*').eq('mun_id', MUN_ID).eq('status','approved').order('created_at',{ascending:false});
    if(e1) throw e1;
    ADDED = (added || []).map(a => ({ ...a, _src:'user_added' }));

    // Extras (overlays for registry)
    const { data: extras, error: e2 } = await sb.from('phonebook_extras').select('*').eq('mun_id', MUN_ID).eq('status','approved');
    if(e2) throw e2;
    EXTRAS = {};
    (extras || []).forEach(x => { EXTRAS[x.ref_id] = x; });

    // Clean MY_PENDING — remove items that are now approved (in ADDED)
    MY_PENDING = MY_PENDING.filter(p => !ADDED.some(a => a.id === p.id));
    lsSet('my_pending', MY_PENDING);
  } catch(e){
    // Silently ignore harmless cross-frame clone errors; surface real DB errors only
    const m = e?.message || '';
    if(e?.name !== 'DataCloneError' && !m.includes('could not be cloned')){
      console.warn('loadFromServer:', m);
    }
  }
  renderStats(); renderLettersBar(); renderFiltersBar(); renderGrid();
}

async function loadAdminQueues(){
  if(!sb || !isAdmin){ updateAdmBadge(); return; }
  try {
    const { data: pe } = await sb.from('phonebook_entries').select('*').eq('mun_id', MUN_ID).eq('status','pending').order('created_at',{ascending:false});
    PENDING_ENTRIES_ADM = pe || [];
    const { data: ed } = await sb.from('phonebook_pending_edits').select('*').eq('mun_id', MUN_ID).eq('status','pending').order('created_at',{ascending:false});
    PENDING_EDITS = ed || [];
    const { data: cr } = await sb.from('phonebook_corrections').select('*').eq('mun_id', MUN_ID).eq('status','pending').order('created_at',{ascending:false});
    PENDING_CORR_ADM = cr || [];
  } catch(e){
    console.warn('loadAdminQueues:', e.message);
  }
  updateAdmBadge();
  renderGrid(); // refresh badges
}

function updateAdmBadge(){
  const total = PENDING_ENTRIES_ADM.length + PENDING_EDITS.length + PENDING_CORR_ADM.length;
  const bn = document.getElementById('BN_ADM');
  const badge = document.getElementById('BN_ADM_BADGE');
  if(total > 0 && isAdmin){
    bn.classList.add('has-pending');
    badge.textContent = total;
  } else {
    bn.classList.remove('has-pending');
  }
  // Desktop header admin button — orange dot when pending
  const hdAdm = document.getElementById('HD_ADM');
  if(hdAdm){
    hdAdm.classList.toggle('has-pending', total > 0 && isAdmin);
    hdAdm.title = (total > 0 && isAdmin) ? `لوحة الإدارة — ${total} عنصر بانتظار المراجعة` : 'لوحة الإدارة';
  }
}

async function checkSession(){
  if(!sb) return;
  try {
    const { data } = await sb.auth.getSession();
    if(data?.session?.user){
      currentUser = data.session.user;
      userRole = currentUser.user_metadata?.role || null;
      isAdmin = ADMIN_ROLES.includes(userRole);
      if(isAdmin){
        await loadAdminQueues();
      }
    }
  } catch(e){ console.warn('checkSession:', e.message); }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
async function init(){
  renderStats();
  renderLettersBar();
  renderFiltersBar();
  renderGrid();
  // Hide "NEW" badge on help button if user already saw v2.1
  if(lsGet('whatsnew_seen','') === 'v2.1'){
    const b = document.getElementById('HD_HELP_NEW');
    if(b) b.classList.add('hidden');
  }
  await checkSession();
  await loadFromServer();
}

function markWhatsNewSeen(){
  lsSet('whatsnew_seen', 'v2.1');
  const b = document.getElementById('HD_HELP_NEW');
  if(b) b.classList.add('hidden');
}

// Keep openHelp available (defaults to "help" tab) but the header button goes to "whatsnew" first time
init();
</script>
