<!-- ═══ ADMIN LOGIN — gold "🔐 إدارة" button at top-right ═══ -->
<style>
.login-fab{position:fixed;top:calc(var(--safe-top) + 78px);right:14px;height:42px;padding:0 18px;border-radius:99px;background:linear-gradient(135deg,#d4a017,#a07a0b);color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px;z-index:60;border:2px solid #fff;cursor:pointer;box-shadow:0 6px 20px rgba(212,160,23,.55);font-family:'Tajawal',sans-serif;}
.login-fab.logged-in{background:linear-gradient(135deg,var(--green),var(--green2));}
.login-fab:active{transform:scale(.92);}
.login-modal{position:fixed;inset:0;background:rgba(15,28,46,.65);display:none;align-items:center;justify-content:center;z-index:300;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);padding:20px;}
.login-modal.open{display:flex;}
.login-box{background:#fff;border-radius:20px;width:100%;max-width:380px;padding:24px 22px;box-shadow:var(--shadow-lg);animation:loginPop .3s var(--t2);}
@keyframes loginPop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.login-title{font-size:18px;font-weight:800;color:var(--blue2);text-align:center;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:18px;}
.login-grp{margin-bottom:11px;}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14.5px;background:#fafbfd;outline:none;}
.login-input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,110,181,.1);}
.login-input.ltr{direction:ltr;text-align:right;}
.login-err{padding:9px 12px;background:var(--danger-bg);color:var(--danger);border-radius:8px;font-size:12.5px;font-weight:600;margin-bottom:10px;text-align:center;}
.login-btn{width:100%;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;padding:13px;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:14.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-cancel{width:100%;background:transparent;color:var(--text2);padding:10px;border:none;font-family:inherit;font-size:13px;cursor:pointer;margin-top:6px;}
.login-logged-email{font-size:14px;color:var(--blue2);font-weight:800;margin-bottom:14px;direction:ltr;}
</style>

<button class="login-fab" id="LOGIN_FAB" onclick="openLoginModal()" title="تسجيل دخول الإدارة">🔐 <span>إدارة</span></button>

<div class="login-modal" id="LOGIN_MODAL" onclick="if(event.target===this)closeLoginModal()">
  <div class="login-box">
    <div class="login-title">🛡️ دخول الإدارة</div>
    <div class="login-sub">لإدارة المسجَّلين وإرسال الإشعارات</div>
    <div id="LOGIN_ERR"></div>
    <div id="LOGIN_FORM">
      <div class="login-grp">
        <input type="email" class="login-input ltr" id="LOGIN_EMAIL" placeholder="email@example.com" autocomplete="email" inputmode="email">
      </div>
      <div class="login-grp">
        <input type="password" class="login-input ltr" id="LOGIN_PASS" placeholder="كلمة المرور" autocomplete="current-password">
      </div>
      <button class="login-btn" id="LOGIN_SUBMIT" onclick="doLogin()">🔓 تسجيل الدخول</button>
      <button class="login-cancel" onclick="closeLoginModal()">إلغاء</button>
    </div>
    <div id="LOGIN_LOGGED" style="display:none;text-align:center;padding:10px 0;">
      <div style="font-size:50px;margin-bottom:10px;">✅</div>
      <div class="login-logged-email" id="LOGIN_USER_EMAIL"></div>
      <button class="login-btn" onclick="doLogout()" style="background:linear-gradient(135deg,var(--danger),#8a1c1c);">🚪 تسجيل خروج</button>
      <button class="login-cancel" onclick="closeLoginModal()">إغلاق</button>
    </div>
  </div>
</div>

<script>
function openLoginModal(){
  document.getElementById('LOGIN_MODAL').classList.add('open');
  refreshLoginState();
}
function closeLoginModal(){
  document.getElementById('LOGIN_MODAL').classList.remove('open');
}
async function refreshLoginState(){
  if(!sb)return;
  try{
    const{data:{session}}=await sb.auth.getSession();
    const fab=document.getElementById('LOGIN_FAB');
    if(session){
      document.getElementById('LOGIN_FORM').style.display='none';
      document.getElementById('LOGIN_LOGGED').style.display='block';
      document.getElementById('LOGIN_USER_EMAIL').textContent=session.user.email;
      fab.classList.add('logged-in');
      fab.innerHTML='👤 <span>'+escHtml(session.user.email.split('@')[0])+'</span>';
    }else{
      document.getElementById('LOGIN_FORM').style.display='block';
      document.getElementById('LOGIN_LOGGED').style.display='none';
      fab.classList.remove('logged-in');
      fab.innerHTML='🔐 <span>إدارة</span>';
    }
  }catch(e){}
}
async function doLogin(){
  const email=document.getElementById('LOGIN_EMAIL').value.trim();
  const pass=document.getElementById('LOGIN_PASS').value;
  const err=document.getElementById('LOGIN_ERR');err.innerHTML='';
  if(!email||!pass){err.innerHTML='<div class="login-err">⚠️ يرجى إدخال البريد وكلمة المرور</div>';return;}
  const btn=document.getElementById('LOGIN_SUBMIT');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> جاري الدخول…';
  try{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)throw error;
    btn.innerHTML='✅ نجح الدخول!';
    setTimeout(async()=>{
      closeLoginModal();
      await checkAdmin();
      await refreshLoginState();
      if(IS_ADMIN){alert('✅ مرحباً! اضغط على الزرّ 🛡️ في الأسفل لعرض المسجَّلين');}
      else{alert('ℹ️ تمّ تسجيل الدخول، لكن حسابك لا يحتوي على صلاحيات إدارية');}
    },600);
  }catch(e){
    err.innerHTML=`<div class="login-err">⚠️ ${escHtml(e.message||'فشل تسجيل الدخول')}</div>`;
    btn.disabled=false;btn.innerHTML='🔓 تسجيل الدخول';
  }
}
async function doLogout(){
  if(!confirm('تسجيل الخروج؟'))return;
  await sb.auth.signOut();
  const af=document.getElementById('ADMIN_FAB');if(af)af.classList.remove('show');
  IS_ADMIN=false;
  await refreshLoginState();
  closeLoginModal();
}
setTimeout(refreshLoginState,500);
</script>
