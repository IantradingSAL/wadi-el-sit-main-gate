<!-- ═══ ADMIN PANEL — visible only to logged-in admins (mayor/officer/super_admin/baladieh) ═══ -->
<style>
.adm-fab{position:fixed;bottom:calc(var(--safe-bot) + 18px);left:18px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#0f4d82,#1a6eb5);color:#fff;font-size:26px;box-shadow:0 8px 24px rgba(15,77,130,.4);display:none;align-items:center;justify-content:center;z-index:100;border:3px solid #fff;cursor:pointer;}
.adm-fab.show{display:flex;animation:fabPop .5s var(--t2);}
@keyframes fabPop{from{transform:scale(0) rotate(-180deg);}to{transform:scale(1) rotate(0);}}
.adm-fab:active{transform:scale(.92);}
.adm-fab-badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;font-size:11px;font-weight:900;min-width:20px;height:20px;border-radius:99px;padding:0 5px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.adm-modal{position:fixed;inset:0;background:rgba(15,28,46,.55);display:none;align-items:flex-end;z-index:200;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.adm-modal.open{display:flex;}
.adm-modal-content{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:560px;margin:0 auto;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .3s var(--t2);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.adm-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.adm-title{flex:1;font-size:17px;font-weight:800;color:var(--blue2);}
.adm-close{width:34px;height:34px;border-radius:50%;background:var(--surface2);font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
.adm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 18px;background:var(--blue-soft);}
.adm-stat{background:#fff;border-radius:12px;padding:10px 6px;text-align:center;}
.adm-stat-v{font-size:22px;font-weight:900;color:var(--blue2);line-height:1;direction:ltr;}
.adm-stat-l{font-size:10.5px;color:var(--text2);font-weight:700;margin-top:5px;}
.adm-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 18px 0;}
.adm-action-btn{padding:11px 8px;border-radius:10px;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;cursor:pointer;border:none;}
.adm-action-push{background:linear-gradient(135deg,#f5a623,#d88e0a);color:#fff;box-shadow:0 2px 8px rgba(245,166,35,.3);}
.adm-action-csv{background:var(--surface2);color:var(--blue2);border:1.5px solid var(--border);}
.adm-search-wrap{padding:12px 18px;}
.adm-search{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;outline:none;background:#fafbfd;}
.adm-search:focus{border-color:var(--blue);background:#fff;}
.adm-list{flex:1;overflow-y:auto;padding:0 14px 20px;-webkit-overflow-scrolling:touch;}
.adm-loading,.adm-empty,.adm-error{text-align:center;padding:30px 20px;color:var(--text3);font-size:13.5px;}
.adm-error{color:var(--danger);}
.adm-row{display:flex;gap:10px;background:#fafbfd;border:1px solid var(--border);border-radius:12px;padding:11px;margin-bottom:7px;align-items:center;}
.adm-row-num{width:26px;height:26px;border-radius:50%;background:var(--blue2);color:#fff;font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;direction:ltr;}
.adm-row-body{flex:1;min-width:0;}
.adm-row-name{font-size:14.5px;font-weight:800;color:var(--text);margin-bottom:3px;}
.adm-row-meta{display:flex;gap:10px;font-size:12px;color:var(--text2);flex-wrap:wrap;}
.adm-phone{direction:ltr;}
.adm-seats{color:var(--green2);font-weight:700;}
.adm-row-notes{font-size:11.5px;color:var(--text3);margin-top:5px;font-style:italic;padding:5px 8px;background:#fff;border-radius:6px;border-right:3px solid var(--gold);}
.adm-row-time{font-size:10.5px;color:var(--text3);margin-top:3px;direction:ltr;text-align:right;}
.adm-row-actions{display:flex;gap:4px;flex-shrink:0;}
.adm-act{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;text-decoration:none;border:none;cursor:pointer;}
.adm-act-call{background:#d4edda;color:var(--green2);}
.adm-act-wa{background:#d4f7d4;color:#128c7e;}
.adm-act-del{background:#fdeaea;color:var(--danger);}
.adm-act:active{transform:scale(.9);}
</style>

<button id="ADMIN_FAB" class="adm-fab" onclick="openAdmin()" title="إدارة">
  🛡️<span class="adm-fab-badge" id="ADM_FAB_BADGE">0</span>
</button>

<div id="ADMIN_MODAL" class="adm-modal" onclick="if(event.target===this)closeAdmin()">
  <div class="adm-modal-content">
    <div class="adm-head">
      <div class="adm-title">🛡️ المسجَّلون في الرحلة</div>
      <button class="adm-close" onclick="closeAdmin()">✕</button>
    </div>
    <div class="adm-stats">
      <div class="adm-stat"><div class="adm-stat-v" id="ADM_STAT_PEOPLE">0</div><div class="adm-stat-l">شخصاً</div></div>
      <div class="adm-stat"><div class="adm-stat-v" id="ADM_STAT_SEATS">0</div><div class="adm-stat-l">مقعداً مأخوذاً</div></div>
      <div class="adm-stat"><div class="adm-stat-v" id="ADM_STAT_REMAIN">30</div><div class="adm-stat-l">متبقّي</div></div>
    </div>
    <div class="adm-actions">
      <button class="adm-action-btn adm-action-push" onclick="sendReminderToAll()">🔔 إرسال تذكير</button>
      <button class="adm-action-btn adm-action-csv" onclick="exportCSV()">📥 تصدير Excel</button>
    </div>
    <div class="adm-search-wrap">
      <input type="search" id="ADM_SEARCH" class="adm-search" placeholder="🔍 ابحث بالاسم أو الرقم…" oninput="renderSignups()">
    </div>
    <div class="adm-list" id="ADM_LIST"><div class="adm-loading">⏳</div></div>
  </div>
</div>

<script>
let ADMIN_SIGNUPS=[],IS_ADMIN=false;
async function checkAdmin(){
  if(!sb)return;
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session)return;
    const{data:roles}=await sb.from('user_roles').select('role').eq('user_id',session.user.id);
    if(!roles||roles.length===0)return;
    const ADMIN=['mayor','admin','officer','super_admin','baladieh'];
    IS_ADMIN=roles.some(r=>ADMIN.includes(r.role));
    if(IS_ADMIN){
      document.getElementById('ADMIN_FAB').classList.add('show');
      loadSignupsCount();
    }
  }catch(e){console.warn('Admin check failed:',e);}
}
async function loadSignupsCount(){
  try{
    const{count}=await sb.from('bus_trip_signups').select('*',{count:'exact',head:true}).eq('mun_id',MUN_ID).eq('status','confirmed');
    if(count>0)document.getElementById('ADM_FAB_BADGE').textContent=count;
    else document.getElementById('ADM_FAB_BADGE').style.display='none';
  }catch(e){}
}
async function openAdmin(){
  if(!IS_ADMIN)return;
  document.getElementById('ADMIN_MODAL').classList.add('open');
  await loadSignups();
}
function closeAdmin(){document.getElementById('ADMIN_MODAL').classList.remove('open');}
async function loadSignups(){
  const el=document.getElementById('ADM_LIST');
  el.innerHTML='<div class="adm-loading">⏳ جاري التحميل…</div>';
  try{
    const{data,error}=await sb.from('bus_trip_signups').select('*').eq('mun_id',MUN_ID).eq('status','confirmed').order('created_at',{ascending:false});
    if(error)throw error;
    ADMIN_SIGNUPS=data||[];
    renderSignups();updateStats();
  }catch(e){el.innerHTML=`<div class="adm-error">⚠️ ${escHtml(e.message||'تعذّر التحميل')}</div>`;}
}
function updateStats(){
  const ppl=ADMIN_SIGNUPS.length;
  const seats=ADMIN_SIGNUPS.reduce((s,r)=>s+(r.seats_count||1),0);
  const cap=(CURRENT_TRIP&&CURRENT_TRIP.max_seats)||30;
  document.getElementById('ADM_STAT_PEOPLE').textContent=ppl;
  document.getElementById('ADM_STAT_SEATS').textContent=seats;
  document.getElementById('ADM_STAT_REMAIN').textContent=Math.max(0,cap-seats);
  const badge=document.getElementById('ADM_FAB_BADGE');
  if(ppl>0){badge.textContent=ppl;badge.style.display='flex';}else{badge.style.display='none';}
}
function renderSignups(){
  const el=document.getElementById('ADM_LIST');
  const q=(document.getElementById('ADM_SEARCH').value||'').trim().toLowerCase();
  let filtered=ADMIN_SIGNUPS;
  if(q)filtered=ADMIN_SIGNUPS.filter(s=>(s.participant_name||'').toLowerCase().includes(q)||(s.participant_phone||'').includes(q));
  if(filtered.length===0){el.innerHTML=`<div class="adm-empty">${q?'🔍 لا توجد نتائج':'📭 لا أحد مسجَّل بعد'}</div>`;return;}
  el.innerHTML=filtered.map((s,i)=>{
    const phoneClean=(s.participant_phone||'').replace(/[^0-9+]/g,'');
    const waPhone=phoneClean.replace(/^\+/,'');
    const dt=new Date(s.created_at).toLocaleString('ar-LB',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    return `<div class="adm-row">
      <div class="adm-row-num">${i+1}</div>
      <div class="adm-row-body">
        <div class="adm-row-name">${escHtml(s.participant_name)}</div>
        <div class="adm-row-meta">
          <span class="adm-phone">📞 ${escHtml(s.participant_phone)}</span>
          <span class="adm-seats">🎟️ ${s.seats_count}</span>
        </div>
        ${s.notes?`<div class="adm-row-notes">📝 ${escHtml(s.notes)}</div>`:''}
        <div class="adm-row-time">${dt}</div>
      </div>
      <div class="adm-row-actions">
        <a href="tel:${phoneClean}" class="adm-act adm-act-call" title="اتصال">📞</a>
        <a href="https://wa.me/${waPhone}" target="_blank" rel="noopener" class="adm-act adm-act-wa" title="واتساب">💬</a>
        <button onclick="deleteSignup('${s.id}')" class="adm-act adm-act-del" title="حذف">🗑️</button>
      </div>
    </div>`;
  }).join('');
}
async function deleteSignup(id){
  if(!confirm('حذف هذا التسجيل؟'))return;
  try{
    const{error}=await sb.from('bus_trip_signups').delete().eq('id',id);
    if(error)throw error;
    await loadSignups();
  }catch(e){alert('فشل الحذف: '+(e.message||''));}
}
function exportCSV(){
  if(ADMIN_SIGNUPS.length===0){alert('لا توجد بيانات للتصدير');return;}
  const headers=['#','الاسم','الهاتف','المقاعد','الملاحظات','التاريخ'];
  const rows=ADMIN_SIGNUPS.map((s,i)=>[i+1,s.participant_name||'',s.participant_phone||'',s.seats_count||1,s.notes||'',new Date(s.created_at).toLocaleString('ar-LB')]);
  const csv='\ufeff'+[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`bus-trip-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function sendReminderToAll(){
  const title=prompt('عنوان الإشعار:','🕯️ تذكير: مسيرة حمل مشعل الإيمان');
  if(!title)return;
  const body=prompt('نصّ الإشعار:','الباص ينطلق غداً من ساحة البلدية. لا تنسوا المشاركة 🙏');
  if(!body)return;
  if(!confirm(`إرسال "${title}" إلى المسجَّلين عبر الإشعارات؟`))return;
  const{data:{session}}=await sb.auth.getSession();
  if(!session){alert('الجلسة منتهية، يرجى تسجيل الدخول');return;}
  try{
    const res=await fetch(`${SB_URL}/functions/v1/send-push`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${session.access_token}`,'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({topic:'events',title,body,url:'/bus-trip.html'})
    });
    const r=await res.json();
    if(res.ok)alert(`✅ تمّ الإرسال — ${r.success_count||r.recipients_count||0} شخص`);
    else alert('فشل: '+(r.error||res.status));
  }catch(e){alert('فشل: '+(e.message||''));}
}
setTimeout(checkAdmin,2200);
</script>
