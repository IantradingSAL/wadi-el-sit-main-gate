<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a6eb5;--blue2:#0f4d82;--blue3:#daeaf8;--blue4:#eef5fc;--green:#2d7a3e;--green3:#d4f0dc;--warn:#d97706;--warn3:#fef3c7;--danger:#bf2424;--danger3:#fee2e2;--bg:#f5f7fa;--bg2:#eef2f7;--surface:#fff;--text:#1a2332;--text2:#4a5568;--text3:#8a95a3;--border:#e2e8f0}
html,body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.65}

/* HEADER — matches news.html */
.app-hdr{background:linear-gradient(135deg,var(--blue2) 0%,var(--blue) 100%);color:#fff;padding:18px 16px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 16px rgba(15,77,130,.18)}
.hdr-row{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto}
.hdr-ttl{flex:1;min-width:0}
.hdr-ttl h1{font-size:18px;font-weight:900;letter-spacing:-.3px;line-height:1.2}
.hdr-ttl p{font-size:11.5px;opacity:.78;margin-top:2px}
.hdr-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.hdr-btn{background:rgba(255,255,255,.16);color:#fff;border:none;padding:7px 11px;border-radius:14px;font-size:11.5px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.hdr-btn:hover{background:rgba(255,255,255,.26)}

/* WADI shared header — copied from news.html so the design is identical */
.wadi-logo-link{display:inline-flex;align-items:center;text-decoration:none;color:inherit;flex-shrink:0;border-radius:50%;transition:transform .15s;cursor:pointer;}
.wadi-logo-link:hover,.wadi-logo-link:active{transform:scale(1.06);}
.wadi-lang-pill{display:inline-flex;align-items:center;gap:1px;background:rgba(255,255,255,.18);border-radius:999px;padding:2px;flex-shrink:0;font-family:'Tajawal',sans-serif;}
.wadi-lang-btn{background:none;border:none;color:#fff;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.5px;opacity:.65;transition:all .15s;line-height:1;min-width:28px;}
.wadi-lang-btn.on{background:#fff;color:#0f4d82;opacity:1;box-shadow:0 1px 3px rgba(0,0,0,.18);}
.wadi-lang-btn:hover{opacity:1;}
.wadi-help-trigger{background:rgba(255,255,255,.18);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0;transition:all .15s;font-weight:800;}
.wadi-help-trigger:hover,.wadi-help-trigger:active{background:rgba(255,255,255,.32);}

/* Suppress i18n.js auto-injected duplicate language pill */
header > .lang-switch{display:none!important;}

/* CONTENT */
.container{max-width:780px;margin:0 auto;padding:0 0 50px}

.cover{aspect-ratio:21/9;background:linear-gradient(135deg,var(--blue4),#dbeafe);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover}
.cover-fallback{font-size:80px;opacity:.5}
.cover-cat{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.95);backdrop-filter:blur(6px);padding:7px 14px;border-radius:14px;font-size:12.5px;font-weight:800;color:var(--blue2)}

.article{background:#fff;padding:24px 22px;margin:-30px 14px 0;border-radius:18px 18px 0 0;position:relative;z-index:2;box-shadow:0 -8px 30px rgba(0,0,0,.05);min-height:60vh}

.title-bar{margin-bottom:18px}
.title{font-size:24px;font-weight:900;line-height:1.35;color:var(--text);margin-bottom:10px;letter-spacing:-.3px}
.meta{display:flex;align-items:center;gap:11px;font-size:11.5px;color:var(--text3);flex-wrap:wrap}
.meta span{display:inline-flex;align-items:center;gap:4px}
.meta-dot{width:3px;height:3px;background:var(--text3);border-radius:50%}

.summary{background:var(--blue4);border-right:4px solid var(--blue);padding:14px 16px;border-radius:8px;margin-bottom:20px;font-size:14.5px;font-weight:600;color:var(--blue2);line-height:1.7}

.content{font-size:15px;color:var(--text);line-height:1.85;white-space:pre-wrap;margin-bottom:24px}

.event-box{background:linear-gradient(135deg,#fff8eb,#fef3c7);border:1px solid #fbbf24;border-radius:13px;padding:14px 16px;margin-bottom:20px;display:flex;gap:14px;align-items:center}
.event-box-i{font-size:32px;flex-shrink:0}
.event-box-text{flex:1}
.event-box-l{font-size:11px;color:#7a5500;font-weight:800;margin-bottom:2px}
.event-box-d{font-size:14px;font-weight:800;color:#854d0e;margin-bottom:1px}
.event-box-loc{font-size:12px;color:#92400e}

.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
@media(min-width:540px){.gallery{grid-template-columns:repeat(3,1fr)}}
.gallery-item{aspect-ratio:1/1;background:var(--bg2);border-radius:9px;overflow:hidden;cursor:pointer;transition:.15s}
.gallery-item:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.gallery-item img{width:100%;height:100%;object-fit:cover}

/* SHARE */
.share-bar{display:flex;gap:8px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px}
.share-btn{flex:1;min-width:90px;padding:11px;border:1.5px solid var(--border);border-radius:11px;background:#fff;font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text);transition:.15s}
.share-btn:hover{border-color:var(--blue3);background:var(--blue4)}
.share-btn.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border-color:transparent}
.share-btn.wa:hover{filter:brightness(1.05)}
.share-btn.fb{background:linear-gradient(135deg,#1877F2,#0E5FBF);color:#fff;border-color:transparent}
.share-btn.fb:hover{filter:brightness(1.08)}
.share-btn.tw{background:linear-gradient(135deg,#1DA1F2,#0d8ddc);color:#fff;border-color:transparent}
.share-btn.tw:hover{filter:brightness(1.05)}
.share-btn.tg{background:linear-gradient(135deg,#0088cc,#006699);color:#fff;border-color:transparent}
.share-btn.tg:hover{filter:brightness(1.05)}

/* RELATED */
.related-h{font-size:14.5px;font-weight:800;color:var(--blue2);margin:26px 0 12px}
.related-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:540px){.related-grid{grid-template-columns:1fr 1fr}}
.related-card{display:flex;gap:11px;background:#fff;border:1px solid var(--border);border-radius:11px;padding:11px;cursor:pointer;transition:.15s;text-decoration:none;color:inherit}
.related-card:hover{border-color:var(--blue3);transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.06)}
.related-img{width:70px;height:70px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.related-img img{width:100%;height:100%;object-fit:cover}
.related-text{flex:1;min-width:0}
.related-cat{font-size:10.5px;color:var(--blue);font-weight:700;margin-bottom:2px}
.related-title{font-size:12.5px;font-weight:800;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.related-meta{font-size:10.5px;color:var(--text3);margin-top:4px}

/* LOADING / EMPTY */
.center{text-align:center;padding:60px 20px;color:var(--text3)}
.center-i{font-size:48px;margin-bottom:12px;opacity:.5}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* IMAGE LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.lightbox.on{display:flex;animation:fadeIn .25s}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px}
.lightbox-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.18);color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>

const CAT_ICONS = {general:'📢', announcement:'📢', event:'🎉', alert:'⚠️', urgent:'🚨', water:'💧', tender:'📋'};

let currentArticle = null;

async function loadArticle(){
  const id = new URLSearchParams(window.location.search).get('id');
  const wrap = document.getElementById('ARTICLE');
  if (!id || !/^\d+$/.test(id)) {
    wrap.innerHTML = '<div class="center"><div class="center-i">⚠️</div><div>' + L().invalidLink + '</div><div style="margin-top:14px"><a href="news.html" style="color:var(--blue);font-weight:700">' + L().backToNews + '</a></div></div>';
    return;
  }
  try {
    const {data, error} = await sb.from('news_articles').select('*').eq('id', id).eq('is_published', true).single();
    if (error) throw error;
    if (!data) throw new Error(L().articleNotFound);
    currentArticle = data;
    renderArticle(data);
    // Increment view count (fire and forget)
    sb.rpc('increment_news_view', {article_id: parseInt(id)}).then().catch(() => {});
    // Load related
    loadRelated(data);
  } catch(ex) {
    wrap.innerHTML = `<div class="center"><div class="center-i">⚠️</div><div style="font-weight:700;font-size:14px">${L().errLoadingArticle}</div><div style="font-size:12.5px;margin-top:6px">${esc(ex.message)}</div><div style="margin-top:14px"><a href="news.html" style="color:var(--blue);font-weight:700">${L().backToNews}</a></div></div>`;
  }
}

function renderArticle(a){
  const cat = CAT_INFO[a.category] || CAT_INFO.general;
  const icon = CAT_ICONS[a.category] || '📰';
  document.title = a.title + ' — ' + (document.documentElement.lang==='ar'?'وادي الست':'Wadi El Sit');

  // Update Open Graph tags for rich previews on Facebook/WhatsApp/Telegram
  const ogTitle = document.getElementById('og-title');
  const ogDesc = document.getElementById('og-description');
  const ogImg = document.getElementById('og-image');
  const ogUrl = document.getElementById('og-url');
  if (ogTitle) ogTitle.setAttribute('content', a.title);
  if (ogDesc) ogDesc.setAttribute('content', a.summary || (a.content||'').slice(0,160));
  if (ogImg && a.cover_image) ogImg.setAttribute('content', a.cover_image);
  if (ogUrl) ogUrl.setAttribute('content', window.location.href);

  const cover = a.cover_image
    ? `<img src="${esc(a.cover_image)}" alt="${esc(a.title)}">`
    : `<span class="cover-fallback">${icon}</span>`;

  const dateStr = formatFullDate(a.created_at);

  const eventBox = a.event_date ? `
    <div class="event-box">
      <div class="event-box-i">📅</div>
      <div class="event-box-text">
        <div class="event-box-l">${L().eventDateLabel}</div>
        <div class="event-box-d">${formatFullDate(a.event_date)}</div>
        ${a.event_location ? `<div class="event-box-loc">📍 ${esc(a.event_location)}</div>` : ''}
      </div>
    </div>
  ` : '';

  const gallery = (a.gallery && a.gallery.length) ? `
    <div class="gallery">
      ${a.gallery.map(url => `<div class="gallery-item" onclick="openLightbox('${esc(url)}')"><img src="${esc(url)}" alt="" loading="lazy"></div>`).join('')}
    </div>
  ` : '';

  const html = `
    <div class="cover">
      ${cover}
      <div class="cover-cat" style="color:${cat.color}">${pickLang(cat.label)}</div>
    </div>
    <article class="article">
      <div class="title-bar">
        <h1 class="title">${esc(a.title)}</h1>
        <div class="meta">
          ${a.author_name ? `<span>✍️ ${esc(a.author_name)}</span><span class="meta-dot"></span>` : ''}
          <span>📅 ${dateStr}</span>
          ${a.view_count ? `<span class="meta-dot"></span><span>👁️ ${a.view_count} ${L().views}</span>` : ''}
        </div>
      </div>

      ${a.summary ? `<div class="summary">${esc(a.summary)}</div>` : ''}

      ${eventBox}

      <div class="content">${esc(a.content)}</div>

      ${gallery}

      <div class="share-bar">

          ${L().shareWA}
        </button>
        <button class="share-btn fb" onclick="shareFacebook()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          ${L().shareFB}
        </button>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>

}

async function loadRelated(article){
  try {
    let q = sb.from('news_articles').select('id,title,category,cover_image,created_at')
      .eq('mun_id', MUN_ID).eq('is_published', true)
      .neq('id', article.id);
    // Try same category first
    if (article.category && article.category !== 'general') {
      q = q.eq('category', article.category);
    }
    q = q.order('created_at', {ascending:false}).limit(4);
    const {data} = await q;
    let items = data || [];
    if (items.length < 2) {
      // Fallback: any recent news
      const r2 = await sb.from('news_articles').select('id,title,category,cover_image,created_at')
        .eq('mun_id', MUN_ID).eq('is_published', true)
        .neq('id', article.id)
        .order('created_at', {ascending:false}).limit(4);
      items = r2.data || [];
    }
    const wrap = document.getElementById('RELATED');
    if (!items.length) {
      wrap.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:14px;color:var(--text3);font-size:12.5px">' + L().noOtherNews + '</div>';
      return;
    }
    wrap.innerHTML = items.map(n => {
      const ci = CAT_INFO[n.category] || CAT_INFO.general;
      const ic = CAT_ICONS[n.category] || '📰';
      const cover = n.cover_image ? `<img src="${esc(n.cover_image)}" alt="" loading="lazy">` : `<span style="font-size:24px;opacity:.6">${ic}</span>`;
      return `<a class="related-card" href="news-detail.html?id=${n.id}">
        <div class="related-img">${cover}</div>
        <div class="related-text">
          <div class="related-cat" style="color:${ci.color}">${pickLang(ci.label)}</div>
          <div class="related-title">${esc(n.title)}</div>
          <div class="related-meta">📅 ${formatRelativeDate(n.created_at)}</div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    document.getElementById('RELATED').innerHTML = '';
  }
}

// Wadi-style language switcher (matches news.html)
window.wadiSetLang = function(lang){
  if(!lang || (lang!=='ar' && lang!=='en' && lang!=='fr')) return;
  try { localStorage.setItem('wadi_lang', lang); } catch(e){}
  if (typeof I18N !== 'undefined' && I18N && typeof I18N.setLang === 'function') {
    try { I18N.setLang(lang); } catch(e){}
  }
  document.documentElement.lang = lang;
  document.documentElement.dir = (lang==='ar') ? 'rtl' : 'ltr';
  document.querySelectorAll('.wadi-lang-btn').forEach(b => b.classList.toggle('on', b.getAttribute('data-lang')===lang));
};
function highlightLangPill(){
  const cur = document.documentElement.lang || 'ar';
  document.querySelectorAll('.wadi-lang-btn').forEach(b => b.classList.toggle('on', b.getAttribute('data-lang')===cur));
}
if (typeof I18N !== 'undefined' && I18N && typeof I18N.onApply === 'function') {
  try { I18N.onApply(function(){ highlightLangPill(); }); } catch(e){}
}
document.addEventListener('DOMContentLoaded', highlightLangPill);

// SHARING
function shareWhatsApp(){
  if (!currentArticle) return;
  const url = window.location.href;
  const text = currentArticle.title + '\n\n' + (currentArticle.summary || (currentArticle.content||'').slice(0,200)) + '\n\n📖 ' + L().readMore + ': ' + url;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function shareFacebook(){
  if (!currentArticle) return;
  const url = window.location.href;
  const fbUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url) + '&quote=' + encodeURIComponent(currentArticle.title);
  window.open(fbUrl, '_blank', 'width=600,height=600');
}

function shareTelegram(){
  if (!currentArticle) return;
  const url = window.location.href;
  const text = currentArticle.title + '\n\n' + (currentArticle.summary || '');
  const tgUrl = 'https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text);
  window.open(tgUrl, '_blank');
}
function copyLink(){
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      alert(L().linkCopied);
    }).catch(() => fallbackCopy(url));
  } else fallbackCopy(url);
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); alert(L().linkCopied); } catch(e) { alert(L().copyManually + ' ' + text); }
  document.body.removeChild(ta);
}
async function shareNative(){
  if (!currentArticle) return;
  if (navigator.share) {
    try {
      await navigator.share({
        title: currentArticle.title,
        text: currentArticle.summary || '',
        url: window.location.href
      });
    } catch(e) {}
  } else {
    copyLink();
  }
}

// LIGHTBOX
function openLightbox(src){
  document.getElementById('LIGHTBOX_IMG').src = src;
  document.getElementById('LIGHTBOX').classList.add('on');
}
function closeLightbox(){
  document.getElementById('LIGHTBOX').classList.remove('on');
}

function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatFullDate(iso){
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const lang = document.documentElement.lang || 'ar';
    const locale = lang === 'ar' ? 'ar-LB' : lang === 'fr' ? 'fr-FR' : 'en-GB';
    return d.toLocaleDateString(locale, {weekday:'long', day:'2-digit', month:'long', year:'numeric'}) + ' • ' + d.toLocaleTimeString(locale, {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return iso; }
}
function formatRelativeDate(iso){
  if (!iso) return '—';
  const d = new Date(iso); const now = new Date();
  const diff = (now - d) / 1000;
  const lang = document.documentElement.lang || 'ar';
  const locale = lang === 'ar' ? 'ar-LB' : lang === 'fr' ? 'fr-FR' : 'en-GB';
  const t = L();
  if (diff < 60) return t.timeJustNow;
  if (diff < 3600) return Math.floor(diff/60) + ' ' + t.timeMinShort;
  if (diff < 86400) return t.timeAgo + ' ' + Math.floor(diff/3600) + ' ' + t.timeHrShort;
  if (diff < 604800) return t.timeAgo + ' ' + Math.floor(diff/86400) + ' ' + t.timeDayShort;
  return d.toLocaleDateString(locale, {day:'2-digit', month:'short'});
}

// Init
loadArticle();

<style>
*{box-sizing:border-box;margin:0;padding:0}

.event-box-loc{font-size:12px;color:#92400e}

.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
@media(min-width:540px){.gallery{grid-template-columns:repeat(3,1fr)}}
.gallery-item{aspect-ratio:1/1;background:var(--bg2);border-radius:9px;overflow:hidden;cursor:pointer;transition:.15s}
.gallery-item:hover{transform:scale(1.03);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.gallery-item img{width:100%;height:100%;object-fit:cover}

/* SHARE */
.share-bar{display:flex;gap:8px;flex-wrap:wrap;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px}
.share-btn{flex:1;min-width:90px;padding:11px;border:1.5px solid var(--border);border-radius:11px;background:#fff;font-family:inherit;font-size:12.5px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--text);transition:.15s}
.share-btn:hover{border-color:var(--blue3);background:var(--blue4)}
.share-btn.wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border-color:transparent}
.share-btn.wa:hover{filter:brightness(1.05)}
.share-btn.fb{background:linear-gradient(135deg,#1877F2,#0E5FBF);color:#fff;border-color:transparent}
.share-btn.fb:hover{filter:brightness(1.08)}
.share-btn.tw{background:linear-gradient(135deg,#1DA1F2,#0d8ddc);color:#fff;border-color:transparent}
.share-btn.tw:hover{filter:brightness(1.05)}
.share-btn.tg{background:linear-gradient(135deg,#0088cc,#006699);color:#fff;border-color:transparent}
.share-btn.tg:hover{filter:brightness(1.05)}

/* RELATED */
.related-h{font-size:14.5px;font-weight:800;color:var(--blue2);margin:26px 0 12px}
.related-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:540px){.related-grid{grid-template-columns:1fr 1fr}}
.related-card{display:flex;gap:11px;background:#fff;border:1px solid var(--border);border-radius:11px;padding:11px;cursor:pointer;transition:.15s;text-decoration:none;color:inherit}
.related-card:hover{border-color:var(--blue3);transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.06)}
.related-img{width:70px;height:70px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden}
.related-img img{width:100%;height:100%;object-fit:cover}
.related-text{flex:1;min-width:0}
.related-cat{font-size:10.5px;color:var(--blue);font-weight:700;margin-bottom:2px}
.related-title{font-size:12.5px;font-weight:800;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.related-meta{font-size:10.5px;color:var(--text3);margin-top:4px}

/* LOADING / EMPTY */
.center{text-align:center;padding:60px 20px;color:var(--text3)}
.center-i{font-size:48px;margin-bottom:12px;opacity:.5}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* IMAGE LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;cursor:pointer}
.lightbox.on{display:flex;animation:fadeIn .25s}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px}
.lightbox-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.18);color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<header class="app-hdr">
  <div class="hdr-row">
    <a href="index.html" class="hdr-back" data-i18n="backHome">🏛️ البوابة</a>
    <a href="news.html" class="hdr-news" data-i18n="allNews">📰 كل الأخبار</a>
  </div>
</header>

<div class="container" id="ARTICLE">
  <div class="center"><span class="spin"></span> <span data-i18n="loading">جاري التحميل...</span></div>
</div>

<div class="lightbox" id="LIGHTBOX" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="LIGHTBOX_IMG" src="" alt="">
</div>

<script>
const SUPABASE_URL='https://onjbwhkmmtqnymhjnplw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uamJ3aGttbXRxbnltaGpucGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDY4MjUsImV4cCI6MjA5MDM4MjgyNX0.lhlsRdOqVHZuOXCJa0lCNuZkYJHhf1AZ_zOwqHHAeG4';
const MUN_ID='00000000-0000-0000-0000-000000000001';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const CAT_INFO = {
  general:      {label:{ar:'📢 عام',en:'📢 General',fr:'📢 Général'},          color:'#1a6eb5'},
  announcement: {label:{ar:'📢 إعلان رسمي',en:'📢 Official',fr:'📢 Annonce officielle'},    color:'#0f4d82'},
  event:        {label:{ar:'🎉 فعّالية',en:'🎉 Event',fr:'🎉 Événement'},       color:'#7c3aed'},
  alert:        {label:{ar:'⚠️ تنبيه',en:'⚠️ Alert',fr:'⚠️ Alerte'},          color:'#d97706'},
  urgent:       {label:{ar:'🚨 طارئ',en:'🚨 Urgent',fr:'🚨 Urgent'},           color:'#bf2424'},
  water:        {label:{ar:'💧 ماء/ري',en:'💧 Water/Irrigation',fr:'💧 Eau/Irrigation'},         color:'#0891b2'},
  tender:       {label:{ar:'📋 مناقصة',en:'📋 Tender',fr:'📋 Appel d\'offres'},          color:'#15803d'}
};
const CAT_ICONS = {general:'📢', announcement:'📢', event:'🎉', alert:'⚠️', urgent:'🚨', water:'💧', tender:'📋'};

let currentArticle = null;

async function loadArticle(){
  const id = new URLSearchParams(window.location.search).get('id');
  const wrap = document.getElementById('ARTICLE');
  if (!id || !/^\d+$/.test(id)) {
    wrap.innerHTML = '<div class="center"><div class="center-i">⚠️</div><div>' + L().invalidLink + '</div><div style="margin-top:14px"><a href="news.html" style="color:var(--blue);font-weight:700">' + L().backToNews + '</a></div></div>';
    return;
  }
  try {
    const {data, error} = await sb.from('news_articles').select('*').eq('id', id).eq('is_published', true).single();
    if (error) throw error;
    if (!data) throw new Error(L().articleNotFound);
    currentArticle = data;
    renderArticle(data);
    // Increment view count (fire and forget)
    sb.rpc('increment_news_view', {article_id: parseInt(id)}).then().catch(() => {});
    // Load related
    loadRelated(data);
  } catch(ex) {
    wrap.innerHTML = `<div class="center"><div class="center-i">⚠️</div><div style="font-weight:700;font-size:14px">${L().errLoadingArticle}</div><div style="font-size:12.5px;margin-top:6px">${esc(ex.message)}</div><div style="margin-top:14px"><a href="news.html" style="color:var(--blue);font-weight:700">${L().backToNews}</a></div></div>`;
  }
}

function renderArticle(a){
  const cat = CAT_INFO[a.category] || CAT_INFO.general;
  const icon = CAT_ICONS[a.category] || '📰';
  document.title = a.title + ' — ' + (document.documentElement.lang==='ar'?'وادي الست':'Wadi El Sit');

  // Update Open Graph tags for rich previews on Facebook/WhatsApp/Telegram
  const ogTitle = document.getElementById('og-title');
  const ogDesc = document.getElementById('og-description');
  const ogImg = document.getElementById('og-image');
  const ogUrl = document.getElementById('og-url');
  if (ogTitle) ogTitle.setAttribute('content', a.title);
  if (ogDesc) ogDesc.setAttribute('content', a.summary || (a.content||'').slice(0,160));
  if (ogImg && a.cover_image) ogImg.setAttribute('content', a.cover_image);
  if (ogUrl) ogUrl.setAttribute('content', window.location.href);

  const cover = a.cover_image
    ? `<img src="${esc(a.cover_image)}" alt="${esc(a.title)}">`
    : `<span class="cover-fallback">${icon}</span>`;

  const dateStr = formatFullDate(a.created_at);

  const eventBox = a.event_date ? `
    <div class="event-box">
      <div class="event-box-i">📅</div>
      <div class="event-box-text">
        <div class="event-box-l">${L().eventDateLabel}</div>
        <div class="event-box-d">${formatFullDate(a.event_date)}</div>
        ${a.event_location ? `<div class="event-box-loc">📍 ${esc(a.event_location)}</div>` : ''}
      </div>
    </div>
  ` : '';

  const gallery = (a.gallery && a.gallery.length) ? `
    <div class="gallery">
      ${a.gallery.map(url => `<div class="gallery-item" onclick="openLightbox('${esc(url)}')"><img src="${esc(url)}" alt="" loading="lazy"></div>`).join('')}
    </div>
  ` : '';

  const html = `
    <div class="cover">
      ${cover}
      <div class="cover-cat" style="color:${cat.color}">${pickLang(cat.label)}</div>
    </div>
    <article class="article">
      <div class="title-bar">
        <h1 class="title">${esc(a.title)}</h1>
        <div class="meta">
          ${a.author_name ? `<span>✍️ ${esc(a.author_name)}</span><span class="meta-dot"></span>` : ''}
          <span>📅 ${dateStr}</span>
          ${a.view_count ? `<span class="meta-dot"></span><span>👁️ ${a.view_count} ${L().views}</span>` : ''}
        </div>
      </div>

      ${a.summary ? `<div class="summary">${esc(a.summary)}</div>` : ''}

      ${eventBox}

      <div class="content">${esc(a.content)}</div>

      ${gallery}

      <div class="share-bar">
        <button class="share-btn wa" onclick="shareWhatsApp()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893A11.821 11.821 0 0 0 20.464 3.488"/></svg>
          ${L().shareWA}
        </button>
        <button class="share-btn fb" onclick="shareFacebook()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          ${L().shareFB}
        </button>
        <button class="share-btn tg" onclick="shareTelegram()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          ${L().shareTG}
        </button>
        <button class="share-btn" onclick="copyLink()">${L().copyLink}</button>
        <button class="share-btn" onclick="shareNative()">${L().share}</button>
      </div>

      <h2 class="related-h">${L().relatedNews}</h2>
      <div id="RELATED" class="related-grid">
        <div style="grid-column:1/-1;text-align:center;padding:14px;color:var(--text3);font-size:12.5px"><span class="spin"></span> ${L().loading}</div>
      </div>
    </article>
  `;
  document.getElementById('ARTICLE').innerHTML = html;
}

async function loadRelated(article){
  try {
    let q = sb.from('news_articles').select('id,title,category,cover_image,created_at')
      .eq('mun_id', MUN_ID).eq('is_published', true)
      .neq('id', article.id);
    // Try same category first
    if (article.category && article.category !== 'general') {
      q = q.eq('category', article.category);
    }
    q = q.order('created_at', {ascending:false}).limit(4);
    const {data} = await q;
    let items = data || [];
    if (items.length < 2) {
      // Fallback: any recent news
      const r2 = await sb.from('news_articles').select('id,title,category,cover_image,created_at')
        .eq('mun_id', MUN_ID).eq('is_published', true)
        .neq('id', article.id)
        .order('created_at', {ascending:false}).limit(4);
      items = r2.data || [];
    }
    const wrap = document.getElementById('RELATED');
    if (!items.length) {
      wrap.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:14px;color:var(--text3);font-size:12.5px">' + L().noOtherNews + '</div>';
      return;
    }
    wrap.innerHTML = items.map(n => {
      const ci = CAT_INFO[n.category] || CAT_INFO.general;
      const ic = CAT_ICONS[n.category] || '📰';
      const cover = n.cover_image ? `<img src="${esc(n.cover_image)}" alt="" loading="lazy">` : `<span style="font-size:24px;opacity:.6">${ic}</span>`;
      return `<a class="related-card" href="news-detail.html?id=${n.id}">
        <div class="related-img">${cover}</div>
        <div class="related-text">
          <div class="related-cat" style="color:${ci.color}">${pickLang(ci.label)}</div>
          <div class="related-title">${esc(n.title)}</div>
          <div class="related-meta">📅 ${formatRelativeDate(n.created_at)}</div>
        </div>
      </a>`;
    }).join('');
  } catch(e) {
    document.getElementById('RELATED').innerHTML = '';
  }
}

// SHARING
function shareWhatsApp(){
  if (!currentArticle) return;
  const url = window.location.href;
  const text = currentArticle.title + '\n\n' + (currentArticle.summary || (currentArticle.content||'').slice(0,200)) + '\n\n📖 ' + L().readMore + ': ' + url;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function shareFacebook(){
  if (!currentArticle) return;
  const url = window.location.href;
  const fbUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url) + '&quote=' + encodeURIComponent(currentArticle.title);
  window.open(fbUrl, '_blank', 'width=600,height=600');
}

function shareTelegram(){
  if (!currentArticle) return;
  const url = window.location.href;
  const text = currentArticle.title + '\n\n' + (currentArticle.summary || '');
  const tgUrl = 'https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text);
  window.open(tgUrl, '_blank');
}
function copyLink(){
  const url = window.location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      alert(L().linkCopied);
    }).catch(() => fallbackCopy(url));
  } else fallbackCopy(url);
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); alert(L().linkCopied); } catch(e) { alert(L().copyManually + ' ' + text); }
  document.body.removeChild(ta);
}
async function shareNative(){
  if (!currentArticle) return;
  if (navigator.share) {
    try {
      await navigator.share({
        title: currentArticle.title,
        text: currentArticle.summary || '',
        url: window.location.href
      });
    } catch(e) {}
  } else {
    copyLink();
  }
}

// LIGHTBOX
function openLightbox(src){
  document.getElementById('LIGHTBOX_IMG').src = src;
  document.getElementById('LIGHTBOX').classList.add('on');
}
function closeLightbox(){
  document.getElementById('LIGHTBOX').classList.remove('on');
}

function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatFullDate(iso){
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const lang = document.documentElement.lang || 'ar';
    const locale = lang === 'ar' ? 'ar-LB' : lang === 'fr' ? 'fr-FR' : 'en-GB';
    return d.toLocaleDateString(locale, {weekday:'long', day:'2-digit', month:'long', year:'numeric'}) + ' • ' + d.toLocaleTimeString(locale, {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return iso; }
}
function formatRelativeDate(iso){
  if (!iso) return '—';
  const d = new Date(iso); const now = new Date();
  const diff = (now - d) / 1000;
  const lang = document.documentElement.lang || 'ar';
  const locale = lang === 'ar' ? 'ar-LB' : lang === 'fr' ? 'fr-FR' : 'en-GB';
  const t = L();
  if (diff < 60) return t.timeJustNow;
  if (diff < 3600) return Math.floor(diff/60) + ' ' + t.timeMinShort;
  if (diff < 86400) return t.timeAgo + ' ' + Math.floor(diff/3600) + ' ' + t.timeHrShort;
  if (diff < 604800) return t.timeAgo + ' ' + Math.floor(diff/86400) + ' ' + t.timeDayShort;
  return d.toLocaleDateString(locale, {day:'2-digit', month:'short'});
}

// Init
loadArticle();
</script>
