  var hm = document.getElementById('_whm');
  if(hm && hm.style.display !== 'none'){
    hm.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
    var t = L();
    var titleEl = hm.querySelector('#_whb-title');
    if(titleEl) titleEl.textContent = t.waterHelpTitle;
    var body = document.getElementById('_whb');
    if(body) body.innerHTML = t.waterHelpHtml;
  }
  /* If results are showing, refresh them */
  var result = document.getElementById('wp-result');
  if(result && result.innerHTML.trim() !== '' && typeof lookupWaterOwner === 'function'){
    var p = document.getElementById('wp-phone');
    if(p && p.value) lookupWaterOwner();
  }
});

function getCycleInfo(){
  var cfg=_config||{};
  var owners=_owners.slice().sort(function(a,b){return (a.sort_order||0)-(b.sort_order||0);});
  var totalMins=owners.reduce(function(s,o){return s+(parseFloat(o.hours)||0)*60;},0);
  // Use configured total hours even if owners don't fill all 160h yet
  var configuredMins=(parseInt(cfg.total_hours)||160)*60;
  // Cycle length = configured total (not sum of current owners)
  totalMins=configuredMins;
  var csd = (cfg.cycle_start_date||'2026-04-20').toString().slice(0,10);
  var ds = (cfg.day_start||'06:00').toString();
  var cs=new Date(csd);
  cs.setHours(parseInt(ds.split(':')[0]||6),parseInt(ds.split(':')[1]||0),0,0);
  var now=new Date();
  var elapsed=Math.max(0,now-cs);
  var cycleMs=totalMins*60000;
  var cycleNum=Math.floor(elapsed/cycleMs);
  var cycleStart=new Date(cs.getTime()+cycleNum*cycleMs);
  var cycleEnd=new Date(cycleStart.getTime()+cycleMs);
  return{cycleNum:cycleNum+1,isDay:cycleNum%2===0,cycleStart,cycleEnd,totalMins};
}

function getOwnerSched(owner,offset){
  offset=offset||0;
  var owners=_owners.slice().sort(function(a,b){return a.sort_order-b.sort_order;});
  var cumMins=0;
  for(var i=0;i<owners.length;i++){
    if(owners[i].id===owner.id) break;
    cumMins+=(parseFloat(owners[i].hours)||0)*60;
  }
  var ci=getCycleInfo();
  var targetCycle=ci.cycleNum-1+offset;
  var isDay=targetCycle%2===0;
  var cStart=new Date(ci.cycleStart.getTime()+offset*ci.totalMins*60000);
  var oStart=addMinsToDate(cStart,cumMins);
  var oEnd=addMinsToDate(oStart,(parseFloat(owner.hours)||0)*60);
  return{isDay,cycleLabel:isDay?L().cycleDay:L().cycleNight,cycleNum:targetCycle+1,
    startDate:oStart,endDate:oEnd,startTime:fmtTime(oStart),endTime:fmtTime(oEnd),
    startDateStr:fmtDateAr(oStart)};
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async function(){
  sb=window.supabase.createClient(SB_URL,SB_KEY,{realtime:{enabled:false}});
  // Safety timeout: always show UI after 4 seconds regardless of DB state
  var safetyTimer = setTimeout(function(){
    var lm=document.getElementById('loading-msg');
    var lc=document.getElementById('lookup-card');
    if(lm) lm.style.display='none';
    if(lc) lc.style.display='block';
  }, 4000);

  // Load owners: try irr_owners table → fallback to settings → fallback to localStorage
  try{
    var r1=await sb.from('irr_owners').select('id,name,phone,email,area,land_name,land_ref,crop,hours,sort_order,notes').eq('municipality_id',MUN_ID).order('sort_order',{ascending:true});
    if(!r1.error && r1.data){
      var tableOwners = r1.data.map(function(r){
        return {id:r.id,name:r.name,phone:r.phone,email:r.email||'',
          area:r.area||'',land_name:r.land_name||r.landName||'',
          land_ref:r.land_ref||r.landRef||'',crop:r.crop||'',
          hours:parseFloat(r.hours)||0,sort_order:parseInt(r.sort_order||r.order)||1,notes:r.notes||''};
      });
      if(tableOwners.length>0){
        _owners=tableOwners;
      } else {
        // Table empty — try settings
        throw new Error('table empty');
      }
    } else throw r1.error||new Error('table error');
  }catch(e){
    console.log('irr_owners table:',e.message,'— trying settings fallback');
    try{
      var rs=await sb.from('settings').select('value').eq('key','wadi_irr_owners').single();
      if(!rs.error&&rs.data&&rs.data.value){
        var arr=Array.isArray(rs.data.value)?rs.data.value:[];
        _owners=arr.map(function(o){
          return {id:o.id,name:o.name,phone:o.phone,email:o.email||'',
            area:o.area||'',land_name:o.landName||o.land_name||'',
            land_ref:o.landRef||o.land_ref||'',crop:o.crop||'',
            hours:parseFloat(o.hours)||0,sort_order:parseInt(o.order||o.sort_order)||1,notes:o.notes||''};
        });
        console.log('Loaded '+_owners.length+' owners from settings fallback');
      }
    }catch(e2){console.log('settings fallback failed:',e2.message);}
    // Final fallback: localStorage (same GitHub Pages domain as dashboard.html)
    if(!_owners.length){
      try{
        var ls=localStorage.getItem('wadi_irr_owners');
        if(ls){var lsArr=JSON.parse(ls);
          if(Array.isArray(lsArr)&&lsArr.length>0){
            var rawOwners=lsArr.map(function(o){return{id:o.id,name:o.name,phone:o.phone,
              email:o.email||'',area:o.area||'',
              land_name:o.landName||o.land_name||'',
              land_ref:o.landRef||o.land_ref||'',crop:o.crop||'',
              hours:parseFloat(o.hours)||0,
              sort_order:parseInt(o.order||o.sort_order)||1,notes:o.notes||''};});
            // Deduplicate by phone number
            var seen={};
            _owners=rawOwners.filter(function(o){
              var k=(o.phone||'').replace(/[^0-9]/g,'');
              if(seen[k])return false; seen[k]=true; return true;
            });
            console.log('Loaded '+_owners.length+' owners from localStorage (deduped from '+rawOwners.length+')');
          }
        }
      }catch(e3){console.log('localStorage fail:',e3);}
    }
  }

  // Load config: try irr_config table → fallback to settings
  try{
    var r2=await sb.from('irr_config').select('*').eq('municipality_id',MUN_ID).single();
    if(!r2.error&&r2.data) _config=r2.data;
    else throw r2.error||new Error('no config');
  }catch(e){
    try{
      var rc=await sb.from('settings').select('value').eq('key','wadi_irr_config').single();
      if(!rc.error&&rc.data&&rc.data.value){
        var c=rc.data.value;
        _config={day_start:c.dayStart||'06:00',night_start:c.nightStart||'18:00',
          total_hours:c.totalHours||160,cycle_start_date:c.cycleStartDate||'2026-04-20'};
      }
    }catch(e2){}
  }

  clearTimeout(safetyTimer);
  document.getElementById('loading-msg').style.display='none';
  document.getElementById('lookup-card').style.display='block';
  setTimeout(function(){var p=document.getElementById('wp-phone');if(p)p.focus();},200);

  // Auto-lookup if ?phone=... in URL (came from a push notification)
  var urlParams = new URLSearchParams(window.location.search);
  var phoneParam = urlParams.get('phone');
  if (phoneParam) {
    setTimeout(function(){
      var p = document.getElementById('wp-phone');
      if (p) {
        p.value = phoneParam;
        lookupWaterOwner();
        // Scroll to result
        setTimeout(function(){
          var res = document.getElementById('wp-result');
          if (res) res.scrollIntoView({behavior:'smooth', block:'center'});
        }, 400);
      }
    }, 600);
  }
});

// ── LOOKUP ────────────────────────────────────────────────────────────────────
function lookupWaterOwner(){
  var phone=document.getElementById('wp-phone').value.replace(/[^0-9]/g,'').trim();
  var err=document.getElementById('wp-err'),result=document.getElementById('wp-result');
  if(!phone||phone.length<6){err.textContent=L().errPhoneRequired;return;}
  err.textContent='';
  var norm=function(p){return(p||'').replace(/[^0-9]/g,'').replace(/^961/,'').replace(/^0/,'');};
  var inp=norm(phone);
  var matches=_owners.filter(function(o){return norm(o.phone)===inp;});
  if(!matches.length){
    var t = L();
    var noOwnersMsg = _owners.length===0
      ? '<div style="font-size:12px;background:#fff9e6;border:1px solid #f5c842;border-radius:8px;padding:8px 12px;margin-top:10px;color:#7d5a00">' + t.noSubscribersYet + '</div>'
      : '';
    result.innerHTML='<div class="card" style="text-align:center">'
      +'<div style="font-size:36px;margin-bottom:10px">🔒</div>'
      +'<div style="font-size:16px;font-weight:700;margin-bottom:6px;color:#e74c3c">' + t.noRecordFound + '</div>'
      +'<div style="font-size:13px;color:var(--text3)">' + t.checkPhoneOrContact + '</div>'
      +noOwnersMsg
      +'</div>';
    return;
  }
  var html='';
  var t = L();
  matches.forEach(function(o){
    var sch=getOwnerSched(o,0), schNext=getOwnerSched(o,1);
    html+='<div class="card" style="border:2px solid #1e5429">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
      +'<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1e5429,#2d7a3e);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px">#'+o.sort_order+'</div>'
      +'<div><div style="font-size:17px;font-weight:800;color:#1e5429">'+o.name+'</div>'
      +(o.area?'<div style="font-size:12px;color:var(--text3)">'+o.area+'</div>':'')+'</div></div>'
      +(o.land_name?'<div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px">🌿 '+o.land_name+(o.crop?' ('+o.crop+')':'')+(o.land_ref?' · '+t.deed+': '+o.land_ref:'')+'</div>':'')
      // Current cycle
      +'<div style="background:linear-gradient(120deg,'+(sch.isDay?'#e67e22,#f39c12':'#2c3e6b,#3a4fa8')+');color:#fff;border-radius:12px;padding:16px;text-align:center;margin-bottom:8px">'
      +'<div style="font-size:12px;opacity:.85;margin-bottom:4px">'+t.thisCycle+' — '+sch.cycleLabel+'</div>'
      +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+sch.startDateStr+'</div>'
      +'<div style="font-size:22px;font-weight:800;direction:ltr">⏰ '+sch.startTime+' — '+sch.endTime+'</div>'
      +'<div style="font-size:20px;font-weight:800;margin-top:6px">💧 '+o.hours+' '+t.hour+'</div>'
      +'</div>'
      // Next cycle
      +'<div style="background:var(--bg2);border-radius:10px;padding:12px;text-align:center">'
      +'<div style="font-size:11px;color:var(--text3);margin-bottom:3px">'+t.nextCycle+' — '+schNext.cycleLabel+'</div>'
      +'<div style="font-size:14px;font-weight:700;color:var(--text2)">'+schNext.startDateStr+'</div>'
      +'<div style="font-size:16px;font-weight:700;direction:ltr">'+schNext.startTime+' — '+schNext.endTime+'</div>'
      +'</div>'
      +(o.notes?'<div style="margin-top:8px;padding:8px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--text3)">📝 '+o.notes+'</div>':'')
      // Push notification toggle for water owner
      +'<div style="margin-top:14px;padding-top:14px;border-top:1px dashed var(--border)">'
      +'<div style="font-size:13px;font-weight:700;color:#1e5429;margin-bottom:6px">'+t.waterPushTitle+'</div>'
      +'<div style="font-size:11.5px;color:var(--text3);margin-bottom:8px">'+t.waterPushSub+'</div>'
      +'<div id="water-push-'+o.id+'"></div>'
      +'</div>'
      +'</div>';
  });
  result.innerHTML=html;
  // Render push toggle for each owner found
  matches.forEach(function(o){
    if (window.PWA && window.PWA.canPush && window.PWA.canPush()) {
      window.PWA.renderToggle('water-push-'+o.id, {
        topics: ['general','water'],
        userPhone: o.phone,
        userName: o.name,
        role: 'water_owner'
      });
    } else {
      var el = document.getElementById('water-push-'+o.id);
      if (el) el.parentElement.style.display = 'none';
    }
  });
}



function openHelp(p){
  var t = L();
  var dir = (document.documentElement.lang === 'ar') ? 'rtl' : 'ltr';
  var c = t.waterHelpHtml;

  var m = document.getElementById('_whm');
  if(!m){
    m = document.createElement('div');
    m.id = '_whm';
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;direction:'+dir;
    m.innerHTML = '<div style="background:#fff;border-radius:20px;max-width:540px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e0f2fe;position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;z-index:1">'
      +'<b id="_whb-title" style="font-size:15px;font-weight:800;color:#0891b2">'+t.waterHelpTitle+'</b>'
      +'<button onclick="document.getElementById(\'_whm\').remove()" style="background:#e0f2fe;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;color:#0891b2">✕</button>'
      +'</div>'
      +'<div id="_whb" style="padding:18px"></div>'
      +'</div>';
    m.addEventListener('click', function(e){ if(e.target===m) m.remove(); });
    document.body.appendChild(m);
  } else {
    m.style.direction = dir;
    var titleEl = m.querySelector('#_whb-title');
    if(titleEl) titleEl.textContent = t.waterHelpTitle;
  }
  document.getElementById('_whb').innerHTML = c;
  m.style.display = 'flex';
}</script>
<button class="help-btn" data-i18n-title="helpBtn" onclick="openHelp('water')" title="مساعدة">?</button>
