<style>
body{font-family:Tajawal,Tahoma,sans-serif;direction:rtl;background:#f2f5f9;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:#1a1a2e}
.card{background:#fff;border-radius:16px;padding:28px;max-width:560px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.fi{width:100%;padding:10px 13px;border:1.5px solid #e0e6ef;border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:10px;box-sizing:border-box}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#0f4d82,#1a6eb5);color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:transform .12s}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.drop{border:2.5px dashed #b9c6d8;border-radius:14px;padding:26px;text-align:center;color:#888;font-size:13.5px;font-weight:700;margin:12px 0;cursor:pointer;transition:border-color .15s,background .15s}
.drop:hover,.drop.on{border-color:#0f4d82;background:#f4f8fd;color:#0f4d82}
.frow{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border:1px solid #eef0f4;border-radius:9px;margin-bottom:6px;font-size:12.5px}
.bar{height:14px;background:#eef2f7;border-radius:8px;overflow:hidden;margin:12px 0}.bar>div{height:100%;background:linear-gradient(90deg,#0f4d82,#1a6eb5);width:0%;transition:width .2s}
#log{font-size:12px;color:#555;max-height:230px;overflow-y:auto;background:#f8fafc;border-radius:8px;padding:8px 10px;margin-top:10px;line-height:1.9}
.ok{color:#1f7a45;font-weight:800}.wr{color:#a83232;font-weight:800}
</style></head>

<div id="stage" style="display:none">

    📂 اسحب ملفات النسخة إلى هنا أو اضغط للاختيار<br>
    <span style="font-size:11px;font-weight:400">المطلوب: ‎.DMP (إلزامي) · ‎.LOG (للتحقق من الأعداد) · ‎.TXT (اختياري)</span>
  </div>
  <input type="file" id="fs" multiple accept=".dmp,.DMP,.log,.LOG,.txt,.TXT" style="display:none" onchange="pick(this.files)">

  <div id="log"></div>
  <a href="mrs.html" style="display:block;text-align:center;margin-top:14px;font-size:13px;color:#0f4d82;font-weight:700;text-decoration:none">← العودة إلى الأرشيف</a>
</div>
</div>
<script>
const sb=window.supabase.createClient('https://onjbwhkmmtqnymhjnplw.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uamJ3aGttbXRxbnltaGpucGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDY4MjUsImV4cCI6MjA5MDM4MjgyNX0.lhlsRdOqVHZuOXCJa0lCNuZkYJHhf1AZ_zOwqHHAeG4');
const TABLES=['MUKALLAF','FEE_TYPES','TAKLEEFAT','ISHAARAT','RECEIPTS','RECEIPTS_DET','IKARAT','IKAR_DETAILS','FEES_PER_TYPE','MRS_PAY_TRANSACTIONS','MBS_PARAGRAPH','MBSL_PARAGRAPH','MBS_SECTIONS','MBSL_SECTIONS','MBS_BUD_PLAN_EXPENSES','MBS_EXPENSES_BUD','MBS_PAYMENTS','MBS_PAY_TRANS','MBS_PAY_TRANSACTIONS','MBS_ACCEPTANCES','MBS_ACCEPT_DETAILS','MBS_RESERVES','MBS_CASH_DETAIL','MBS_TANSSIB_SUBLEDGER','MAS_SUB_LEDGER','MAS_MAJOR_ACCOUNT','KT_TAKLEEF_SCHED','KT_SCHED_FOR_YR'];
let files={dmp:null,log:null,txt:null}, U=null, S=null;
const dec1256=new TextDecoder('windows-1256');
const el=id=>document.getElementById(id);
function log(m){el('log').innerHTML=m+'<br>'+el('log').innerHTML;}

async function doLogin(){
  const{data,error}=await sb.auth.signInWithPassword({email:el('em').value.trim(),password:el('pw').value});
  if(error){el('lerr').textContent='⚠️ '+error.message;return;}
  if((data.user.email||'').toLowerCase()!=='imadaehn@gmail.com'){el('lerr').textContent='🚫 التحديث محصور بالمشرف العام';return;}
  el('login').style.display='none';el('stage').style.display='block';
}
const dz=document.currentScript?null:null;
window.addEventListener('load',()=>{
  const d=el('drop');
  ['dragover','dragenter'].forEach(ev=>d.addEventListener(ev,e=>{e.preventDefault();d.classList.add('on');}));
  ['dragleave','drop'].forEach(ev=>d.addEventListener(ev,e=>{e.preventDefault();d.classList.remove('on');}));
  d.addEventListener('drop',e=>pick(e.dataTransfer.files));
});
function pick(fl){
  for(const f of fl){
    const x=f.name.toLowerCase();
    if(x.endsWith('.dmp'))files.dmp=f;
    else if(x.endsWith('.log'))files.log=f;
    else if(x.endsWith('.txt'))files.txt=f;
  }
  el('flist').innerHTML=['dmp','log','txt'].map(k=>{
    const f=files[k];
    return '<div class="frow"><span>'+(k==='dmp'?'💾 ملف البيانات (.DMP)':k==='log'?'📋 سجل التصدير (.LOG)':'📄 معلومات النسخة (.TXT)')+'</span>'
      +(f?'<span class="ok">✓ '+f.name+' ('+(f.size/1048576).toFixed(1)+' MB)</span>':'<span style="color:#bbb">'+(k==='dmp'?'إلزامي':'اختياري')+'</span>')+'</div>';
  }).join('');
  el('go').disabled=!files.dmp;
}

function oraNumber(b){
  if(!b.length)return null;
  const exp=b[0];
  if(exp===0x80)return 0;
  let e,digs,neg;
  if(exp&0x80){e=(exp&0x7f)-65;digs=[];for(let i=1;i<b.length;i++)digs.push(b[i]-1);neg=false;}
  else{e=((~exp)&0x7f)-65;digs=[];for(let i=1;i<b.length;i++){if(b[i]!==102)digs.push(101-b[i]);}neg=true;}
  let v=0;
  for(let i=0;i<digs.length;i++)v+=digs[i]*Math.pow(100,e-i);
  if(Number.isInteger(v)===false&&Math.abs(v-Math.round(v))<1e-9)v=Math.round(v);
  return neg?-v:v;
}
function oraDate(b){
  if(b.length!==7)return null;
  const y=(b[0]-100)*100+(b[1]-100);
  if(y<1900||y>2100)return null;
  const p=n=>String(n).padStart(2,'0');
  return y+'-'+p(b[2])+'-'+p(b[3])+' '+p(b[4]-1)+':'+p(b[5]-1)+':'+p(b[6]-1);
}
function parseDDL(name){
  const i=S.indexOf('CREATE TABLE "'+name+'" (');
  if(i<0)return null;
  let j=S.indexOf(')  PCT',i); if(j<0)j=S.indexOf(') PCT',i);
  if(j<0)return null;
  const body=S.slice(i+('CREATE TABLE "'+name+'" ').length, j);
  const cols=[];
  const re=/"(\w+)"\s+(NUMBER|VARCHAR2|DATE|CHAR|LONG|CLOB|FLOAT)(?:\s*\((\d+)\))?/g;
  let m;
  while((m=re.exec(body)))cols.push({n:m[1].toLowerCase(),t:m[2],mx:m[3]?+m[3]:((m[2]==='NUMBER'||m[2]==='FLOAT')?22:4000)});
  const k=S.indexOf('INSERT INTO "'+name+'"', j);
  if(k<0)return null;
  const e=S.indexOf('\n',k);
  return {cols,start:e+1};
}
function tryRow(p,cols){
  const vals=[];
  for(const c of cols){
    if(p+2>U.length)return null;
    const L=U[p]|(U[p+1]<<8); p+=2;
    if(L===0xFFFE){vals.push(null);continue;}
    if(L===0xFFFF)return null;
    if((c.t==='NUMBER'||c.t==='FLOAT')&&L>22)return null;
    if(c.t==='DATE'&&L!==7)return null;
    if(L>c.mx&&c.t!=='LONG'&&c.t!=='CLOB')return null;
    if(L>4000)return null;
    const b=U.subarray(p,p+L); p+=L;
    if(c.t==='NUMBER'||c.t==='FLOAT'){vals.push(oraNumber(b));}
    else if(c.t==='DATE'){const v=oraDate(b); if(v===null)return null; vals.push(v);}
    else{try{vals.push(dec1256.decode(b));}catch(_e){return null;}}
  }
  return {vals,next:p};
}
function sane(vals){
  for(const x of vals)if(typeof x==='number'&&Math.abs(x)>1e12)return false;
  return true;
}
function extract(name){
  const d=parseDDL(name); if(!d)return null;
  const {cols,start}=d;
  for(let off=0;off<600;off++){
    let q=start+off, ok=true;
    for(let r=0;r<3;r++){
      const t=tryRow(q,cols);
      if(!t||t.vals[0]==null||!sane(t.vals)){ok=false;break;}
      q=t.next; if(U[q]===0&&U[q+1]===0)q+=2;
    }
    if(ok){
      const rows=[]; let p=start+off;
      while(true){
        const t=tryRow(p,cols);
        if(!t)break;
        rows.push(t.vals);
        p=t.next; if(U[p]===0&&U[p+1]===0)p+=2;
      }
      return {cols,rows};
    }
  }
  return {cols,rows:[]};
}

async function run(){
  el('go').disabled=true; el('barw').style.display='block';
  try{
    el('st').textContent='⏳ قراءة ملف البيانات ('+(files.dmp.size/1048576).toFixed(0)+' MB)…';
    const buf=await files.dmp.arrayBuffer();
    U=new Uint8Array(buf);
    S=new TextDecoder('latin1').decode(U);
    const head=S.slice(0,40);
    if(head.indexOf('EXPORT:V')<0){el('st').textContent='⚠️ الملف ليس نسخة Oracle exp صالحة';el('go').disabled=false;return;}
    log('✓ نسخة Oracle exp — '+head.match(/EXPORT:V[\d.]+/)[0]);
    // expected counts from LOG
    let expected={};
    if(files.log){
      const lt=dec1256.decode(new Uint8Array(await files.log.arrayBuffer())).replace(/\u00a0/g,' ');
      const re=/تصدير جدول\s+(\w+)\s*تم تصدير\s+(\d+)/g; let m;
      while((m=re.exec(lt))){ if(!(m[1] in expected)) expected[m[1]]=+m[2]; }
      log('✓ سجل التصدير: '+Object.keys(expected).length+' جدولاً');
    }
    if(files.txt){
      const tt=dec1256.decode(new Uint8Array(await files.txt.arrayBuffer()));
      const m=tt.match(/SITE NAME:\s*([^\r\n]+)/);
      if(m)log('🏛️ الموقع: '+m[1].trim());
    }
    // extract
    const out={};
    let totalRows=0, warn=0;
    for(let i=0;i<TABLES.length;i++){
      const t=TABLES[i];
      el('st').textContent='🔎 استخراج '+t+' ('+(i+1)+'/'+TABLES.length+')…';
      el('pb').style.width=(i/TABLES.length*40).toFixed(0)+'%';
      await new Promise(r=>setTimeout(r,10));
      const res=extract(t);
      if(!res){log('<span class="wr">⚠️ '+t+': غير موجود في النسخة</span>');warn++;continue;}
      const exp=expected[t];
      if(exp!=null&&res.rows.length!==exp){
        log('<span class="wr">⚠️ '+t+': '+res.rows.length+' ≠ المتوقع '+exp+'</span>');warn++;
      }else{
        log('<span class="ok">✓ '+t+': '+res.rows.length+' صف'+(exp!=null?' (مطابق للسجل)':'')+'</span>');
      }
      out['mrs_'+t.toLowerCase()]=res;
      totalRows+=res.rows.length;
    }
    // import
    let done=0;
    const names=Object.keys(out);
    for(const pg of names){
      const {cols,rows}=out[pg];
      el('st').textContent='🧹 تفريغ '+pg+'…';
      const c0=cols[0].n;
      const del=await sb.from(pg).delete().or(c0+'.is.null,'+c0+'.not.is.null');
      if(del.error){log('<span class="wr">⚠️ تفريغ '+pg+': '+del.error.message+'</span>');continue;}
      for(let i=0;i<rows.length;i+=500){
        const chunk=rows.slice(i,i+500).map(r=>{const o={};cols.forEach((c,ix)=>o[c.n]=r[ix]);return o;});
        const{error}=await sb.from(pg).insert(chunk);
        if(error){log('<span class="wr">⚠️ '+pg+' @'+i+': '+error.message+'</span>');break;}
        done+=chunk.length;
        el('pb').style.width=(40+done/totalRows*60).toFixed(1)+'%';
        el('st').textContent='⬆️ '+pg+' — '+done.toLocaleString()+' / '+totalRows.toLocaleString();
      }
    }
    el('pb').style.width='100%';
    el('st').textContent='✅ اكتمل التحديث — '+done.toLocaleString()+' سجلاً'+(warn?' ('+warn+' تنبيه — راجع السجل)':'')+'. افتح الأرشيف الآن.';
  }catch(e){
    el('st').textContent='⚠️ خطأ: '+(e.message||e);
  }
  el('go').disabled=false;
}
</script></body></html>
