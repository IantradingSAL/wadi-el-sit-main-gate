<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إدارة الري — بلدية وادي الست</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--blue:#1a6eb5;--blue2:#0f4d82;--blue3:#daeaf8;--green:#2d7a3e;--green2:#1e5429;--green3:#d4edda;
--danger:#e74c3c;--warn:#e67e22;--text:#1a1a2e;--text2:#444;--text3:#888;--border:#e0e6ef;
--bg:#f5f7fa;--bg2:#f0f2f7;--font:'Tahoma',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);direction:rtl;background:var(--bg);min-height:100vh;color:var(--text);font-size:14px;}
.fi{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;outline:none;background:#fff;color:var(--text);direction:rtl;}
.fi:focus{border-color:#1e5429;}
.fg{margin-bottom:12px;}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:var(--font);}
.btn.bp{background:#1e5429;color:#fff;border-color:#1e5429;}
.admin-section{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.admin-header{font-size:15px;font-weight:800;color:var(--blue2);margin-bottom:14px;padding-bottom:10px;border-bottom:1.5px solid var(--border);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:flex-end;justify-content:center;display:none;}
.ov.open{display:flex;}
.ov-panel{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;}
.ov-hdr{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;}
.ov-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;margin-left:auto;}
.ov-title{font-size:16px;font-weight:800;color:var(--blue2);}
.ov-body{padding:16px 20px;}
</style>

<!-- Back to Main Gate (floating) -->
<style>
.back-to-gate{position:fixed;top:12px;left:12px;z-index:99990;display:inline-flex;align-items:center;gap:7px;padding:9px 14px 9px 12px;background:linear-gradient(135deg,#0f4d82,#1a6eb5);color:#fff!important;border-radius:999px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;text-decoration:none!important;box-shadow:0 4px 14px rgba(15,77,130,.35),0 2px 6px rgba(0,0,0,.08);transition:transform .18s ease,box-shadow .18s ease;border:1.5px solid rgba(255,255,255,.2);direction:rtl;cursor:pointer}
.back-to-gate:hover,.back-to-gate:active{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 22px rgba(15,77,130,.45),0 4px 10px rgba(0,0,0,.12)}
.back-to-gate-i{font-size:16px;line-height:1}
.back-to-gate-l{white-space:nowrap}
@media(max-width:540px){.back-to-gate{top:8px;left:8px;padding:7px 11px;font-size:11.5px}.back-to-gate-i{font-size:14px}}
@media print{.back-to-gate{display:none}}
</style>

async function doLogin(){
  var em=document.getElementById('li-em').value.trim();
  var pw=document.getElementById('li-pw').value;
  var err=document.getElementById('li-err');

    var role=meta.role||'';
    if(role!=='water_admin'&&role!=='admin'&&role!=='mayor'){
      err.textContent='⚠️ لا تملك صلاحية الدخول لنظام الري';

// ── CORE CYCLE LOGIC ──────────────────────────────────────────────────────────
const IRR_DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

// Add minutes to a datetime, returns new datetime
function addMinsToDate(dateObj, minutes) {
  return new Date(dateObj.getTime() + minutes * 60000);
}

// Format date to HH:MM
function fmtTime(dateObj) {
  var h = dateObj.getHours(), m = dateObj.getMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

// Format date to Arabic day + date
function fmtDateAr(dateObj) {
  var days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  return days[dateObj.getDay()] + ' ' + dateObj.toLocaleDateString('ar-LB');
}

// Get current cycle info
// Returns: { cycleNum, isDay, cycleStart (Date), cycleEnd (Date) }
function getCurrentCycleInfo() {
  var cfg = getIrrConfig();
  var owners = getIrrOwners().sort(function(a,b){ return (a.order||0)-(b.order||0); });
  var totalMinutes = owners.reduce(function(s,o){ return s + (parseFloat(o.hours)||0)*60; }, 0);
  if (totalMinutes <= 0) totalMinutes = cfg.totalHours * 60;

  var cycleStart = new Date(cfg.cycleStartDate);
  cycleStart.setHours(
    parseInt((cfg.dayStart||'06:00').split(':')[0]),
    parseInt((cfg.dayStart||'06:00').split(':')[1]),
    0, 0
  );

  var now = new Date();
  // Find which cycle we're in
  var elapsed = now - cycleStart; // ms
  if (elapsed < 0) elapsed = 0;
  var cycleMs = totalMinutes * 60000;
  var cycleNum = Math.floor(elapsed / cycleMs); // 0-based
  var thisCycleStart = new Date(cycleStart.getTime() + cycleNum * cycleMs);
  var thisCycleEnd = new Date(thisCycleStart.getTime() + cycleMs);
  var isDay = (cycleNum % 2 === 0); // even=day, odd=night

  return {
    cycleNum: cycleNum + 1, // 1-based for display
    isDay: isDay,
    cycleStart: thisCycleStart,
    cycleEnd: thisCycleEnd,
    totalMinutes: totalMinutes
  };
}

// Get schedule for a specific owner in a specific cycle (0=current, 1=next, -1=prev)
function getOwnerSchedule(owner, cycleOffset) {
  var cfg = getIrrConfig();
  cycleOffset = cycleOffset || 0;
  var owners = getIrrOwners().sort(function(a,b){ return (a.order||0)-(b.order||0); });

  // Cumulative minutes before this owner
  var cumMins = 0;
  for (var i = 0; i < owners.length; i++) {
    if (owners[i].id === owner.id) break;
    cumMins += (parseFloat(owners[i].hours)||0) * 60;
  }

  var cycleInfo = getCurrentCycleInfo();
  var targetCycleNum = cycleInfo.cycleNum - 1 + cycleOffset; // 0-based
  var isDay = (targetCycleNum % 2 === 0);

  // Cycle start datetime
  var totalMs = cycleInfo.totalMinutes * 60000;
  var cycleStart0 = new Date(cycleInfo.cycleStart.getTime() + cycleOffset * totalMs);

  // Owner's start = cycle start + cumulative minutes
  var ownerStart = addMinsToDate(cycleStart0, cumMins);
  var ownerEnd = addMinsToDate(ownerStart, (parseFloat(owner.hours)||0) * 60);

  return {
    isDay: isDay,
    cycleLabel: isDay ? '☀️ نهار' : '🌙 ليل',
    cycleNum: targetCycleNum + 1,
    startDate: ownerStart,
    endDate: ownerEnd,
    startTime: fmtTime(ownerStart),
    endTime: fmtTime(ownerEnd),
    startDateStr: fmtDateAr(ownerStart),
    endDateStr: fmtDateAr(ownerEnd),
    sameDay: ownerStart.toDateString() === ownerEnd.toDateString()
  };
}

function getTotalAllocatedHours() {
  return getIrrOwners().reduce(function(s,o){ return s+(parseFloat(o.hours)||0); },0);
}
function getRemainingHours() {
  return getIrrConfig().totalHours - getTotalAllocatedHours();
}

  var phone=(document.getElementById('ir-phone')||{value:''}).value.trim();
  var hours=parseFloat((document.getElementById('ir-hours')||{value:0}).value)||0;
  var msg=document.getElementById('ir-msg');
  if(!name){if(msg){msg.style.color='var(--danger)';msg.textContent='يرجى الاسم';}return;}
  if(!phone){if(msg){msg.style.color='var(--danger)';msg.textContent='يرجى الهاتف';}return;}
  if(!hours){if(msg){msg.style.color='var(--danger)';msg.textContent='يرجى الساعات';}return;}
  var rem=getRemainingHours()-hours;
  if(rem<-0.01){if(msg){msg.style.color='var(--danger)';msg.textContent='تجاوز! متبقي: '+getRemainingHours().toFixed(1)+'س';}return;}
  var o={id:'ir_'+Date.now().toString(36),name,phone,
    email:(document.getElementById('ir-email')||{value:''}).value.trim(),
    area:(document.getElementById('ir-area')||{value:''}).value.trim(),
    landName:(document.getElementById('ir-land')||{value:''}).value.trim(),
    landRef:(document.getElementById('ir-ref')||{value:''}).value.trim(),
    crop:(document.getElementById('ir-crop')||{value:''}).value.trim(),
    hours,order:parseInt((document.getElementById('ir-order')||{value:1}).value)||1,
    notes:(document.getElementById('ir-notes')||{value:''}).value.trim(),
    createdAt:new Date().toISOString().slice(0,10)};
  var owners=getIrrOwners(); owners.push(o); saveIrrOwners(owners);
  if(msg){msg.style.color='var(--green2)';msg.textContent='✅ تم تسجيل '+name+' · متبقي: '+rem.toFixed(1)+'س';}
  ['ir-name','ir-phone','ir-email','ir-area','ir-land','ir-ref','ir-crop','ir-notes'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  updateWaterBadge();
}

function deleteIrrOwner(id,name){
  if(!confirm('حذف '+name+'؟'))return;
  var updated = getIrrOwners().filter(function(o){return o.id!==id;});
  _irrOwnersCache = updated;
  localStorage.setItem('wadi_irr_owners', JSON.stringify(updated));
  deleteIrrOwnerFromDB(id);
  renderIrrList(); updateWaterBadge(); toast('🗑️ '+name);
}

function saveIrrEdit(id){
  var owners=getIrrOwners(),idx=owners.findIndex(function(o){return o.id===id;});if(idx<0)return;
  owners[idx]=Object.assign(owners[idx],{
    name:(document.getElementById('ire-name')||{value:''}).value.trim(),
    phone:(document.getElementById('ire-phone')||{value:''}).value.trim(),
    email:(document.getElementById('ire-email')||{value:''}).value.trim(),
    area:(document.getElementById('ire-area')||{value:''}).value.trim(),
    landName:(document.getElementById('ire-land')||{value:''}).value.trim(),
    landRef:(document.getElementById('ire-ref')||{value:''}).value.trim(),
    crop:(document.getElementById('ire-crop')||{value:''}).value.trim(),
    hours:parseFloat((document.getElementById('ire-hours')||{value:0}).value)||0,
    order:parseInt((document.getElementById('ire-order')||{value:1}).value)||1,
    notes:(document.getElementById('ire-notes')||{value:''}).value.trim(),
  });
  saveIrrOwners(owners);toast('✅ تم');openWaterSchedule();

// ── BADGE & DB ────────────────────────────────────────────────────────────────
function updateWaterBadge(){
  var n=getIrrOwners().length,b=document.getElementById('water-badge');
  if(b){b.textContent=n||'';b.style.display=n?'inline':'none';}
}
async function loadWaterFromDB(){
  await loadIrrOwners();
  await loadIrrConfig();
  updateWaterBadge();
}


// ── WATER PORTAL (PUBLIC) ─────────────────────────────────────────────────────
function lookupWaterOwner(){
  var phone=(document.getElementById('wp-phone')||{value:''}).value.replace(/[^0-9]/g,'').trim();
  var err=document.getElementById('wp-err'), result=document.getElementById('wp-result');
  if(!phone||phone.length<6){if(err)err.textContent='⚠️ يرجى إدخال رقم هاتفك';return;}
  if(err)err.textContent='';
  if(result)result.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">⏳ جاري البحث…</div>';
  var owners=getIrrOwners();
  var norm=function(p){return(p||'').replace(/[^0-9]/g,'').replace(/^961/,'').replace(/^0/,'');};
  var inp=norm(phone);
  var matches=owners.filter(function(o){return norm(o.phone)===inp;});
  if(!matches.length){
    if(result)result.innerHTML='<div style="background:#fdeaea;border:1px solid #f2bcbc;border-radius:12px;padding:20px;text-align:center;color:var(--danger)">'
      +'<div style="font-size:32px;margin-bottom:8px">🔒</div>'
      +'<div style="font-size:15px;font-weight:700">لم يتم العثور على سجل</div>'
      +'<div style="font-size:13px;opacity:.8;margin-top:6px">تواصل مع البلدية لتسجيل حقك في الري</div>'
      +'</div>';
    return;
  }
  var html='';
  matches.forEach(function(o){
    var sch=getOwnerSchedule(o,0), schNext=getOwnerSchedule(o,1), schPrev=getOwnerSchedule(o,-1);
    html+='<div style="background:#fff;border:1.5px solid #1e5429;border-radius:16px;padding:20px;margin-bottom:14px">'
      // Header
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'
      +'<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1e5429,#2d7a3e);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px">#'+o.order+'</div>'
      +'<div><div style="font-size:17px;font-weight:800;color:#1e5429">'+o.name+'</div>'
      +(o.area?'<div style="font-size:12px;color:var(--text3)">'+o.area+'</div>':'')+'</div>'
      +'</div>'
      // Land info
      +(o.landName?'<div style="background:#f0fdf4;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:13px">🌿 '+o.landName+(o.crop?' ('+o.crop+')':'')+(o.landRef?' · سند: '+o.landRef:'')+'</div>':'')
      // Current cycle
      +'<div style="background:linear-gradient(120deg,'+(sch.isDay?'#e67e22,#f39c12':'#2c3e6b,#3a4fa8')+');color:#fff;border-radius:12px;padding:16px;text-align:center;margin-bottom:8px">'
      +'<div style="font-size:12px;opacity:.85;margin-bottom:4px">هذه الدورة — '+sch.cycleLabel+'</div>'
      +'<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+sch.startDateStr+'</div>'
      +'<div style="font-size:22px;font-weight:800">⏰ '+sch.startTime+' — '+sch.endTime+'</div>'
      +'<div style="font-size:20px;font-weight:800;margin-top:6px">💧 '+o.hours+' ساعة</div>'
      +'</div>'
      // Next cycle
      +'<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">'
      +'<div style="font-size:11px;color:var(--text3);margin-bottom:3px">الدورة القادمة — '+schNext.cycleLabel+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--text3)">'+schNext.startDateStr+'</div>'
      +'<div style="font-size:15px;font-weight:700;direction:ltr">'+schNext.startTime+' — '+schNext.endTime+'</div>'
      +'</div>'
      +(o.notes?'<div style="margin-top:8px;padding:8px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--text3)">📝 '+o.notes+'</div>':'')
      +'</div>';
  });
  if(result)result.innerHTML=html;
}



// ── WATER PORTAL NAVIGATION ───────────────────────────────────────────────────
async function showWaterPortal() {
  try {
    // Show portal screen
    ['LANDING','WELCOME-CARDS','LS','CP','APP'].forEach(function(id){
      var e=document.getElementById(id); if(e) e.style.display='none';
    });
    var wp=document.getElementById('WATER-PORTAL');
    if(wp) wp.style.cssText='display:flex;flex-direction:column;min-height:100vh;background:var(--bg,#f5f7fa)';
    // Clear inputs
    var p=document.getElementById('wp-phone'), r=document.getElementById('wp-result'), er=document.getElementById('wp-err');
    if(p) p.value=''; if(er) er.textContent='';
    // Show loading
    if(r) r.innerHTML='<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">⏳ جاري تحميل البيانات…</div>';
    // Load water data from Supabase irr_owners table (public — no login needed)
    try {
      if(typeof sb !== 'undefined') {
        await loadIrrOwners();
        await loadIrrConfig();
      }
    } catch(ex){ console.log('Water portal load:', ex.message); }
    // Clear result after load
    if(r) r.innerHTML='';
    setTimeout(function(){ var pp=document.getElementById('wp-phone'); if(pp) pp.focus(); },100);
  } catch(e){ console.error('showWaterPortal:',e.message); }
}



// Override to show in page content
var _baseOpenWater = openWaterSchedule;
openWaterSchedule = async function(){
  try{ await loadIrrOwners(); }catch(e){}
  try{ await loadIrrConfig(); }catch(e){}
  var cfg=getIrrConfig();
  var owners=getIrrOwners().sort(function(a,b){return (a.order||0)-(b.order||0);});
  var totalAlloc=getTotalAllocatedHours();
  var remaining=getRemainingHours();
  var ci=getCycleInfo?getCycleInfo():getCurrentCycleInfo();
  document.getElementById('MT').textContent='💧 نظام الري — '+owners.length+' مشترك';
  document.getElementById('OV').classList.add('open');
  document.getElementById('OV').style.display='flex';
  // Re-use the inner content generation
  if(typeof buildWaterContent==='function'){
    document.getElementById('MB').innerHTML = buildWaterContent(cfg,owners,totalAlloc,remaining,ci);
  }
  renderIrrList();
};

// Try alias
var getCurrentCycleInfo = typeof getCurrentCycleInfo!=='undefined' ? getCurrentCycleInfo : function(){return {cycleNum:1,isDay:true,cycleStart:new Date(),cycleEnd:new Date(),totalMins:160*60}};
