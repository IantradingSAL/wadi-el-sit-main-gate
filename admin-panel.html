<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel | Wadi El Sit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[hidden]{display:none!important}
:root{--primary:#0f4d82;--primary-light:#1a6eb5;--primary-dark:#0a3a64;--bg:#f5f7fa;--surface:#fff;--text:#1a202c;--text-muted:#718096;--border:#e2e8f0;--success:#38a169;--warning:#d69e2e;--danger:#e53e3e;--info:#3182ce;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 4px 12px rgba(0,0,0,.08);--shadow-lg:0 10px 30px rgba(0,0,0,.15);--radius:12px}
body{font-family:'Tajawal','Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
body[dir="ltr"]{font-family:'Inter','Segoe UI',sans-serif}
.app-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;padding:14px 24px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.app-header .brand{display:flex;align-items:center;gap:12px}
.app-header .logo{width:44px;height:44px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.app-header h1{font-size:17px;font-weight:800}
.app-header .subtitle{font-size:11px;opacity:.85;margin-top:1px}
.app-header .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lang-switch{display:flex;background:rgba(255,255,255,.15);border-radius:8px;padding:3px}
.lang-btn{background:transparent;color:#fff;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s}
.lang-btn.active{background:#fff;color:var(--primary)}
.hdr-link{background:rgba(255,255,255,.15);color:#fff;text-decoration:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;transition:all .2s}
.hdr-link:hover{background:rgba(255,255,255,.25)}
.user-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);padding:7px 14px;border-radius:24px;font-size:13px;font-weight:500}
.super-badge{background:#ffd700;color:#1a4480;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.container{max-width:1200px;margin:0 auto;padding:24px}
.welcome{background:var(--surface);border-radius:var(--radius);padding:18px 24px;margin-bottom:20px;box-shadow:var(--shadow-sm);border-inline-start:4px solid var(--primary)}
.welcome h2{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:4px}
.welcome p{color:var(--text-muted);font-size:13px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:all .2s;cursor:pointer}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.stat-card .stat-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-bottom:6px}
.stat-card .stat-value{font-size:30px;font-weight:800;line-height:1}
.stat-card .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.stat-card.total .stat-icon{background:#ebf4ff}.stat-card.total .stat-value{color:var(--primary)}
.stat-card.pending .stat-icon{background:#fef5e7}.stat-card.pending .stat-value{color:var(--warning)}
.stat-card.approved .stat-icon{background:#d4f4dd}.stat-card.approved .stat-value{color:var(--success)}
.stat-card.suspended .stat-icon{background:#fde8e8}.stat-card.suspended .stat-value{color:var(--danger)}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.toolbar-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.section-title{font-size:18px;font-weight:700}
.search-box input{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;width:240px;transition:all .2s}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(15,77,130,.1)}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.pill{padding:7px 14px;border-radius:24px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;color:var(--text-muted);transition:all .2s;font-family:inherit}
.pill:hover{background:#f0f4f8}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(15,77,130,.25)}
.btn-refresh{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
.btn-refresh:hover{border-color:var(--primary);color:var(--primary)}
.sellers-grid{display:grid;gap:10px}
.seller-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:all .2s;cursor:pointer}
.seller-card:hover{box-shadow:var(--shadow);border-color:var(--primary-light);transform:translateY(-1px)}
.seller-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.seller-info{flex:1;min-width:200px}
.seller-name{font-size:16px;font-weight:700;margin-bottom:3px}
.seller-meta{color:var(--text-muted);font-size:12px;display:flex;gap:12px;flex-wrap:wrap}
.seller-numbers{margin-top:8px;display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-muted)}
.seller-numbers .num{font-weight:700;color:var(--text)}
.seller-status{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
.seller-status.pending{background:#fef5e7;color:#975a16}
.seller-status.approved{background:#d4f4dd;color:#1f7a3a}
.seller-status.suspended{background:#fde8e8;color:#9b2c2c}
.view-hint{font-size:11px;color:var(--primary);margin-top:8px;font-weight:600}
.empty-state{background:var(--surface);border-radius:var(--radius);padding:48px 20px;text-align:center;color:var(--text-muted);border:1px dashed var(--border);font-size:14px}
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-card{background:var(--surface);border-radius:20px;width:100%;max-width:400px;overflow:hidden;box-shadow:var(--shadow-lg)}
.login-header{padding:32px 28px 18px;text-align:center}
.logo-large{width:64px;height:64px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:#fff;margin-bottom:14px;box-shadow:0 6px 16px rgba(15,77,130,.3)}
.login-header h2{font-size:22px;font-weight:800;margin-bottom:4px}
.login-header p{font-size:13px;color:var(--text-muted)}
.login-body{padding:0 28px 28px}
.lang-switch-login{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.lang-switch-login button{background:#f0f4f8;color:var(--text-muted);border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s}
.lang-switch-login button.active{background:var(--primary);color:#fff}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;transition:all .2s}
.form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(15,77,130,.1)}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:6px}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(15,77,130,.3)}
.btn-login:disabled{background:#cbd5e0;cursor:not-allowed;transform:none;box-shadow:none}
.error-msg{background:#fde8e8;color:#9b2c2c;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px}
.toast-container{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);padding:12px 20px;border-radius:10px;box-shadow:var(--shadow-lg);font-size:14px;font-weight:500;min-width:280px;max-width:400px;animation:slideDown .3s ease-out;border-inline-start:4px solid var(--primary)}
.toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}.toast.warning{border-color:var(--warning)}
@keyframes slideDown{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;z-index:9998;padding:20px;overflow-y:auto}
.detail-modal{background:var(--surface);border-radius:16px;width:100%;max-width:800px;overflow:hidden;box-shadow:var(--shadow-lg);margin:auto}
.detail-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));color:#fff;padding:24px 28px;position:relative}
.detail-header .close-btn{position:absolute;top:16px;inset-inline-end:16px;background:rgba(255,255,255,.2);color:#fff;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}
.detail-header h2{font-size:22px;font-weight:800;margin-bottom:6px}
.detail-header .meta{font-size:13px;opacity:.9;display:flex;gap:14px;flex-wrap:wrap}
.detail-tabs{display:flex;background:#f0f4f8;border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{background:transparent;border:none;padding:14px 24px;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;font-family:inherit;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--surface)}
.tab-content{padding:24px 28px;max-height:60vh;overflow-y:auto}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.info-item{background:#f8fafc;padding:12px 14px;border-radius:10px}
.info-item .lbl{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:4px}
.info-item .val{font-size:14px;font-weight:700;color:var(--text);word-wrap:break-word}
.stat-mini{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f8fafc;border-radius:8px;margin-bottom:6px}
.stat-mini .lbl{font-size:13px;color:var(--text-muted)}
.stat-mini .val{font-size:14px;font-weight:700}
.product-item,.order-item{background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.product-item .name,.order-item .name{font-weight:700;font-size:14px;margin-bottom:4px}
.product-item .meta,.order-item .meta{font-size:12px;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.status-chip{font-size:10px;padding:3px 8px;border-radius:8px;font-weight:600;display:inline-block}
.status-chip.pending{background:#fef5e7;color:#975a16}
.status-chip.confirmed{background:#bee3f8;color:#2c5282}
.status-chip.out_for_delivery{background:#fed7aa;color:#9c4221}
.status-chip.delivered{background:#d4f4dd;color:#1f7a3a}
.status-chip.cancelled{background:#fde8e8;color:#9b2c2c}
.status-chip.active{background:#d4f4dd;color:#1f7a3a}
.status-chip.paused{background:#fef5e7;color:#975a16}
.detail-actions{padding:18px 28px;background:#f8fafc;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.detail-actions button{padding:9px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.detail-actions button:hover{transform:translateY(-1px)}
.btn-approve{background:var(--success);color:#fff}
.btn-suspend{background:var(--warning);color:#fff}
.btn-pwd{background:var(--info);color:#fff}
.btn-delete{background:var(--danger);color:#fff}
</style>
</head>
<body>

<div id="login-screen" class="login-overlay" hidden>
<div class="login-card">
<div class="login-header">
<div class="logo-large">🏛️</div>
<h2 data-i18n="adminPanel">Admin Panel</h2>
<p data-i18n="brand">Wadi El Sit · Coop</p>
</div>
<div class="login-body">
<div class="lang-switch-login">
<button data-lang="ar">🇱🇧 عربي</button>
<button data-lang="en">🇬🇧 English</button>
<button data-lang="fr">🇫🇷 Français</button>
</div>
<div id="login-error" class="error-msg" hidden></div>
<div class="form-group"><label data-i18n="username">Username</label><input type="text" id="username" autocomplete="username"></div>
<div class="form-group"><label data-i18n="password">Password</label><input type="password" id="password" autocomplete="current-password" placeholder="••••••••"></div>
<button class="btn-login" id="login-btn" onclick="doLogin()" data-i18n="login">Login</button>
</div>
</div>
</div>

<div id="app" hidden>
<header class="app-header">
<div class="brand">
<div class="logo">🏛️</div>
<div><h1 data-i18n="adminPanel">Admin Panel</h1><div class="subtitle" data-i18n="brand">Wadi El Sit · Coop</div></div>
</div>
<div class="toolbar">
<div class="lang-switch">
<button class="lang-btn" data-lang="ar">AR</button>
<button class="lang-btn" data-lang="en">EN</button>
<button class="lang-btn" data-lang="fr">FR</button>
</div>
<a href="coop.html" class="hdr-link" target="_blank" data-i18n="coopPage">🛒 Coop</a>
<div class="user-badge"><span>👤 <span id="user-name">—</span></span><span class="super-badge" id="super-badge" hidden>⭐ Super</span></div>
<button class="btn-logout" onclick="doLogout()" data-i18n="logout">Logout</button>
</div>
</header>

<div class="container">
<div class="welcome">
<h2><span data-i18n="welcome">Welcome</span>, <span id="welcome-name">—</span> 👋</h2>
<p><span data-i18n="sellerMgmt">Seller management</span> · <span id="current-date"></span></p>
</div>

<div class="stats-grid">
<div class="stat-card total" data-filter="all"><div class="stat-icon">📊</div><div class="stat-label" data-i18n="total">Total</div><div class="stat-value" id="stat-total">0</div></div>
<div class="stat-card pending" data-filter="pending"><div class="stat-icon">⏳</div><div class="stat-label" data-i18n="pending">Pending</div><div class="stat-value" id="stat-pending">0</div></div>
<div class="stat-card approved" data-filter="approved"><div class="stat-icon">✅</div><div class="stat-label" data-i18n="approved">Approved</div><div class="stat-value" id="stat-approved">0</div></div>
<div class="stat-card suspended" data-filter="suspended"><div class="stat-icon">⛔</div><div class="stat-label" data-i18n="suspended">Suspended</div><div class="stat-value" id="stat-suspended">0</div></div>
</div>

<div class="toolbar-row">
<div class="section-title" data-i18n="sellersList">Sellers List</div>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
<div class="search-box"><input type="text" id="search-box" placeholder="🔎"></div>
<button class="btn-refresh" onclick="loadSellers()" data-i18n="refresh">🔄 Refresh</button>
</div>
</div>

<div class="filter-pills" id="filter-pills">
<button class="pill active" data-filter="all" data-i18n="all">All</button>
<button class="pill" data-filter="pending" data-i18n="pending">⏳ Pending</button>
<button class="pill" data-filter="approved" data-i18n="approved">✅ Approved</button>
<button class="pill" data-filter="suspended" data-i18n="suspended">⛔ Suspended</button>
</div>

<div class="sellers-grid" id="sellers-list"></div>
</div>
</div>

<div id="detail-modal" class="detail-overlay" hidden onclick="if(event.target===this)closeDetail()">
<div class="detail-modal" onclick="event.stopPropagation()">
<div class="detail-header">
<button class="close-btn" onclick="closeDetail()">✕</button>
<h2 id="dm-name">—</h2>
<div class="meta"><span id="dm-username"></span><span id="dm-status-chip"></span></div>
</div>
<div class="detail-tabs">
<button class="tab-btn active" data-tab="overview" data-i18n="overview">Overview</button>
<button class="tab-btn" data-tab="products" data-i18n="products">Products</button>
<button class="tab-btn" data-tab="orders" data-i18n="orders">Orders</button>
</div>
<div class="tab-content" id="dm-content"></div>
<div class="detail-actions" id="dm-actions"></div>
</div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<script>
const I18N={ar:{adminPanel:"لوحة الإدارة",brand:"بلدية وادي الست · التعاونية",coopPage:"🛒 التعاونية",logout:"خروج",login:"دخول",username:"اسم المستخدم",password:"كلمة المرور",welcome:"أهلاً",sellerMgmt:"إدارة البائعين",total:"الإجمالي",pending:"قيد الانتظار",approved:"معتمدون",suspended:"موقوفون",all:"الكل",refresh:"تحديث",sellersList:"قائمة البائعين",noSellers:"لا يوجد بائعين",clickToView:"انقر للتفاصيل",overview:"نظرة عامة",products:"المنتجات",orders:"الطلبات",approve:"اعتماد",suspend:"إيقاف",reactivate:"إعادة تفعيل",changePwd:"تغيير كلمة المرور",delete:"حذف",phone:"الهاتف",whatsapp:"واتساب",email:"البريد",area:"المنطقة",joined:"تاريخ الانضمام",bio:"نبذة",totalRevenue:"إجمالي المبيعات",totalOrders:"إجمالي الطلبات",avgOrder:"متوسط الطلب",rating:"التقييم",balance:"الرصيد",lastOrder:"آخر طلب",confirmed:"مؤكد",outForDelivery:"قيد التوصيل",delivered:"تم التسليم",cancelled:"ملغي",active:"نشط",paused:"متوقف",noProducts:"لا يوجد منتجات",noOrders:"لا يوجد طلبات",confirmApprove:"تأكيد الاعتماد؟",confirmSuspend:"سبب الإيقاف؟",confirmDelete:"⚠️ حذف نهائي؟",confirmLogout:"تسجيل الخروج؟",newPwd:"كلمة المرور الجديدة:",confirmPwd:"تأكيد التغيير؟",pwdTooShort:"قصيرة جداً",invalidCreds:"بيانات غير صحيحة",enterCreds:"الرجاء إدخال البيانات",sessionExpired:"انتهت الجلسة",superRequired:"تتطلب Super Admin",operationDone:"تم بنجاح",operationFailed:"فشلت",welcomeBack:"مرحباً",items:"عناصر",currency:"ل.ل.",usdCurrency:"$"},en:{adminPanel:"Admin Panel",brand:"Wadi El Sit · Coop",coopPage:"🛒 Coop",logout:"Logout",login:"Login",username:"Username",password:"Password",welcome:"Welcome",sellerMgmt:"Manage sellers",total:"Total",pending:"Pending",approved:"Approved",suspended:"Suspended",all:"All",refresh:"Refresh",sellersList:"Sellers List",noSellers:"No sellers",clickToView:"Click for details",overview:"Overview",products:"Products",orders:"Orders",approve:"Approve",suspend:"Suspend",reactivate:"Reactivate",changePwd:"Change Password",delete:"Delete",phone:"Phone",whatsapp:"WhatsApp",email:"Email",area:"Area",joined:"Joined",bio:"Bio",totalRevenue:"Total Revenue",totalOrders:"Total Orders",avgOrder:"Avg Order",rating:"Rating",balance:"Balance",lastOrder:"Last Order",confirmed:"Confirmed",outForDelivery:"Out for Delivery",delivered:"Delivered",cancelled:"Cancelled",active:"Active",paused:"Paused",noProducts:"No products",noOrders:"No orders",confirmApprove:"Confirm approval?",confirmSuspend:"Suspension reason?",confirmDelete:"⚠️ Delete permanently?",confirmLogout:"Logout?",newPwd:"New password:",confirmPwd:"Confirm change?",pwdTooShort:"Too short",invalidCreds:"Invalid credentials",enterCreds:"Enter credentials",sessionExpired:"Session expired",superRequired:"Super Admin required",operationDone:"Done",operationFailed:"Failed",welcomeBack:"Welcome",items:"items",currency:"LBP",usdCurrency:"$"},fr:{adminPanel:"Administration",brand:"Wadi El Sit · Coop",coopPage:"🛒 Coop",logout:"Déconnexion",login:"Connexion",username:"Utilisateur",password:"Mot de passe",welcome:"Bienvenue",sellerMgmt:"Gérer les vendeurs",total:"Total",pending:"En attente",approved:"Approuvés",suspended:"Suspendus",all:"Tous",refresh:"Actualiser",sellersList:"Liste des vendeurs",noSellers:"Aucun vendeur",clickToView:"Cliquer pour détails",overview:"Aperçu",products:"Produits",orders:"Commandes",approve:"Approuver",suspend:"Suspendre",reactivate:"Réactiver",changePwd:"Changer mot de passe",delete:"Supprimer",phone:"Téléphone",whatsapp:"WhatsApp",email:"Email",area:"Région",joined:"Adhésion",bio:"Bio",totalRevenue:"Revenu total",totalOrders:"Total commandes",avgOrder:"Moy. commande",rating:"Note",balance:"Solde",lastOrder:"Dernière commande",confirmed:"Confirmée",outForDelivery:"En livraison",delivered:"Livrée",cancelled:"Annulée",active:"Actif",paused:"En pause",noProducts:"Aucun produit",noOrders:"Aucune commande",confirmApprove:"Confirmer?",confirmSuspend:"Raison?",confirmDelete:"⚠️ Supprimer?",confirmLogout:"Déconnexion?",newPwd:"Nouveau mot de passe:",confirmPwd:"Confirmer?",pwdTooShort:"Trop court",invalidCreds:"Identifiants invalides",enterCreds:"Entrez les identifiants",sessionExpired:"Session expirée",superRequired:"Super Admin requis",operationDone:"Effectué",operationFailed:"Échec",welcomeBack:"Bienvenue",items:"articles",currency:"LBP",usdCurrency:"$"}};
let lang=localStorage.getItem("admin_lang")||"ar";
function t(k){return(I18N[lang]&&I18N[lang][k])||k}
function applyLang(){document.documentElement.lang=lang;document.documentElement.dir=lang==="ar"?"rtl":"ltr";document.body.dir=lang==="ar"?"rtl":"ltr";document.querySelectorAll("[data-i18n]").forEach(e=>{e.textContent=t(e.getAttribute("data-i18n"))});const p=document.getElementById("search-box");if(p)p.placeholder="🔍 "+({ar:"بحث...",en:"Search...",fr:"Rechercher..."}[lang]);document.querySelectorAll(".lang-btn,[data-lang]").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang));updateDate();if(currentSellerDetails)showSellerDetails(currentSellerDetails);if(sellers.length)renderSellers()}
function setLang(l){lang=l;localStorage.setItem("admin_lang",l);applyLang()}
function updateDate(){const e=document.getElementById("current-date");if(!e)return;const l={ar:"ar-LB",en:"en-US",fr:"fr-FR"}[lang];e.textContent=new Date().toLocaleDateString(l,{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
function fmtDate(i){if(!i)return"—";return new Date(i).toLocaleString({ar:"ar-LB",en:"en-US",fr:"fr-FR"}[lang],{dateStyle:"short",timeStyle:"short"})}
function fmtMoney(n,c){const v=Number(n||0).toLocaleString({ar:"ar-LB",en:"en-US",fr:"fr-FR"}[lang]);return v+" "+(c==="USD"?t("usdCurrency"):t("currency"))}
const SB_URL="https://onjbwhkmmtqnymhjnplw.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uamJ3aGttbXRxbnltaGpucGx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDY4MjUsImV4cCI6MjA5MDM4MjgyNX0.lhlsRdOqVHZuOXCJa0lCNuZkYJHhf1AZ_zOwqHHAeG4";
let client,sellers=[],filter="all",searchQ="",currentSellerDetails=null,activeTab="overview";
async function initSupabase(){if(typeof supabase==="undefined")await new Promise((r,j)=>{const s=document.createElement("script");s.src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js";s.onload=r;s.onerror=j;document.head.appendChild(s)});client=supabase.createClient(SB_URL,SB_KEY)}
function toast(m,tp="info"){const e=document.createElement("div");e.className="toast "+tp;e.textContent=(tp==="success"?"✅ ":tp==="error"?"❌ ":tp==="warning"?"⚠️ ":"ℹ️ ")+m;document.getElementById("toasts").appendChild(e);setTimeout(()=>{e.style.opacity="0";setTimeout(()=>e.remove(),300)},3000)}
async function sha256(x){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(x));return Array.from(new Uint8Array(b)).map(y=>y.toString(16).padStart(2,"0")).join("")}
const tokenGet=()=>localStorage.getItem("admin_token");
const tokenSet=(t,i)=>{localStorage.setItem("admin_token",t);localStorage.setItem("admin_info",JSON.stringify(i))};
const tokenClear=()=>{localStorage.removeItem("admin_token");localStorage.removeItem("admin_info")};
const getInfo=()=>{try{return JSON.parse(localStorage.getItem("admin_info")||"null")}catch{return null}};
function showLogin(){document.getElementById("login-screen").hidden=false;document.getElementById("app").hidden=true;setTimeout(()=>document.getElementById("username")?.focus(),100)}
function showApp(){document.getElementById("login-screen").hidden=true;document.getElementById("app").hidden=false;const i=getInfo();if(i){document.getElementById("user-name").textContent=i.display_name||i.username;document.getElementById("welcome-name").textContent=i.display_name||i.username;document.getElementById("super-badge").hidden=!i.is_super}updateDate()}
function handleError(e){const m=e?.message||String(e);if(m.includes("invalid_or_expired_token")||m.includes("admin_token_required")||m.includes("admin_account_disabled")){tokenClear();toast(t("sessionExpired"),"warning");showLogin();return true}if(m.includes("super_admin_required")){toast(t("superRequired"),"error");return true}return false}
async function doLogin(){const u=document.getElementById("username").value.trim();const p=document.getElementById("password").value;const e=document.getElementById("login-error");const b=document.getElementById("login-btn");e.hidden=true;if(!u||p.length<4){e.textContent=t("enterCreds");e.hidden=false;return}b.disabled=true;b.innerHTML='<span class="spinner"></span>';try{const h=await sha256(p);const{data,error}=await client.rpc("coop_admin_login",{p_username:u,p_password_hash:h,p_user_agent:navigator.userAgent.slice(0,200)});if(error)throw error;if(!data?.token)throw new Error("No token");tokenSet(data.token,data.admin);document.getElementById("password").value="";showApp();await loadSellers();toast(t("welcomeBack")+" "+(data.admin.display_name||data.admin.username),"success")}catch(r){const m=r?.message||String(r);e.textContent=m.includes("invalid_credentials")?t("invalidCreds"):"Error: "+m;e.hidden=false}finally{b.disabled=false;b.textContent=t("login")}}
async function doLogout(){if(!confirm(t("confirmLogout")))return;const k=tokenGet();if(k){try{await client.rpc("coop_admin_logout",{p_token:k})}catch{}}tokenClear();showLogin()}
async function bootApp(){const k=tokenGet();if(!k)return showLogin();try{const{data,error}=await client.rpc("coop_admin_whoami",{p_token:k});if(error||!data?.admin)throw error||new Error("Invalid");tokenSet(k,data.admin);showApp();await loadSellers()}catch{tokenClear();showLogin()}}
async function loadSellers(){const k=tokenGet();if(!k)return showLogin();try{const{data:st,error:e1}=await client.rpc("coop_admin_seller_stats",{p_admin_token:k});if(e1)throw e1;if(st){document.getElementById("stat-total").textContent=st.total||0;document.getElementById("stat-pending").textContent=st.pending||0;document.getElementById("stat-approved").textContent=st.approved||0;document.getElementById("stat-suspended").textContent=st.suspended||0}const{data,error:e2}=await client.rpc("coop_admin_list_sellers",{p_admin_token:k});if(e2)throw e2;sellers=data||[];renderSellers()}catch(r){if(!handleError(r))toast(t("operationFailed")+": "+(r?.message||r),"error")}}
function renderSellers(){const l=document.getElementById("sellers-list");l.innerHTML="";let f=filter==="all"?sellers:sellers.filter(s=>s.status===filter);if(searchQ){const q=searchQ.toLowerCase();f=f.filter(s=>(s.display_name||"").toLowerCase().includes(q)||s.username.toLowerCase().includes(q)||(s.phone||"").includes(q))}if(f.length===0){l.innerHTML='<div class="empty-state">📦 '+t("noSellers")+"</div>";return}f.forEach(s=>{const c=document.createElement("div");c.className="seller-card";c.onclick=()=>openSellerDetails(s.id);c.innerHTML='<div class="seller-row"><div class="seller-info"><div class="seller-name">'+(s.display_name||s.username)+'</div><div class="seller-meta"><span>👤 '+s.username+"</span><span>📞 "+(s.phone||"—")+"</span>"+(s.area?'<span>📍 '+s.area+"</span>":"")+'</div><div class="seller-numbers"><span>📦 <span class="num">'+s.product_count+"</span> "+t("products")+'</span><span>📋 <span class="num">'+s.pending_orders+"</span> "+t("pending")+'</span><span>💰 <span class="num">'+fmtMoney(s.balance,"LBP")+'</span></span></div><div class="view-hint">👉 '+t("clickToView")+'</div></div><span class="seller-status '+s.status+'">'+localStatusLabel(s.status)+"</span></div>";l.appendChild(c)})}
function localStatusLabel(s){return{pending:"⏳ "+t("pending"),approved:"✅ "+t("approved"),suspended:"⛔ "+t("suspended")}[s]||s}
async function openSellerDetails(id){const k=tokenGet();if(!k)return showLogin();try{const{data,error}=await client.rpc("coop_admin_get_seller_details",{p_admin_token:k,p_seller_id:id});if(error)throw error;currentSellerDetails=data;showSellerDetails(data);document.getElementById("detail-modal").hidden=false}catch(r){if(!handleError(r))toast(t("operationFailed"),"error")}}
function closeDetail(){document.getElementById("detail-modal").hidden=true;currentSellerDetails=null}
function showSellerDetails(d){const p=d.profile;document.getElementById("dm-name").textContent=p.display_name||p.username;document.getElementById("dm-username").textContent="👤 "+p.username+" · 📞 "+(p.phone||"—");const c=document.getElementById("dm-status-chip");c.className="status-chip "+p.status;c.textContent=localStatusLabel(p.status);renderTab(activeTab,d);document.querySelectorAll(".tab-btn").forEach(b=>{b.classList.toggle("active",b.dataset.tab===activeTab);b.onclick=()=>{activeTab=b.dataset.tab;document.querySelectorAll(".tab-btn").forEach(x=>x.classList.toggle("active",x.dataset.tab===activeTab));renderTab(activeTab,d)}});const i=getInfo();const su=i?.is_super===true;const a=document.getElementById("dm-actions");a.innerHTML="";const mk=(c,x,f)=>{const b=document.createElement("button");b.className=c;b.textContent=x;b.onclick=f;return b};if(p.status==="pending")a.appendChild(mk("btn-approve","✅ "+t("approve"),()=>doApprove(p.id,p.display_name||p.username)));if(p.status==="approved")a.appendChild(mk("btn-suspend","⛔ "+t("suspend"),()=>doSuspend(p.id,p.display_name||p.username)));if(p.status==="suspended")a.appendChild(mk("btn-approve","✅ "+t("reactivate"),()=>doApprove(p.id,p.display_name||p.username)));if(su){a.appendChild(mk("btn-pwd","🔑 "+t("changePwd"),()=>doChangePwd(p.id,p.username)));a.appendChild(mk("btn-delete","🗑️ "+t("delete"),()=>doDelete(p.id,p.display_name||p.username)))}}
function renderTab(n,d){const c=document.getElementById("dm-content");const p=d.profile,s=d.stats;if(n==="overview"){c.innerHTML='<div class="info-grid"><div class="info-item"><div class="lbl">'+t("phone")+'</div><div class="val">'+(p.phone||"—")+'</div></div><div class="info-item"><div class="lbl">'+t("whatsapp")+'</div><div class="val">'+(p.whatsapp||"—")+'</div></div><div class="info-item"><div class="lbl">'+t("email")+'</div><div class="val">'+(p.email||"—")+'</div></div><div class="info-item"><div class="lbl">'+t("area")+'</div><div class="val">'+(p.area||"—")+'</div></div><div class="info-item"><div class="lbl">'+t("joined")+'</div><div class="val">'+fmtDate(p.created_at)+'</div></div><div class="info-item"><div class="lbl">'+t("rating")+'</div><div class="val">⭐ '+(p.rating||0)+"</div></div></div>"+(p.bio?'<div class="info-item" style="margin-bottom:14px"><div class="lbl">'+t("bio")+'</div><div class="val">'+p.bio+"</div></div>":"")+'<h3 style="margin:18px 0 10px;font-size:14px;color:#4a5568">📊 '+t("totalOrders")+'</h3><div class="stat-mini"><span class="lbl">'+t("totalOrders")+'</span><span class="val">'+s.total_orders+'</span></div><div class="stat-mini"><span class="lbl">⏳ '+t("pending")+'</span><span class="val" style="color:var(--warning)">'+s.pending+'</span></div><div class="stat-mini"><span class="lbl">✅ '+t("delivered")+'</span><span class="val" style="color:var(--success)">'+s.delivered+'</span></div><div class="stat-mini"><span class="lbl">❌ '+t("cancelled")+'</span><span class="val" style="color:var(--danger)">'+s.cancelled+'</span></div><div class="stat-mini"><span class="lbl">💰 '+t("totalRevenue")+'</span><span class="val">'+fmtMoney(s.total_revenue,"LBP")+'</span></div><div class="stat-mini"><span class="lbl">📊 '+t("avgOrder")+'</span><span class="val">'+fmtMoney(s.avg_order_value,"LBP")+'</span></div><div class="stat-mini"><span class="lbl">💼 '+t("balance")+'</span><span class="val">'+fmtMoney(p.balance,"LBP")+'</span></div><div class="stat-mini"><span class="lbl">🕐 '+t("lastOrder")+'</span><span class="val">'+fmtDate(s.last_order_at)+"</span></div>"}else if(n==="products"){if(!d.products||d.products.length===0){c.innerHTML='<div class="empty-state">📦 '+t("noProducts")+"</div>";return}c.innerHTML=d.products.map(pr=>'<div class="product-item"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><div style="flex:1"><div class="name">'+pr.name+"</div>"+(pr.description?'<div style="font-size:12px;color:#718096;margin:4px 0">'+pr.description+"</div>":"")+'<div class="meta"><span>💰 '+fmtMoney(pr.price,pr.currency||"LBP")+"</span><span>📦 "+pr.stock+" "+(pr.unit||t("items"))+"</span>"+(pr.category_id?"<span>🏷️ "+pr.category_id+"</span>":"")+'</div></div><span class="status-chip '+pr.status+'">'+(pr.status==="active"?t("active"):pr.status==="paused"?t("paused"):pr.status)+"</span></div></div>").join("")}else if(n==="orders"){if(!d.orders||d.orders.length===0){c.innerHTML='<div class="empty-state">📋 '+t("noOrders")+"</div>";return}c.innerHTML=d.orders.map(o=>'<div class="order-item"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px"><div style="flex:1"><div class="name">👤 '+(o.buyer_name||"—")+'</div><div class="meta"><span>📞 '+(o.buyer_phone||"—")+"</span>"+(o.address?"<span>📍 "+o.address.slice(0,40)+(o.address.length>40?"…":"")+"</span>":"")+'</div></div><span class="status-chip '+o.status+'">'+localOrderStatus(o.status)+'</span></div><div class="meta" style="border-top:1px solid #e2e8f0;margin-top:8px;padding-top:8px"><span>💰 '+fmtMoney(o.total,o.currency)+"</span>"+(o.delivery_method?"<span>🚚 "+o.delivery_method+"</span>":"")+"<span>📅 "+fmtDate(o.created_at)+"</span></div>"+(o.notes?'<div style="font-size:11px;color:#718096;margin-top:6px;padding:6px 8px;background:#fff;border-radius:6px">📝 '+o.notes+"</div>":"")+"</div>").join("")}}
function localOrderStatus(s){return{pending:"⏳ "+t("pending"),confirmed:"✓ "+t("confirmed"),out_for_delivery:"🚚 "+t("outForDelivery"),delivered:"✅ "+t("delivered"),cancelled:"❌ "+t("cancelled")}[s]||s}
async function doApprove(id,n){if(!confirm(t("confirmApprove")+'\n"'+n+'"'))return;try{const{error}=await client.rpc("coop_admin_approve_seller",{p_admin_token:tokenGet(),p_seller_id:id});if(error)throw error;toast(t("operationDone"),"success");closeDetail();loadSellers()}catch(e){if(!handleError(e))toast(t("operationFailed")+": "+(e?.message||e),"error")}}
async function doSuspend(id,n){const r=prompt(t("confirmSuspend")+'\n"'+n+'"');if(r===null)return;try{const{error}=await client.rpc("coop_admin_suspend_seller",{p_admin_token:tokenGet(),p_seller_id:id,p_reason:r||null});if(error)throw error;toast(t("operationDone"),"success");closeDetail();loadSellers()}catch(e){if(!handleError(e))toast(t("operationFailed")+": "+(e?.message||e),"error")}}
async function doChangePwd(id,u){const n=prompt(t("newPwd")+'\n"'+u+'"');if(!n)return;if(n.length<4)return toast(t("pwdTooShort"),"error");if(!confirm(t("confirmPwd")))return;try{const h=await sha256(n);const{error}=await client.rpc("coop_admin_change_seller_password",{p_admin_token:tokenGet(),p_seller_id:id,p_new_password_hash:h});if(error)throw error;toast(t("operationDone"),"success")}catch(e){if(!handleError(e))toast(t("operationFailed")+": "+(e?.message||e),"error")}}
async function doDelete(id,n){if(!confirm(t("confirmDelete")+'\n"'+n+'"'))return;let f=false;for(let i=0;i<2;i++){try{const{error}=await client.rpc("coop_admin_delete_seller",{p_admin_token:tokenGet(),p_seller_id:id,p_force:f});if(error)throw error;toast(t("operationDone"),"success");closeDetail();loadSellers();return}catch(e){const m=e?.message||String(e);if(m.includes("seller_has_orders")&&i===0){if(confirm({ar:"عنده طلبات. حذف رغماً؟",en:"Has orders. Delete anyway?",fr:"A des commandes. Supprimer?"}[lang])){f=true;continue}return}if(!handleError(e))toast(t("operationFailed")+": "+m,"error");return}}}
document.addEventListener("click",e=>{if(e.target.matches(".lang-btn")||e.target.matches(".lang-switch-login button")){setLang(e.target.dataset.lang);return}if(e.target.matches("#filter-pills .pill")){document.querySelectorAll("#filter-pills .pill").forEach(p=>p.classList.remove("active"));e.target.classList.add("active");filter=e.target.dataset.filter;renderSellers();return}const c=e.target.closest(".stat-card");if(c){filter=c.dataset.filter;document.querySelectorAll("#filter-pills .pill").forEach(p=>p.classList.toggle("active",p.dataset.filter===filter));renderSellers()}});
document.addEventListener("input",e=>{if(e.target.id==="search-box"){searchQ=e.target.value;renderSellers()}});
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&document.activeElement?.closest("#login-screen"))doLogin();if(e.key==="Escape"&&!document.getElementById("detail-modal").hidden)closeDetail()});
(async()=>{try{await initSupabase();applyLang();bootApp()}catch(e){document.body.innerHTML='<div style="padding:40px;text-align:center"><h2>⚠️ Connection Error</h2></div>'}})();
</script>
</body>
</html>
