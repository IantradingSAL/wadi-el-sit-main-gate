<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a6eb5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="وادي الست">
<title>لوحة إدارة التعاونيّة — بلدية وادي الست</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<style>
/* ════════════════════════════════════════════════════════════
   PALETTE — verbatim from index.html / admin-panel.html
   ════════════════════════════════════════════════════════════ */
:root{
  --blue:#1a6eb5; --blue2:#0f4d82; --blue3:#daeaf8; --blue4:#f0f5fa; --blue5:#e8f2ff;
  --green:#28a745; --green2:#155724; --green3:#d4edda;
  --yellow:#ffc107; --yellow2:#856404; --yellow3:#fff3cd;
  --red:#dc3545; --red2:#721c24; --red3:#f8d7da;
  --cyan:#17a2b8;
  --gold:#ffd700;
  --bg:#f0f2f7;
  --surface:#fff;
  --text:#1a2332; --text2:#4a5568; --text3:#8a95a3; --text4:#bcc4cf;
  --border:#e0e6ef; --border2:#d0d4dc;
  --shadow-sm:0 1px 3px rgba(15,77,130,.06);
  --shadow:0 4px 20px rgba(15,77,130,.1);
  --shadow-lg:0 16px 40px rgba(15,77,130,.18);
  --r:12px; --r2:16px; --r3:20px;
  --font:'Tajawal',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;background:none;color:inherit}
input,select{font-family:var(--font);outline:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ════════════════════════════════════════════════════════════
   ROUND LOGO BUTTON — click goes back to index.html
   ════════════════════════════════════════════════════════════ */
.brand-block{
  text-align:center;
  padding:32px 16px 18px;
  position:relative
}
.logo-btn{
  display:block;
  width:96px;height:96px;
  border-radius:50%;
  margin:0 auto 14px;
  overflow:hidden;
  border:4px solid var(--surface);
  background:linear-gradient(135deg,var(--blue2),var(--blue));
  box-shadow:0 8px 24px rgba(15,77,130,.25),0 2px 6px rgba(15,77,130,.15);
  cursor:pointer;
  transition:transform .25s cubic-bezier(.2,.7,.2,1),box-shadow .25s;
  position:relative
}
.logo-btn::after{
  content:'';position:absolute;inset:-8px;
  border:1.5px dashed var(--blue3);border-radius:50%;
  opacity:0;transition:opacity .25s
}
.logo-btn:hover{
  transform:scale(1.06) rotate(-3deg);
  box-shadow:0 14px 36px rgba(15,77,130,.35),0 4px 12px rgba(15,77,130,.2)
}
.logo-btn:hover::after{opacity:1}
.logo-btn:active{transform:scale(1.02)}
.logo-btn img{width:100%;height:100%;object-fit:cover;display:block}
.logo-fallback{
  display:none;
  width:100%;height:100%;
  align-items:center;justify-content:center;
  color:#fff;font-family:var(--font);
  font-size:30px;font-weight:900;
  letter-spacing:-1px;
  text-shadow:0 2px 4px rgba(0,0,0,.2)
}
.logo-btn img[hidden] + .logo-fallback{display:flex}

.brand-title h1{font-size:24px;color:var(--blue2);font-weight:900;letter-spacing:-.4px;line-height:1.2}
.brand-title p{font-size:13px;color:var(--text2);margin-top:5px;font-weight:500}
.logo-hint{
  display:block;font-size:10.5px;color:var(--text3);
  margin-top:8px;letter-spacing:.4px;
  font-weight:700;text-transform:uppercase
}

.lang-bar{position:absolute;top:24px;inset-inline-end:16px}
.lang-pill{
  display:flex;gap:2px;background:var(--surface);
  padding:3px;border-radius:100px;
  border:1px solid var(--border);box-shadow:var(--shadow-sm)
}
.lang-pill button{
  padding:6px 12px;font-size:11px;font-weight:800;
  color:var(--text3);border-radius:100px;
  letter-spacing:.5px;transition:.2s;font-family:var(--font)
}
.lang-pill button.active{background:var(--blue);color:#fff}
.lang-pill button:hover:not(.active){color:var(--text)}

.container{max-width:980px;margin:0 auto;padding:0 16px 50px}

/* ════════════════════════════════════════════════════════════
   LOGIN MODAL
   ════════════════════════════════════════════════════════════ */
.adm-modal-bg{
  position:fixed;inset:0;
  background:rgba(15,77,130,.55);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;padding:16px;animation:fadeIn .25s
}
@keyframes fadeIn{from{opacity:0}}
.adm-modal-card{
  background:var(--surface);
  border-radius:20px;max-width:420px;width:100%;
  overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.35);
  animation:slideUp .35s cubic-bezier(.2,.7,.2,1)
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}}
.adm-modal-header{
  background:linear-gradient(120deg,var(--blue2),var(--blue));
  color:#fff;padding:26px 24px 22px;text-align:center;
  position:relative;overflow:hidden
}
.adm-modal-header::before{
  content:'';position:absolute;top:-50%;inset-inline-end:-30%;
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(255,255,255,.15) 0,transparent 60%);
  pointer-events:none
}
.adm-modal-header::after{
  content:'';position:absolute;bottom:-40%;inset-inline-start:-25%;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,215,0,.18) 0,transparent 60%);
  pointer-events:none
}
.adm-modal-header h3{font-size:20px;font-weight:900;position:relative;z-index:1;letter-spacing:-.3px;margin-bottom:5px}
.adm-modal-header .sub{font-size:12.5px;opacity:.9;position:relative;z-index:1}
.adm-modal-body{padding:26px 26px 22px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:700}
.fi{
  width:100%;padding:13px 15px;
  border:1.5px solid var(--border2);border-radius:12px;
  font-size:15px;font-family:inherit;color:var(--text);
  transition:.2s;background:#fff
}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue3)}

.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:7px;padding:12px 20px;border-radius:12px;
  font-family:var(--font);font-size:14px;font-weight:800;
  transition:.2s;cursor:pointer;line-height:1;
  border:1.5px solid transparent
}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-block{width:100%;padding:14px}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue2);border-color:var(--blue2)}
.btn-ghost{background:var(--surface);color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--blue4);border-color:var(--blue);color:var(--blue)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}

.adm-error{
  background:var(--red3);color:var(--red2);
  padding:11px 14px;border-radius:11px;
  font-size:13px;margin-bottom:12px;
  border:1px solid rgba(220,53,69,.2);font-weight:600
}

/* ════════════════════════════════════════════════════════════
   HEADER STRIP (after login)
   ════════════════════════════════════════════════════════════ */
.adm-header-inner{
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(135deg,var(--blue4),var(--surface));
  border:1.5px solid var(--blue3);
  padding:14px 18px;border-radius:var(--r2);
  margin-bottom:18px;flex-wrap:wrap;gap:8px
}
.adm-greeting{font-weight:800;color:var(--blue2);font-size:14.5px;display:flex;align-items:center;gap:7px}
.adm-badge-super{
  background:linear-gradient(135deg,#ffd700,#f5c842);
  color:#5c4a00;padding:3px 11px;border-radius:8px;
  font-size:11px;font-weight:900;
  box-shadow:0 2px 6px rgba(245,200,66,.35)
}
.adm-btn-logout{
  background:#fff;color:var(--red);border:1.5px solid var(--red3);
  padding:8px 16px;border-radius:10px;
  font-size:13px;font-weight:700;
  display:inline-flex;align-items:center;gap:5px;transition:.15s
}
.adm-btn-logout:hover{background:var(--red3);border-color:var(--red)}

/* ════════════════════════════════════════════════════════════
   STAT CARDS
   ════════════════════════════════════════════════════════════ */
.seller-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;margin-bottom:20px
}
@media(max-width:540px){.seller-stats{grid-template-columns:repeat(2,1fr)}}
.stat-card{
  padding:18px 14px;border-radius:var(--r2);text-align:start;
  background:var(--surface);
  border:1.5px solid transparent;
  transition:transform .2s,box-shadow .2s;
  position:relative;overflow:hidden
}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 26px rgba(15,77,130,.1)}
.stat-card::before{
  content:'';position:absolute;top:0;inset-inline-end:0;
  width:48px;height:48px;
  opacity:.1;border-radius:0 0 0 var(--r2)
}
.stat-card .stat-emoji{font-size:22px;line-height:1;margin-bottom:8px}
.stat-card .stat-num{font-size:28px;font-weight:900;line-height:1;letter-spacing:-.4px}
.stat-card .stat-lbl{font-size:11.5px;color:var(--text2);margin-top:5px;font-weight:700}
.stat-total{border-color:var(--blue3)}
.stat-total .stat-num{color:var(--blue2)}
.stat-total::before{background:var(--blue)}
.stat-pending{background:linear-gradient(135deg,var(--yellow3) 0%,#fffaef 100%);border-color:#f0d97c}
.stat-pending .stat-num{color:var(--yellow2)}
.stat-pending::before{background:var(--yellow)}
.stat-approved{background:linear-gradient(135deg,var(--green3) 0%,#f0faf2 100%);border-color:#b0d7b8}
.stat-approved .stat-num{color:var(--green2)}
.stat-approved::before{background:var(--green)}
.stat-suspended{background:linear-gradient(135deg,var(--red3) 0%,#fcf2f3 100%);border-color:#e8b1b8}
.stat-suspended .stat-num{color:var(--red2)}
.stat-suspended::before{background:var(--red)}

/* ─── Toolbar ─── */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:220px;position:relative}
.search input{
  width:100%;padding:12px 14px 12px 40px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;font-size:14px;font-family:inherit
}
html[dir="rtl"] .search input{padding:12px 40px 12px 14px}
.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue3)}
.search svg{position:absolute;inset-inline-start:14px;top:50%;transform:translateY(-50%);color:var(--text3)}

.filter-pills{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pill{
  padding:9px 16px;border-radius:100px;
  background:var(--surface);border:1.5px solid var(--border);
  cursor:pointer;font-size:13px;color:var(--text2);
  font-weight:700;transition:.15s;font-family:inherit;
  display:inline-flex;align-items:center;gap:5px
}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 4px 10px rgba(26,110,181,.25)}
.pill .count{
  background:rgba(0,0,0,.08);padding:1px 7px;
  border-radius:99px;font-size:10.5px;font-family:monospace;font-weight:800
}
.pill.active .count{background:rgba(255,255,255,.25)}

/* ════════════════════════════════════════════════════════════
   SELLER CARDS — clickable
   ════════════════════════════════════════════════════════════ */
.seller-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r2);
  padding:16px;margin-bottom:11px;
  transition:.18s;cursor:pointer
}
.seller-card:hover{
  border-color:var(--blue);
  box-shadow:0 8px 22px rgba(15,77,130,.1);
  transform:translateY(-1px)
}
.seller-card-row{
  display:flex;align-items:center;gap:14px;
  justify-content:space-between
}
.seller-left{display:flex;gap:13px;align-items:center;flex:1;min-width:0}
.seller-avatar{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue2),var(--blue));
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:17px;
  flex-shrink:0;box-shadow:0 4px 10px rgba(15,77,130,.18);
  letter-spacing:-.5px
}
.seller-info{flex:1;min-width:0}
.seller-name{
  font-weight:900;font-size:16px;color:var(--text);
  margin-bottom:3px;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.seller-meta{color:var(--text2);font-size:12.5px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.seller-meta .username{font-family:monospace;background:var(--blue4);padding:2px 8px;border-radius:6px;color:var(--blue2);font-size:11.5px;font-weight:800}
.seller-meta .dot{color:var(--text4)}
.seller-row-stats{
  display:flex;gap:14px;margin-top:7px;
  font-size:12px;color:var(--text2);
  font-weight:600;flex-wrap:wrap
}
.seller-row-stats span{display:inline-flex;align-items:center;gap:4px}
.seller-row-stats strong{color:var(--blue2);font-weight:900;font-family:monospace}

.seller-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}
.seller-status{
  font-size:11px;padding:5px 11px;border-radius:8px;
  white-space:nowrap;font-weight:900;letter-spacing:.02em;
  display:inline-flex;align-items:center;gap:5px
}
.seller-status::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.seller-status.pending{background:var(--yellow3);color:var(--yellow2)}
.seller-status.approved{background:var(--green3);color:var(--green2)}
.seller-status.suspended{background:var(--red3);color:var(--red2)}
.chevron-hint{font-size:11px;color:var(--text3);font-weight:600}

.empty-list{
  padding:60px 24px;text-align:center;
  color:var(--text3);
  background:var(--surface);border-radius:var(--r2);
  border:1.5px dashed var(--border)
}
.empty-list .ico{font-size:44px;margin-bottom:10px;display:block}
.empty-list h3{font-size:17px;color:var(--text2);margin-bottom:5px;font-weight:800}
.empty-list .small{font-size:12px;color:var(--text3);margin-top:8px;font-family:monospace;word-break:break-word}
.spinner{
  width:28px;height:28px;
  border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;
  display:inline-block
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{padding:50px;text-align:center;color:var(--text3)}

/* ════════════════════════════════════════════════════════════
   DETAIL MODAL
   ════════════════════════════════════════════════════════════ */
.detail-overlay{
  position:fixed;inset:0;
  background:rgba(15,77,130,.5);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  z-index:1000;padding:16px;animation:fadeIn .25s
}
.detail-overlay.show{display:flex}
.detail-modal{
  background:var(--surface);
  border-radius:22px;
  width:100%;max-width:780px;max-height:92vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);
  animation:slideUp .3s cubic-bezier(.2,.7,.2,1)
}

.detail-head{
  background:linear-gradient(135deg,var(--blue2),var(--blue));
  color:#fff;padding:22px 24px 18px;
  position:relative;overflow:hidden
}
.detail-head::before{
  content:'';position:absolute;top:-50%;inset-inline-start:-30%;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(255,255,255,.15) 0,transparent 60%);
  pointer-events:none
}
.detail-head::after{
  content:'';position:absolute;bottom:-40%;inset-inline-end:-25%;
  width:240px;height:240px;
  background:radial-gradient(circle,rgba(255,215,0,.2) 0,transparent 60%);
  pointer-events:none
}
.detail-head-row{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
.detail-avatar{
  width:62px;height:62px;border-radius:50%;
  background:rgba(255,255,255,.25);
  border:2.5px solid rgba(255,255,255,.4);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:21px;flex-shrink:0;
  letter-spacing:-.5px;text-shadow:0 1px 2px rgba(0,0,0,.2)
}
.detail-name{font-size:22px;font-weight:900;letter-spacing:-.3px;line-height:1.2;margin-bottom:5px;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.detail-meta{font-size:13px;opacity:.92;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.detail-meta .username{background:rgba(255,255,255,.2);padding:2px 9px;border-radius:6px;font-family:monospace;font-weight:800;font-size:11.5px}
.detail-meta .status-pill{padding:3px 11px;border-radius:8px;font-size:11px;font-weight:900;background:rgba(255,255,255,.95);letter-spacing:.02em}
.detail-meta .status-pill.pending{color:var(--yellow2)}
.detail-meta .status-pill.approved{color:var(--green2)}
.detail-meta .status-pill.suspended{color:var(--red2)}
.detail-close{
  position:absolute;top:18px;inset-inline-end:18px;
  width:36px;height:36px;
  background:rgba(255,255,255,.15);border-radius:50%;color:#fff;
  display:flex;align-items:center;justify-content:center;
  z-index:2;transition:.15s
}
.detail-close:hover{background:rgba(255,255,255,.28)}

.detail-quick{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;padding:0 24px;margin-top:14px;
  position:relative;z-index:1
}
.detail-quick-card{
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25);
  border-radius:12px;padding:11px 12px;
  color:#fff;text-align:center
}
.detail-quick-card .qv{font-size:18px;font-weight:900;line-height:1;margin-bottom:3px;font-family:monospace;letter-spacing:-.3px}
.detail-quick-card .ql{font-size:10.5px;opacity:.85;font-weight:700;letter-spacing:.02em}

.detail-tabs{
  display:flex;padding:0 24px;margin-top:18px;
  border-bottom:1.5px solid var(--border);
  background:var(--surface);gap:4px
}
.detail-tab{
  padding:14px 4px;margin-inline-end:24px;
  font-weight:800;color:var(--text3);
  border-bottom:2.5px solid transparent;margin-bottom:-1.5px;
  font-size:13px;font-family:var(--font);
  display:flex;align-items:center;gap:6px;transition:.15s
}
.detail-tab:hover{color:var(--text2)}
.detail-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.detail-tab-count{
  background:var(--bg);color:var(--text2);
  padding:1px 8px;border-radius:99px;
  font-size:11px;font-weight:800;font-family:monospace
}
.detail-tab.active .detail-tab-count{background:var(--blue3);color:var(--blue)}

.detail-body{flex:1;overflow-y:auto;padding:20px 24px;background:var(--bg)}
.tab-pane{display:none}
.tab-pane.active{display:block;animation:fadeIn .2s}

.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.info-row{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 15px;transition:.15s
}
.info-row:hover{border-color:var(--blue3)}
.info-row .k{
  font-size:10.5px;color:var(--text3);
  margin-bottom:4px;font-weight:800;letter-spacing:.04em;
  text-transform:uppercase;
  display:flex;align-items:center;gap:5px
}
.info-row .v{font-size:14px;color:var(--text);word-break:break-word;font-weight:700}
.info-row .v.muted{color:var(--text3);font-style:italic;font-weight:500}
.info-row.span-2{grid-column:span 2}
.info-row.highlighted{background:var(--blue4);border-color:var(--blue3)}
.info-row.highlighted .v{color:var(--blue2)}

.quick-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.qa-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:99px;
  font-size:12.5px;font-weight:700;color:var(--text);
  transition:.15s;cursor:pointer
}
.qa-chip:hover{border-color:var(--blue);background:var(--blue4);color:var(--blue)}
.qa-chip.wa:hover{border-color:#25D366;background:#e8f8ec;color:#0f8a44}

.item-list{display:flex;flex-direction:column;gap:9px}
.item{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 15px;
  display:grid;grid-template-columns:1fr auto;gap:12px;
  align-items:center;transition:.15s
}
.item:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(15,77,130,.07)}
.item-title{font-weight:800;color:var(--text);font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-meta{font-size:12px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap}
.item-meta strong{color:var(--text2);font-weight:700}
.item-right{text-align:end;font-family:monospace;font-weight:900;color:var(--blue2);font-size:14px;white-space:nowrap}
.item-right .small{font-family:var(--font);font-weight:600;color:var(--text3);font-size:11px;display:block;margin-top:2px}
.ref{
  font-family:monospace;font-size:11px;
  color:var(--text2);background:var(--blue4);
  padding:2px 7px;border-radius:5px;border:1px solid var(--blue3)
}
.mini-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:900;
  padding:2px 8px;border-radius:6px;letter-spacing:.02em
}
.mini-badge.pending{background:var(--yellow3);color:var(--yellow2)}
.mini-badge.approved,.mini-badge.delivered,.mini-badge.completed{background:var(--green3);color:var(--green2)}
.mini-badge.confirmed,.mini-badge.processing{background:var(--blue3);color:var(--blue2)}
.mini-badge.cancelled,.mini-badge.suspended{background:var(--red3);color:var(--red2)}

.tab-note{
  background:var(--yellow3);color:var(--yellow2);
  padding:12px 14px;border-radius:12px;
  border:1px solid #f0d97c;
  font-size:12.5px;line-height:1.6;margin-bottom:12px
}
.tab-note code{background:rgba(0,0,0,.08);padding:1px 6px;border-radius:4px;font-family:monospace;font-size:11.5px}

.detail-foot{
  padding:16px 24px;background:var(--surface);
  border-top:1.5px solid var(--border);
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  justify-content:flex-end
}
.detail-foot .spacer{flex:1}
.act-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 16px;border-radius:10px;
  font-size:13px;font-weight:800;color:#fff;
  border:none;cursor:pointer;font-family:inherit;transition:.15s
}
.act-btn:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.15)}
.act-approve,.act-reactivate{background:var(--green)}
.act-suspend{background:var(--yellow);color:#000}
.act-pwd{background:var(--cyan)}
.act-delete{background:var(--red)}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:#1a1a2e;color:#fff;
  padding:12px 24px;border-radius:12px;
  font-size:13.5px;font-weight:700;
  box-shadow:0 12px 30px rgba(0,0,0,.3);
  z-index:99999;opacity:0;transition:all .25s;pointer-events:none;
  max-width:90vw
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red)}
.toast.ok{background:var(--green)}

/* Prompt modal */
.prompt-bg{
  position:fixed;inset:0;background:rgba(15,77,130,.55);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:10000;padding:16px;
  animation:fadeIn .2s
}
.prompt-bg.show{display:flex}
.prompt-card{
  background:#fff;border-radius:18px;max-width:420px;width:100%;
  overflow:hidden;box-shadow:var(--shadow-lg);
  animation:slideUp .3s cubic-bezier(.2,.7,.2,1)
}
.prompt-head{padding:18px 22px;background:linear-gradient(120deg,var(--blue2),var(--blue));color:#fff}
.prompt-head h4{font-size:16px;font-weight:900;margin-bottom:3px}
.prompt-head .sub{font-size:12px;opacity:.88}
.prompt-body{padding:20px 22px}
.prompt-foot{padding:0 22px 18px;display:flex;gap:8px;justify-content:flex-end}

@media(max-width:640px){
  .container{padding:0 12px 32px}
  .brand-block{padding:24px 12px 14px}
  .brand-title h1{font-size:20px}
  .logo-btn{width:80px;height:80px}
  .lang-bar{position:static;display:flex;justify-content:center;margin-bottom:6px;margin-top:12px}
  .detail-quick{gap:7px;padding:0 16px}
  .detail-quick-card{padding:9px 6px}
  .detail-quick-card .qv{font-size:15px}
  .detail-head,.detail-tabs,.detail-body,.detail-foot{padding-inline:16px}
  .info-grid{grid-template-columns:1fr}
  .info-row.span-2{grid-column:auto}
  .seller-card{padding:14px}
  .seller-avatar{width:44px;height:44px;font-size:15px}
  .seller-name{font-size:15px}
  .chevron-hint{display:none}
}

/* SUPABASE CLIENT + EXACT RPC PARITY WITH admin-panel.html */
const client = supabase.createClient(SB_URL, SB_KEY, {realtime:{enabled:false}});

const COOP_ADMIN_TOKEN_KEY = 'coop_admin_token_v3';
const COOP_ADMIN_INFO_KEY  = 'coop_admin_info_v3';
let _sellersCache = [];
let _sellerFilter = 'all';
let CURRENT_SELLER = null;

const tokGet   = () => localStorage.getItem(COOP_ADMIN_TOKEN_KEY);
const tokSet   = (tok, info) => { localStorage.setItem(COOP_ADMIN_TOKEN_KEY, tok); localStorage.setItem(COOP_ADMIN_INFO_KEY, JSON.stringify(info)); };
const tokClear = () => { localStorage.removeItem(COOP_ADMIN_TOKEN_KEY); localStorage.removeItem(COOP_ADMIN_INFO_KEY); };
const infoGet  = () => { try { return JSON.parse(localStorage.getItem(COOP_ADMIN_INFO_KEY) || 'null'); } catch { return null; } };

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showLogin() {
  document.getElementById('adm-login-modal').hidden = false;
  document.getElementById('adm-header').hidden = true;
  document.getElementById('adm-sellers-tab').hidden = true;
  setTimeout(()=>document.getElementById('adm-username')?.focus(), 100);
}
function showDashboard() {
  document.getElementById('adm-login-modal').hidden = true;
  document.getElementById('adm-header').hidden = false;
  document.getElementById('adm-sellers-tab').hidden = false;
  const info = infoGet();
  if (info) {
    document.getElementById('adm-greeting-name').textContent = info.display_name || info.username;
    document.getElementById('adm-super-badge').hidden = !info.is_super;
  }
}
function handleRpcError(err) {
  const msg = err?.message || String(err);
  if (msg.includes('invalid_or_expired_token') || msg.includes('admin_token_required') || msg.includes('admin_account_disabled')) {
    tokClear(); toast(t('toast.sessionEnd'),'err'); showLogin(); return true;
  }
  if (msg.includes('super_admin_required')) { toast(t('toast.errSuper'),'err'); return true; }
  return false;
}

async function coopAdminLogin() {
  const username = document.getElementById('adm-username').value.trim();
  const password = document.getElementById('adm-password').value;
  const errEl = document.getElementById('adm-login-error');
  const btn   = document.getElementById('adm-login-btn');
  errEl.hidden = true;
  if (!username || password.length < 4) {
    errEl.textContent = t('login.errEmpty'); errEl.hidden = false; return;
  }
  btn.disabled = true; btn.innerHTML = '⏳ <span>'+t('login.signing')+'</span>';
  try {
    const hash = await sha256Hex(password);
    const { data, error } = await client.rpc('coop_admin_login', {
      p_username: username, p_password_hash: hash, p_user_agent: navigator.userAgent.slice(0,200)
    });
    if (error) throw error;
    if (!data?.token) throw new Error('No token returned');
    tokSet(data.token, data.admin);
    document.getElementById('adm-password').value = '';
    showDashboard();
    await loadAll();
  } catch (e) {
    const msg = e?.message || String(e);
    errEl.textContent = msg.includes('invalid_credentials') ? t('login.errBad') : t('login.errGen') + msg;
    errEl.hidden = false;
  } finally {
    btn.disabled = false; btn.innerHTML = '🚀 <span>'+t('login.signin')+'</span>';
  }
}

async function coopAdminLogout() {
  if (!confirm(t('logoutConfirm'))) return;
  const token = tokGet();
  if (token) { try { await client.rpc('coop_admin_logout', { p_token: token }); } catch {} }
  tokClear(); showLogin();
}

async function bootSession() {
  const token = tokGet();
  if (!token) return showLogin();
  try {
    const { data, error } = await client.rpc('coop_admin_whoami', { p_token: token });
    if (error || !data?.admin) throw error || new Error('No admin');
    tokSet(token, data.admin);
    showDashboard();
    await loadAll();
  } catch { tokClear(); showLogin(); }
}

async function loadAll() {
  const token = tokGet();
  if (!token) return showLogin();
  document.getElementById('sellers-list').innerHTML = '<div class="loading-state"><span class="spinner"></span></div>';
  try {
    const { data: stats, error: e1 } = await client.rpc('coop_admin_seller_stats', { p_admin_token: token });
    if (e1) throw e1;
    if (stats) {
      document.getElementById('stat-total').textContent = stats.total || 0;
      document.getElementById('stat-pending').textContent = stats.pending || 0;
      document.getElementById('stat-approved').textContent = stats.approved || 0;
      document.getElementById('stat-suspended').textContent = stats.suspended || 0;
      document.getElementById('cnt-all').textContent = stats.total || 0;
      document.getElementById('cnt-pending').textContent = stats.pending || 0;
      document.getElementById('cnt-approved').textContent = stats.approved || 0;
      document.getElementById('cnt-suspended').textContent = stats.suspended || 0;
    }
    const { data: sellers, error: e2 } = await client.rpc('coop_admin_list_sellers', { p_admin_token: token });
    if (e2) throw e2;
    _sellersCache = sellers || [];
    renderSellersList();
    toast(t('toast.loaded'),'ok');
  } catch (e) {
    if (!handleRpcError(e)) {
      document.getElementById('sellers-list').innerHTML = '<div class="empty-list"><span class="ico">⚠️</span><h3>'+t('toast.errLoad')+'</h3><div class="small">'+(e?.message||e)+'</div></div>';
    }
  }
}

function getInitials(s) {
  const name = (s.display_name || s.username || '').trim();
  return name.split(/\s+/).map(p => p[0] || '').slice(0, 2).join('').toUpperCase() || '?';
}

function renderSellersList() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  const list = document.getElementById('sellers-list');
  list.innerHTML = '';
  let filtered = _sellerFilter === 'all' ? _sellersCache.slice() : _sellersCache.filter(s => s.status === _sellerFilter);
  if (q) filtered = filtered.filter(s =>
    (s.display_name||'').toLowerCase().includes(q) ||
    (s.username||'').toLowerCase().includes(q) ||
    (s.phone||'').toLowerCase().includes(q)
  );
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-list"><span class="ico">🔍</span><h3>'+(q||_sellerFilter!=='all' ? t('empty.filter') : t('empty.none'))+'</h3><div style="font-size:13px;margin-top:4px">'+t('empty.body')+'</div></div>';
    return;
  }
  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'seller-card';
    card.onclick = () => openDetail(s);
    card.innerHTML = `
      <div class="seller-card-row">
        <div class="seller-left">
          <div class="seller-avatar">${escapeHtml(getInitials(s))}</div>
          <div class="seller-info">

            <div class="seller-meta">
              <span class="username">@${escapeHtml(s.username||'?')}</span>
              ${s.phone ? `<span class="dot">·</span><span>📞 ${escapeHtml(s.phone)}</span>` : ''}
              ${s.area ? `<span class="dot">·</span><span>📍 ${escapeHtml(s.area)}</span>` : ''}
            </div>
            <div class="seller-row-stats">
              <span>📦 <strong>${s.product_count||0}</strong> ${t('card.products')}</span>
              <span>📋 <strong>${s.pending_orders||0}</strong> ${t('card.orders')}</span>

  const candidates = [
    ['coop_admin_seller_products',{p_admin_token:token,p_seller_id:sellerId}],
    ['coop_admin_list_seller_products',{p_admin_token:token,p_seller_id:sellerId}],
    ['coop_admin_get_seller_products',{p_admin_token:token,p_seller_id:sellerId}],
  ];
  for (const [name, args] of candidates) {

/* ─── Actions (exact RPC parity) ─── */
async function actApprove(id) {
  if (!confirm(t('confirm.approve'))) return;
  try {
    const { error } = await client.rpc('coop_admin_approve_seller', { p_admin_token: tokGet(), p_seller_id: id });
    if (error) throw error;
    toast(t('toast.approved'),'ok');
    closeDetail(); loadAll();
  } catch (e) { if (!handleRpcError(e)) toast(t('toast.errOp')+': '+(e?.message||e),'err'); }
}

async function actSuspend(id, name) {
  const reason = await openPrompt(t('prompt.suspendTitle'), t('prompt.suspendSub') + (name ? ' — '+name : ''));
  if (reason === null) return;
  try {
    const { error } = await client.rpc('coop_admin_suspend_seller', { p_admin_token: tokGet(), p_seller_id: id, p_reason: reason || null });
    if (error) throw error;
    toast(t('toast.suspended'),'ok');
    closeDetail(); loadAll();
  } catch (e) { if (!handleRpcError(e)) toast(t('toast.errOp')+': '+(e?.message||e),'err'); }
}

async function actChangePassword(id, username) {
  const pwd = await openPrompt(t('prompt.pwdTitle'), t('prompt.pwdSub') + ' — @'+username, 'password');
  if (!pwd || pwd.length < 4) return;
  if (!confirm(t('confirm.pwd'))) return;
  try {
    const hash = await sha256Hex(pwd);
    const { error } = await client.rpc('coop_admin_change_seller_password', { p_admin_token: tokGet(), p_seller_id: id, p_new_password_hash: hash });
    if (error) throw error;
    toast(t('toast.pwdChanged'),'ok');
  } catch (e) { if (!handleRpcError(e)) toast(t('toast.errOp')+': '+(e?.message||e),'err'); }
}

async function actDelete(id, name) {
  if (!confirm(t('confirm.delete') + (name ? '\n— '+name : ''))) return;
  let force = false;
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const { error } = await client.rpc('coop_admin_delete_seller', { p_admin_token: tokGet(), p_seller_id: id, p_force: force });
      if (error) throw error;
      toast(t('toast.deleted'),'ok');
      closeDetail(); loadAll();
      return;
    } catch (e) {
      const msg = e?.message || String(e);
      if (msg.includes('seller_has_orders') && attempt === 0) {
        if (confirm(t('confirm.deleteForce'))) { force = true; continue; }
        return;
      }
      if (!handleRpcError(e)) toast(t('toast.errOp')+': '+msg,'err');
      return;
    }
  }
}

/* Custom prompt */
let _promptResolve = null;
function openPrompt(title, sub, type) {
  document.getElementById('promptTitle').textContent = title;
  document.getElementById('promptSub').textContent = sub || '';
  const inp = document.getElementById('promptInput');
  inp.type = type === 'password' ? 'password' : 'text';
  inp.value = '';
  document.getElementById('promptBg').classList.add('show');
  setTimeout(()=>inp.focus(), 50);
  return new Promise(res => { _promptResolve = res; });
}
function closePrompt(ok) {
  const val = ok ? document.getElementById('promptInput').value : null;
  document.getElementById('promptBg').classList.remove('show');
  if (_promptResolve) { _promptResolve(val); _promptResolve = null; }
}
document.getElementById('promptInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') closePrompt(true);
});

/* Utilities */
function fmtNum(n) {
  if (n == null || isNaN(n)) return '0';
  const loc = LANG === 'en' ? 'en-US' : (LANG === 'fr' ? 'fr-FR' : 'ar-LB');
  return new Intl.NumberFormat(loc, { maximumFractionDigits: 0 }).format(Number(n));
}
function fmtDate(s) {
  if (!s) return '—';
  try {
    const loc = LANG === 'ar' ? 'ar-LB' : (LANG === 'fr' ? 'fr-FR' : 'en-US');
    return new Date(s).toLocaleDateString(loc, { year:'numeric', month:'short', day:'numeric' });
  } catch { return s; }
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, '&#96;'); }

let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('err','ok');
  if (type === 'err') el.classList.add('err');
  else if (type === 'ok') el.classList.add('ok');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

setLang('ar');
bootSession();
</script>
